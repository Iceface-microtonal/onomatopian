<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Iceface Onomatoi</title>
<style>
  :root {
    --pink: #e8488a;
    --pink-bg: rgba(232, 72, 138, 0.10);
    --pink-bg2: rgba(232, 72, 138, 0.18);
    --gray: #888;
    --border: rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    background: #fff; color: #111;
    padding: 10px; max-width: 900px; margin: 0 auto;
  }
  header { display: flex; align-items: baseline; gap: 8px; padding: 6px 2px 10px; }
  header .brand { font-size: 12px; font-weight: 800; color: var(--gray); }
  header .pts { font-size: 14px; font-weight: 800; color: var(--pink); }
  header .sub { margin-left: auto; font-size: 9px; color: var(--gray); }
  .panel {
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; margin-bottom: 8px;
  }
  .panel-title { font-size: 10px; font-weight: 800; color: var(--pink); letter-spacing: 0.5px; }
  #canvas {
    width: 100%; height: 260px; display: block; border: 1px solid var(--pink-bg2);
    border-radius: 8px; touch-action: none; cursor: crosshair; background: #fff;
  }
  .row { display: flex; align-items: center; gap: 8px; }
  .result-word { font-size: 30px; font-weight: 700; min-height: 38px; word-break: break-all; }
  .result-meta { margin-left: auto; text-align: right; font-size: 11px; color: var(--gray); white-space: nowrap; }
  .axis-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  .axis-row label { width: 64px; font-size: 10px; color: var(--gray); }
  .axis-row input[type=range] { flex: 1; accent-color: var(--pink); }
  .axis-row .val { width: 48px; text-align: right; font-size: 10px; color: var(--gray); }
  button {
    font-family: inherit; font-size: 10px; font-weight: 700;
    border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer;
    background: var(--pink-bg); color: var(--pink);
  }
  button:active { background: var(--pink-bg2); }
  button.primary { background: var(--pink); color: #fff; padding: 8px 16px; font-size: 12px; }
  button.gray { background: rgba(0,0,0,0.06); color: var(--gray); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chips button { font-size: 9px; font-weight: 500; }
  #romaji-input {
    flex: 1; font-family: inherit; font-size: 14px; padding: 8px 10px;
    border: 1.5px solid var(--pink-bg2); border-radius: 7px; outline: none;
  }
  #romaji-input:focus { border-color: var(--pink); }
  #log { max-height: 160px; overflow-y: auto; margin-top: 6px; }
  .log-row {
    display: flex; gap: 8px; align-items: baseline; font-size: 10px;
    padding: 2px 0; cursor: pointer; border-radius: 3px;
  }
  .log-row:hover { background: var(--pink-bg); }
  .log-row .axes { color: var(--gray); width: 150px; flex-shrink: 0; }
  .log-row .word { font-weight: 700; font-size: 11px; }
  .log-row .meta { color: var(--gray); margin-left: auto; }
  .hint { font-size: 9px; color: var(--gray); }
  .vote { display: flex; gap: 4px; align-items: center; }
  .vote button {
    font-size: 17px; background: none; padding: 4px 7px; opacity: 0.45;
    border-radius: 6px;
  }
  .vote button.sel { opacity: 1; background: var(--pink-bg2); box-shadow: 0 0 0 2px var(--pink); transform: scale(1.12); }
  .vote button:disabled { opacity: 0.15; cursor: default; box-shadow: none; transform: none; }
  #vote-msg { font-size: 11px; font-weight: 700; color: #1899c2; opacity: 0;
              transition: opacity 0.25s; white-space: nowrap; margin-left: 2px; }
  #vote-msg.show { opacity: 1; }
  #loading-note.start-ready {
    cursor: pointer; text-align: center; font-size: 14px; font-weight: 800;
    color: #fff; background: var(--pink); padding: 12px 10px; user-select: none;
  }
  #loading-note.start-ready:active { background: var(--pink-bg2); color: var(--pink); }
  #status { font-size: 9px; color: var(--gray); margin-left: auto; }
  .knob-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .knob-row .knob { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--gray); }
  .knob-row input[type=range] { width: 110px; accent-color: var(--pink); }
</style>
</head>
<body>

<header>
  <span class="brand">ICEFACE</span><span class="pts">Onomatoi</span>
  <button id="btn-clear" class="gray" title="キャンバスを消去 / Clear the canvas">✕ <span id="t-eraser">消しゴム</span></button>
  <a id="about-link" href="./about_onomatoi.html" style="
    font-size: 10px; font-weight: 700; text-decoration: none;
    border-radius: 4px; padding: 5px 9px;
    background: rgba(77, 191, 242, 0.13); color: #1899c2;">？ <span id="t-about">解説</span></a>
  <span class="sub">Onomatoi — Phonosymbolic Topology Synthesizer (web)</span>
</header>

<!-- Loading banner (サンプル読込中の案内、完了後に Voice 表示へ) -->
<div id="loading-note" style="
  font-size: 11px; color: var(--pink); background: var(--pink-bg);
  border-radius: 6px; padding: 6px 10px; margin-bottom: 8px;
  transition: opacity 0.6s;">
  ♪ 音声サンプル読込中… — 音が出るまでしばらく時間がかかります
</div>

<!-- Sketch canvas -->
<div class="panel" style="padding:0; border:none;">
  <canvas id="canvas"></canvas>
</div>

<!-- Result -->
<div class="panel">
  <div class="row">
    <div class="result-word" id="result-word">—</div>
    <span class="vote">
      <button id="btn-good" disabled title="イメージ通り / Sounds right">👍</button>
      <button id="btn-bad" disabled title="イメージと違う / Sounds wrong">👎</button>
      <input id="fb-reason" maxlength="200" style="font-size:11px; padding:3px 7px;
        border:1px solid #ddd; border-radius:6px; width:200px;" placeholder="">
      <span id="vote-msg"></span>
    </span>
    <div class="result-meta" id="result-meta"></div>
  </div>
  <div class="chips" id="fb-tags" style="display:none; margin-top:4px;"></div>
  <div id="why-panel" style="display:none; margin-top:6px;">
    <div id="why-title" style="font-size:10px; font-weight:800; color:var(--pink); letter-spacing:0.5px;">なぜ?</div>
    <div id="why-lines" style="font-size:10px; color:#888; line-height:1.55;"></div>
  </div>
</div>

<!-- Tuning -->
<div class="panel">
  <div class="row">
    <span class="panel-title">TUNE</span>
    <span id="status"></span>
    <button id="btn-play" class="primary" style="margin-left:8px;">▶ PLAY</button>
  </div>
  <div class="axis-row"><label>size</label><input type="range" id="ax-size" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-size">+0.00</span></div>
  <div class="axis-row"><label>sharp</label><input type="range" id="ax-sharp" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-sharp">+0.00</span></div>
  <div class="axis-row"><label>texture</label><input type="range" id="ax-tex" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-tex">+0.00</span></div>
  <div class="axis-row"><label>bright</label><input type="range" id="ax-bright" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-bright">+0.00</span></div>
  <div class="axis-row"><label>round</label><input type="range" id="ax-round" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-round">+0.00</span></div>
  <div class="axis-row"><label>open</label><input type="range" id="ax-open" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-open">+0.00</span></div>
  <div class="axis-row" title="round/open をそのまま口の形に — 描いた形を「発音するときの口」として読んでいる。→ の右は発話中のモーラごとの口の推移 (P3)">
    <label>口</label>
    <canvas id="mouth-icon" width="46" height="32" style="flex:none;"></canvas>
    <span class="val" id="mouth-vowel" style="font-size:15px;"></span>
    <span id="mouth-arrow" style="display:none; color:#aaa; font-size:11px; font-weight:600; flex:none;">→</span>
    <div id="mouth-timeline" style="display:flex; align-items:flex-end; gap:3px; flex-wrap:wrap;"></div>
  </div>
  <div class="chips" id="preset-chips"></div>
  <div class="knob-row" style="margin-top:10px;">
    <span class="knob">hand corr <input type="range" id="kn-hc" min="0" max="1.5" step="0.05" value="0.5"><span id="val-hc">0.50</span></span>
  </div>
</div>

<!-- Feedback (👍👎 の収集と書き出し) -->
<div class="panel">
  <div class="row">
    <span class="panel-title">FEEDBACK (<span id="fb-count">0</span>)</span>
    <span class="hint" id="t-fb-hint" style="margin-left:auto; text-align:right;"></span>
    <button id="btn-fb-copy">COPY</button>
    <button id="btn-fb-clear" class="gray">CLEAR</button>
  </div>
</div>

<!-- Log -->
<div class="panel">
  <div class="row">
    <span class="panel-title">LOG (<span id="log-count">0</span>)</span>
    <button id="btn-log-clear" class="gray" style="margin-left:auto;">CLEAR</button>
  </div>
  <div id="log"></div>
</div>

<script>
"use strict";
/* ============================================================
 * ICEFACE Onomatoi — Web version (2026-07-08, core v7 移植)
 * iPad/Mac 版 OnomatoiCore からの忠実な移植 (簡易化した点):
 *  - 音程変化なし: Resources/Consonants の base wav のみ (pitch variants 不使用)
 *  - warabe (旋律) モードなし / COMPOSE モードなし
 *  - 促音は無音 gap のみ (V-Q / 摩擦延長サンプル不使用)
 * 生成ロジック (bias 表 v0.4 / nil-onset / ch 制限 / 決定的 seed) は本体と同一。
 * v10 追加移植 (2026-07-10, 粗い筆 + 理由付きフィードバック):
 *  - 粗い筆 (既定ON・TUNEで切替): ペンを固定ステップ (canvas対角×0.022) の頂点列に量子化。
 *    珠+角スパーク表示・未確定の糸・手ブレはインクにならない。抽出は同じ折れ線の密化版 (6px)。
 *    軸は知覚バケット0.25 / K は0.125格子 — 同じ形→同じ語 (実測: 円24回 19種→3種・最頻58%)
 *  - フィードバックに理由の自由記述 (任意)。FB_VERSION 3 (reason フィールド追加)
 * v9 追加移植 (2026-07-10, 最新 OnomatoiCore 同期):
 *  - 角の鋭さ cornerSharpness (ピークホールド+継ぎ目救済+閉じ目ヘアピン除外): 三角>四角>円
 *    の連続化。drawK は鋭さ主導 (密度は±30%変調)
 *  - 閉合度 v2: 端点ギャップ周長比 ≤10% は閉扱い (閉じたつもりの四角が口を失わない) +
 *    openness オフセット −0.57 再キャリブレーション
 *  - 単位ごとの K/manner: ループ=音節 の各ループが自分の形から K と調音方法を持つ
 *  - 単発くるん (線→一回転→また線) を単位語として読む (unitEligible)
 *  - manner 次元: 描線の動態 (単発衝撃/角の連打/波/閉じた丸) → 子音の調音方法
 *    (破裂/破擦/摩擦/共鳴) の親和 (+0.8×affinity)。K が潰していた時間構造の対応
 *  - 丸ん (ぽよん型): 小さく閉じた丸・柔・単発 → 語末ん
 *  - sustained (口の保持) ゲートに cornerSharpness<0.35 の保険 (三角の長音誤爆防止)
 * v8 追加移植 (2026-07-09, 最新 OnomatoiCore 同期):
 *  - 口の形 (openness×roundness): 描いた形を口として読む (PCA 回転不変)。丸=あ/横棒=い/
 *    小円=う/横長楕円=え/縦長=お。母音は口が支配 (brightness は母音判定から撤去)
 *  - bouba/kiki 第二柱: K表 (無声破裂=kiki/鼻音=bouba)・K_draw (尖り+角密度)・
 *    語レベル K 整合ゲート (|ΔK|≤0.35, salt 3案)
 *  - 一筆の連続=口の保持=長音 (あーーー, 伸ばす拍数は描画サイズ由来)
 *  - 構造単位分割: ループ=音節 (口は単位ごと)・つなぎ線=ー(保持)/ん(語末平線)/っ(ギザ)/直結
 *  - 長さの応答: 長い描線には反復タイルで最大16モーラの奔流
 *  - 持続母音テイク v_aaaa〜v_oooo (伸ばし録音) を v_* より優先ロード
 * v7 追加移植 (PhonosymbolicEvent.Onomatopoeia.legalize / FormantSynth Audio v1-v7.9):
 *  - legalize(): 任意のモーラ列を実在オノマトペ型 (畳語/り/ん/ー/っ/どーん/がたごと/かい/こう…)
 *    へ整形する層。これが「Onomatoi らしさ」の核 (音声パイプラインは別途 v7 と対で実装)。
 *  - 長母音サステイン (loopStart/loopEnd ネイティブループ、ゼロクロス近傍) — ー終わりの語が
 *    途中で無音化しないように (旧 Consonants/*.mp3 は 2.0s ファイル中 0.3s しか実音が無かった
 *    デノイズのゲート事故があり、Resources 側は修正済み。Web 側 mp3 も再生成時に末尾トリム済み)。
 *  - 継続撥音 (v_<v>_nn.mp3, prepareContN 相当の頭-19dB→尾-17.5dB 整形を事前ベイク) — 語中の
 *    ん (どーん/ふんわり) を n_N.mp3 でなく前母音から続けて鳴らす。
 *  - CV→V diph (diph_<v1><v2>.mp3 をそのまま使う簡易版) — かい/こう等の語末連続母音。
 * ============================================================ */

const SAMPLE_BASE = "./ConsonantsOnomatoi/";   // wav の場所 (開発用: プロジェクト内参照)

// ─── 日英 UI テキスト (ブラウザ言語で自動判定、about.html とトグル選択を共有) ───
let uiLang = null;
try { uiLang = localStorage.getItem("onomatoi.lang"); } catch (e) {}
if (uiLang !== "ja" && uiLang !== "en") {
  uiLang = (navigator.language || "en").toLowerCase().startsWith("ja") ? "ja" : "en";
}
const T = uiLang === "ja" ? {
  eraser: "消しゴム",
  about: "解説",
  loading: (n, total) => `♪ 音声サンプル読込中 ${n}/${total} — 音が出るまでしばらく時間がかかります`,
  loadingInitial: "♪ 音声サンプル読込中… — 音が出るまでしばらく時間がかかります",
  voice: "Voice(声): PuppeTwin",
  romajiTitle: "ROMAJI 直接入力",
  romajiHint: "空白区切り、または語をそのまま (bouba も bo u ba も同じ)。促音=Q, 撥音=n (例 don), 拗音=kya 等",
  fbHint: "👍👎 = イメージ通りか記録。COPY で書き出して開発に渡せます",
  fbCopied: "COPIED!",
  fbSaved: (n) => `✓ 記録しました（計${n}件）`,
  fbReasonPH: "理由 (任意): どこがイメージ通り/違う?",
  start: "▶ タップして開始 (音を有効化)",
} : {
  eraser: "Eraser",
  about: "About",
  loading: (n, total) => `♪ Loading voice samples ${n}/${total} — sound will be ready in a moment`,
  loadingInitial: "♪ Loading voice samples… — sound will be ready in a moment",
  voice: "Voice: PuppeTwin",
  romajiTitle: "ROMAJI input",
  romajiHint: "space-separated or as one word (bouba = bo u ba). geminate=Q, moraic nasal=n (e.g. don), kya/gyu etc.",
  fbHint: "👍👎 = did it sound like your shape? COPY exports for tuning",
  fbCopied: "COPIED!",
  fbSaved: (n) => `✓ saved (${n} total)`,
  fbReasonPH: "why? (optional): what matched / didn't",
  start: "▶ Tap to Start (enable sound)",
};
function applyLangTexts() {
  document.getElementById("t-eraser").textContent = T.eraser;
  document.getElementById("t-about").textContent = T.about;
  document.getElementById("t-fb-hint").textContent = T.fbHint;
  document.getElementById("loading-note").textContent = T.loadingInitial;
  const reasonEl = document.getElementById("fb-reason");
  if (reasonEl) reasonEl.placeholder = T.fbReasonPH;
}

// ─── 音素 inventory (PhonosymbolicEvent.swift と対応) ───
const CONSONANTS = ["k","g","t","d","p","b","m","n","s","sh","ts","r","w",
                    "ky","gy","ny","h","f","y","z","j","ch"];
const VOWELS = ["a","i","u","e","o"];
const VOICED = new Set(["g","d","b","m","n","r","w","gy","ny","y","z","j"]);
const PALATALIZED = new Set(["ky","gy","ny"]);   // a/u/o のみ
const SEMIVOWEL = new Set(["y"]);                // a/u/o のみ

// ─── bias 表 v0.4 (CVGenerator.swift §2) ───
const CONSONANT_BIAS = {
  k:  { size: -0.4,  sharp: 0.80, tex: 0.0,  bright:  0.3 },
  g:  { size:  0.6,  sharp: 0.50, tex: 0.0,  bright: -0.3 },
  t:  { size: -0.2,  sharp: 0.70, tex: 0.0,  bright:  0.0 },
  d:  { size:  0.4,  sharp: 0.35, tex: 0.0,  bright: -0.2 },
  p:  { size: -0.3,  sharp: 0.40, tex: 0.0,  bright:  0.0, round: 0.30 },
  b:  { size:  0.5,  sharp: 0.15, tex: 0.0,  bright: -0.3, round: 0.30 },
  m:  { size:  0.20, sharp: -0.70, tex: 0.0, bright: -0.3, round: 0.30 },
  n:  { size:  0.10, sharp: -0.60, tex: 0.0, bright:  0.0 },
  s:  { size: -0.3,  sharp: 0.60, tex: 0.0,  bright:  0.6 },
  sh: { size:  0.0,  sharp: 0.30, tex: 0.0,  bright: -0.2 },
  ts: { size: -0.2,  sharp: 0.80, tex: 0.3,  bright:  0.2 },
  r:  { size:  0.0,  sharp: -0.20, tex: 0.5, bright:  0.0 },
  w:  { size:  0.3,  sharp: -0.60, tex: 0.0, bright: -0.4, round: 0.60 },
  ky: { size: -0.5,  sharp: 0.70, tex: 0.0,  bright:  0.65, round: -0.20 },
  gy: { size:  0.30, sharp: 0.40, tex: 0.10, bright:  0.0, round: -0.20 },
  ny: { size:  0.0,  sharp: -0.50, tex: 0.10, bright: 0.30, round: -0.20 },
  h:  { size: -0.20, sharp: -0.10, tex: 0.10, bright: 0.20 },
  f:  { size: -0.10, sharp: -0.20, tex: 0.15, bright: 0.0, round: 0.50 },
  y:  { size:  0.10, sharp: -0.55, tex: 0.20, bright: 0.50, round: -0.20 },
  z:  { size:  0.20, sharp: 0.20, tex: 0.40,  bright: 0.20 },
  j:  { size:  0.30, sharp: 0.10, tex: 0.45,  bright: 0.10 },
  ch: { size: -0.35, sharp: 0.70, tex: 0.15,  bright: 0.25 },  // bias v2
};
const VOWEL_BIAS = {   // round=円唇(横引き−↔すぼめ+) open=開口 (口の形実験・作者の口観)
  a: { size:  0.80, sharp:  0.0, bright: -0.30, round:  0.0,  open:  0.85 },
  o: { size:  0.55, sharp: -0.3, bright: -0.70, round:  0.70, open:  0.30 },
  u: { size:  0.20, sharp: -0.4, bright: -0.50, round:  0.80, open: -0.40 },
  e: { size: -0.30, sharp:  0.0, bright:  0.60, round: -0.30, open:  0.45 },
  i: { size: -0.85, sharp:  0.3, bright:  0.90, round: -0.80, open: -0.70 },
};
// nil-onset (単独母音) スコア v0.4
const NIL_BASE = -0.68, NIL_SHARP_PENALTY = 1.45, NIL_DULL_BONUS = 0.0;

// ─── 決定的 RNG (同じ描写 = 同じシニフィアン) ───
function axesSeed(ax, salt) {
  // 1e-4 量子化 + FNV-1a 32bit (Swift 版 deterministicSeed の 32bit 簡易版)
  let h = 0x811c9dc5 ^ (salt >>> 0);
  const qs = [ax.size, ax.sharp, ax.tex, ax.bright].map(v => Math.round(v * 10000) | 0);
  const qr = Math.round((ax.round || 0) * 10000) | 0;
  const qo = Math.round((ax.open || 0) * 10000) | 0;
  if (qr !== 0) qs.push(qr);
  if (qo !== 0) qs.push((0x9e3779b9 ^ qo) | 0);
  for (const q of qs) {
    h ^= (q >>> 0);
    h = Math.imul(h, 0x01000193);
    h ^= h >>> 13;
  }
  return h >>> 0;
}
function mulberry32(seed) {
  let s = seed >>> 0;
  return function() {

      const l1 = Math.hypot(v1x, v1y), l2 = Math.hypot(v2x, v2y);

}

// ─── Audio: サンプル bank (base サンプルのみ、音程変化なし) ───
// 高速化 (v1.1): mp3 (48kbps mono, 約 900KB) + 並列ロード + ページロード直後に
// fetch 開始 (fetch は user gesture 不要)。decode は AudioContext 取得後。
const SAMPLE_EXT = ".mp3";
let audioCtx = null;
const sampleBank = new Map();   // key: "cv_ka" / "v_a" / "n_N" → AudioBuffer
const rawCache = new Map();     // key → ArrayBuffer (fetch 済み・decode 前)
let samplesLoaded = 0, samplesTotal = 0;

function ensureCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}
// leading silence trim (ConsonantSampleBank.trimLeadingSilence の移植):
// 閾値 0.01、onset が 80ms 超なら音韻的閉鎖とみなし trim しない。
// (mp3 のエンコーダ遅延 ~30ms もこれで吸収される)
function trimLeadingSilence(buf) {
  const ch = buf.getChannelData(0);
  const maxScan = Math.floor(ch.length * 4 / 5);
  let onset = -1;
  for (let i = 0; i < maxScan; i++) {
    if (Math.abs(ch[i]) > 0.01) { onset = i; break; }
  }
  const limit = Math.floor(buf.sampleRate * 0.08);   // 80ms
  if (onset <= 0 || onset > limit) return buf;
  const out = audioCtx.createBuffer(1, ch.length - onset, buf.sampleRate);
  out.getChannelData(0).set(ch.subarray(onset));
  return out;
}
// v7: 継続撥音 (v_<v>_nn) + CV→V diph (diph_<v1><v2>) の追加キー。
// 継続撥音は「v_a」だけ旧録音名 v_a_N (あん型) しか無い場合があるため fallback 候補を持つ
// (FormantSynth の「v_N フォールバック」の移植)。
const CONTN_VOWELS = VOWELS;
const CONTN_FALLBACK = { a: "v_a_N" };   // v_a_nn が無ければ v_a_N を同じキーで使う
const DIPH_PAIRS = ["ai", "au", "ei", "oi", "ou"];

function sampleKeys() {
  const keys = [];
  for (const c of CONSONANTS) {
    let vs = VOWELS;
    if (PALATALIZED.has(c) || SEMIVOWEL.has(c)) vs = ["a","u","o"];
    // ch は che 収録済 → 全母音 preload (cv_che も含む)
    for (const v of vs) keys.push("cv_" + c + v);
  }
  for (const v of VOWELS) keys.push("v_" + v);
  keys.push("n_N");
  for (const v of CONTN_VOWELS) keys.push("v_" + v + "_nn");
  for (const p of DIPH_PAIRS) keys.push("diph_" + p);
  return keys;
}
// key に対応する実ファイル名の候補列 (先頭から順に fetch を試す)。通常は [key] のみ。
function sampleUrlCandidates(key) {
  if (key.startsWith("v_") && key.endsWith("_nn")) {
    const vowel = key.slice(2, -3);   // "v_a_nn" → "a"
    const fb = CONTN_FALLBACK[vowel];
    if (fb) return [key, fb];
  }
  // (2026-07-11 v3: 母音単独の持続テイク優先 [v_aaaa 等] は撤回 — 延長機構の廃止で
  //  各モーラが個別に鳴る方式に戻ったため、1モーラ向けの自然な attack/decay を持つ
  //  短い v_<v> テイクをそのまま使うのが正しい)
  return [key];
}
// Phase 1: fetch (gesture 不要なのでページロード直後に並列で始める)
async function fetchSample(key) {
  if (rawCache.has(key)) return;
  for (const name of sampleUrlCandidates(key)) {
    try {
      const res = await fetch(SAMPLE_BASE + name + SAMPLE_EXT);
      if (res.ok) { rawCache.set(key, await res.arrayBuffer()); break; }
    } catch (e) { /* try next candidate */ }
  }
  if (!rawCache.has(key)) rawCache.set(key, null);
  samplesLoaded++;
  const el = document.getElementById("status");
  if (el) el.textContent = `loading ${samplesLoaded}/${samplesTotal}`;
  const note = document.getElementById("loading-note");
  if (note) note.textContent = T.loading(samplesLoaded, samplesTotal);
}
let fetchAllPromise = null;
function fetchAllSamples() {
  if (!fetchAllPromise) {
    const keys = sampleKeys();
    samplesTotal = keys.length;
    fetchAllPromise = Promise.all(keys.map(fetchSample));
  }
  return fetchAllPromise;
}
// (2026-07-11 v3: 長母音サステインの延長機構 — forward loop 版 computeLoopPoints も
//  ピンポン事前レンダ版 findSteadyWindow/pingPongExtend も — は削除した。経緯は
//  analyzeMoras のコメント参照。同一母音の連続はモーラ個別の再アタック再生に戻した。)
// Phase 2: decode。AudioContext は suspended 状態でも decode 可能なので、
// ページロード中に先行 decode する (gesture が要るのは resume = 発音のみ)。
async function decodeSample(key) {
  if (sampleBank.has(key)) return sampleBank.get(key);
  const raw = rawCache.get(key);
  if (raw === null) { sampleBank.set(key, null); return null; }   // fetch 失敗のみ確定
  if (!raw) return null;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = await audioCtx.decodeAudioData(raw.slice(0));
    const trimmed = trimLeadingSilence(buf);
    sampleBank.set(key, trimmed);
    return trimmed;
  } catch (e) {
    // decode 失敗は確定させない (suspended 起因なら gesture 後の preloadAll で再試行)
    return null;
  }
}
async function preloadAll() {
  await fetchAllSamples();
  await Promise.all(sampleKeys().map(decodeSample));
  const ok = [...sampleBank.values()].filter(Boolean).length;
  document.getElementById("status").textContent = `samples ready (${ok}/${samplesTotal})`;
}

function bufferFor(mora) {
  if (mora.isN) return sampleBank.get("n_N") ?? null;
  if (mora.onset === null) return sampleBank.get("v_" + mora.nucleus) ?? null;
  const exact = sampleBank.get("cv_" + mora.onset + mora.nucleus);
  if (exact) return exact;
  return sampleBank.get("cv_" + mora.onset + "a") ?? null;   // /a/ フォールバック
}
function contNBufferFor(vowel) { return sampleBank.get("v_" + vowel + "_nn") ?? null; }
function diphBufferFor(v1, v2) { return sampleBank.get("diph_" + v1 + v2) ?? null; }

// ─── モーラ列を走査し、通常再生ではカバーできない2パターンを検出する。
// (FormantSynth の continuationNVowel / cvDiphPrev の移植・簡易版)
//  - contN: 直前が母音で終わるモーラの後の ん → v_<v>_nn (無ければ n_N)。
//  - diphPartner: 直前が CV (onset 有) で終わり、母音が変わる V-only モーラ (かい/こう) →
//    diph_<v1><v2> の後半 (2 母音目への遷移部) を使う。
// 2026-07-11 v3: 長母音の連続延長 (chainRoot/chainMember) は**廃止**。同一母音の連続
// (iiii / かーー) は各モーラが v_<v> を個別に再アタックする旧スタイルに戻した。
// 経緯: forward loop (v1) → ピンポン事前レンダ (v2) と直しても実聴でグリッチ感が
// 残った — mp3 (22.05kHz 48kbps) の定常母音は圧縮の時間方向スミアリングが乗って
// おり、native の wav と同じ「1テイク継続」戦略が web では成立しない。個別再生は
// 折返し/継ぎ目という概念自体が無く、各モーラが録音の自然な attack/decay で鳴る。
function analyzeMoras(moras) {
  const plan = moras.map(() => ({ kind: "normal" }));
  for (let i = 0; i < moras.length; i++) {
    const m = moras[i];
    if (m.isN) {
      if (i > 0 && !moras[i - 1].isN) plan[i] = { kind: "contN", prevIndex: i - 1 };
      continue;
    }
    if (i > 0 && m.onset === null && moras[i - 1].onset !== null && !moras[i - 1].isN &&
        moras[i - 1].nucleus !== m.nucleus && diphBufferFor(moras[i - 1].nucleus, m.nucleus)) {
      plan[i] = { kind: "diphPartner", v1: moras[i - 1].nucleus, v2: m.nucleus };
    }

// ─── 再生: BPM グリッド (1 mora = 30000/BPM ms, 発話テンポ統一) ───
let activeNodes = [];
function stopAll() {

  // resume を試みつつ、statechange で running になった瞬間に pending を鳴らす。
  // (Safari では resume() の promise が user activation を得るまで pending のままに

    pendingEvent = event;
    ctx.resume().catch(() => {});
    ctx.addEventListener("statechange", function onState() {
      if (ctx.state !== "running") return;

        pendingEvent = null;

// (2026-07-11: ループ機構なし — 全モーラが1バッファ1発の素朴なスケジュール)
function scheduleOne(ctx, buf, start, dur, amplitude, bufferOffsetSec = 0) {

  g.gain.linearRampToValueAtTime(amplitude, start + 0.003);
  g.gain.setValueAtTime(amplitude, start + Math.max(0.003, dur - 0.012));

function scheduleEvent(ctx, event) {

      if (buf) scheduleOne(ctx, buf, t, moraSec, m.amplitude, offset);
    } else {
      const buf = bufferFor(m);
      if (buf) scheduleOne(ctx, buf, t, moraSec, m.amplitude);
    }
    t += moraSec;
  }
  renderMouthTimeline(ctx, mouthCells);
}

let lastAxes = { size: 0, sharp: 0, tex: 0, bright: 0 };
// 直近に鳴った event (PLAY での正確なリピート用)。

// seed がズレて別の語になってしまう。PLAY は「最後の発声そのもの」を繰り返し、

let lastEventAxes = null;   // lastEvent を作ったときの軸 (変更検知用)
let presetFirstTapDone = new Set();
let presetTapCounts = new Map();

function axesEqual(a, b) {
  if (!a || !b) return false;
  return Math.abs(a.size - b.size) < 1e-9 && Math.abs(a.sharp - b.sharp) < 1e-9 &&
         Math.abs(a.tex - b.tex) < 1e-9 && Math.abs(a.bright - b.bright) < 1e-9;
}
// ─── フィードバック収集 (👍👎) ───
// 各発声を「発話レコード」として保持し、投票されたものだけ feedbackLog に蓄積。
// localStorage に永続化し、COPY で JSON 書き出し → bias 表のデータ駆動調整に使う。
// FEEDBACK_ENDPOINT に URL を設定すると、投票を 1 件ずつ POST 送信もする
// (Google Apps Script 等で公開ユーザーから収集したい場合用。空なら何もしない)。
const FEEDBACK_ENDPOINT = "";
const FB_VERSION = 4;          // v4: 口の2軸/描線頂点列/K・角・語形タグ/エンジン版を追加 (v3: reason)
const ENGINE_VERSION = "v12";  // 生成/音声実現の版 (集計用)。v12 = 長母音を個別再アタック再生に戻した音声版 (生成ロジックは v11 と同一)
let feedbackLog = [];
try { feedbackLog = JSON.parse(localStorage.getItem("onomatoi.feedback") || "[]"); } catch (e) {}
let utteranceSeq = 0;
let currentUtterance = null;   // 投票対象 (直近の発声)

function saveFeedback() {
  if (feedbackLog.length > 500) feedbackLog = feedbackLog.slice(-500);
  try { localStorage.setItem("onomatoi.feedback", JSON.stringify(feedbackLog)); } catch (e) {}
  document.getElementById("fb-count").textContent = feedbackLog.length;
}
function setVoteButtons(enabled, sel) {
  for (const [id, v] of [["btn-good", 1], ["btn-bad", -1]]) {
    const b = document.getElementById(id);
    b.disabled = !enabled;
    b.classList.toggle("sel", sel === v);
  }
}
function vote(verdict) {
  if (!currentUtterance) return;
  const u = currentUtterance;
  // 同じ発話への再投票は上書き (👍→👎 の修正を許す)
  const idx = feedbackLog.findIndex(r => r.id === u.id);
  const reasonEl = document.getElementById("fb-reason");
  const rec = {
    v: FB_VERSION, id: u.id, t: new Date().toISOString(), lang: uiLang, eng: u.eng,
    src: u.src, word: u.word, mora: u.mora, redup: u.redup,
    axes: u.axes, moras: u.moras, vote: verdict,
    reason: reasonEl ? reasonEl.value.trim().slice(0, 200) : "",
    tags: [...activeFbTags],
  };
  if (u.k !== undefined) { rec.k = u.k; rec.cor = u.cor; rec.cs = u.cs; rec.lp = u.lp; }
  if (u.stroke) rec.stroke = u.stroke;
  if (idx >= 0) feedbackLog[idx] = rec; else feedbackLog.push(rec);
  saveFeedback();
  setVoteButtons(true, verdict);
  const tagBox = document.getElementById("fb-tags");
  if (tagBox) { tagBox.style.display = ""; renderFbTags(); }
  // 記録確認: ボタン横に「✓ 記録しました（計N件）」を一瞬表示
  const vm = document.getElementById("vote-msg");
  if (vm) {
    vm.textContent = T.fbSaved(feedbackLog.length);
    vm.classList.add("show");
    clearTimeout(window._voteMsgTimer);
    window._voteMsgTimer = setTimeout(() => vm.classList.remove("show"), 1800);
  }
  if (FEEDBACK_ENDPOINT) {
    try {
      fetch(FEEDBACK_ENDPOINT, { method: "POST", keepalive: true,
        headers: { "Content-Type": "text/plain" }, body: JSON.stringify(rec) });
    } catch (e) {}
  }
}

// ─── 構造化タグ (2026-07-11, v4): 投票後に「どう違うか」の方向をワンタップで残せる ───

// ─── なぜ? (Onomatopoeia.explain の移植・日英) — 測って見せる説明 ───
function explainEvent(ax, moras) {
  const voiced = moras.filter(m => !m.isSilentRest);
  if (!voiced.length) return [];
  const ja = uiLang === "ja";
  const f = v => (v >= 0 ? "+" : "") + v.toFixed(2);
  const onsets = voiced.map(m => m.onset).filter(c => c);
  const lines = [];
  // 子音の性格 ← sharpness
  if (ax.sharp > 0.25) lines.push(ja ? `鋭さ ${f(ax.sharp)}（尖り）→ 鋭い子音（か・た・さ・つ系）`
                                     : `sharp ${f(ax.sharp)} (spiky) → hard consonants (k/t/s/ts)`);
  else if (ax.sharp < -0.25) lines.push(ja ? `鋭さ ${f(ax.sharp)}（丸み）→ 柔らかい子音（ま・わ・な・ら系）`
                                           : `sharp ${f(ax.sharp)} (rounded) → soft consonants (m/w/n/r)`);
  // 母音 ← 口の形
  const vr = [];
  if ((ax.open ?? 0) > 0.3) vr.push(ja ? "開いた口→あ/え" : "open mouth→a/e");
  else if ((ax.open ?? 0) < -0.3) vr.push(ja ? "閉じた口→い/う" : "closed mouth→i/u");
  if ((ax.round ?? 0) > 0.25) vr.push(ja ? "すぼめ→う/お" : "pursed lips→u/o");
  else if ((ax.round ?? 0) < -0.25) vr.push(ja ? "横引き→い/え" : "spread lips→i/e");
  if (!vr.length && ax.size > 0.3) vr.push(ja ? "大→あ" : "big→a");
  if (vr.length) lines.push((ja ? "口の形 → 母音 " : "mouth → vowels: ") + vr.join(ja ? "・" : ", "));
  // 清濁 ← size (重さ)。阻害音 = 破裂/破擦/摩擦 (manner class)
  const OBS = new Set(["p", "a", "f"]);
  const hasVoicedObs = onsets.some(c => VOICED.has(c) && OBS.has(mannerClassOf(c)));
  const hasVoicelessObs = onsets.some(c => !VOICED.has(c) && OBS.has(mannerClassOf(c)));
  if (ax.size > 0.5 && hasVoicedObs)
    lines.push(ja ? "大きい=重い → 濁音（が・ば・ざ）" : "big = heavy → voiced (g/b/z)");
  else if (ax.size < -0.5 && hasVoicelessObs)
    lines.push(ja ? "小さい=軽い → 清音（か・ぱ・さ）" : "small = light → voiceless (k/p/s)");
  // 語形 (実際の末尾から型を読む)
  lines.push((ja ? "語形: " : "form: ") + whyFormReason(ax, voiced, ja));
  // ピッチ ← brightness / size
  if (ax.bright > 0.3 || ax.size < -0.3)
    lines.push(ja ? "明るい/小さい → 高めのピッチ" : "bright/small → higher pitch");
  else if (ax.bright < -0.3 || ax.size > 0.3)
    lines.push(ja ? "暗い/大きい → 低めのピッチ" : "dark/big → lower pitch");
  return lines;
}
function whyFormReason(ax, moras, ja) {
  const f = v => (v >= 0 ? "+" : "") + v.toFixed(2);
  const loops = moras.filter(m => !m.isN);
  if (loops.length >= 2 && loops.slice(1).every(m => m.onset === null && m.nucleus === loops[0].nucleus))
    return ja ? "一筆の連続（口を保持）→ 長音を伸ばす（あーーー型）"
              : "one held stroke → sustained vowel (aaaa-type)";
  if (loops.length >= 2 && loops.length % 2 === 0) {
    const h = loops.length / 2;
    const key = m => (m.onset ?? "_") + m.nucleus;
    if (loops.slice(0, h).map(key).join() === loops.slice(h).map(key).join())
      return ja ? `反復（texture ${f(ax.tex)}）→ 畳語ABAB（きらきら型）`
                : `repetition (texture ${f(ax.tex)}) → reduplication ABAB (kira-kira type)`;
  }
  const last = moras[moras.length - 1];
  if (last) {
    if (last.isQ) return ja ? "鋭く単発（鋭さ高・反復低）→ 促音っ（ぱっ型）"
                            : "sharp one-shot → geminate Q (paQ-type)";
    if (last.isN) return ja ? "重・鋭・単発の衝撃 → 撥音ん（どん型）"
                            : "heavy sharp impact → moraic N (doN-type)";
    if (last.onset === null && moras.length >= 2 && last.nucleus === moras[moras.length - 2].nucleus)
      return ja ? `大きい（size ${f(ax.size)}）→ 長音ー（がーん型）`
                : `big (size ${f(ax.size)}) → long vowel (gaan-type)`;
    if (last.onset === "r" && last.nucleus === "i")
      return ja ? "小・柔・単発 → り（きらり型）" : "small soft one-shot → -ri (kirari-type)";
  }
  return ja ? "素の語根" : "plain root";
}
function updateWhy(ax, moras) {
  const panel = document.getElementById("why-panel");
  if (!panel) return;
  const lines = explainEvent(ax, moras);
  if (!lines.length) { panel.style.display = "none"; return; }
  document.getElementById("why-title").textContent = uiLang === "ja" ? "なぜ?" : "why?";
  const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;");
  document.getElementById("why-lines").innerHTML = lines.map(l => "· " + esc(l)).join("<br>");
  panel.style.display = "";
}

// event を「最後の発声」として記憶しつつ表示・再生する。
// src は発声の出どころ (draw/tune/preset/romaji/log) — フィードバック集計の文脈情報。
function playAndRemember(event, axesUsed, log, src = "tune", extra = {}) {
  lastEvent = event;
  lastEventAxes = { ...axesUsed };
  // 投票対象を更新 (再生のたびに新しい発話 ID。PLAY リピートでは更新しない)
  utteranceSeq += 1;
  const r3 = v => Math.round((v ?? 0) * 1000) / 1000;
  currentUtterance = {
    id: Date.now().toString(36) + "-" + utteranceSeq,
    src,
    eng: ENGINE_VERSION,
    word: romajiOf(event),
    mora: event.moras.filter(m => !m.isSilentRest).length,
    redup: !!event.isRedup,
    // v4: 口の2軸 (round/open) を含む全6軸 — 口モデルの投票相関がとれる
    axes: { s: r3(axesUsed.size), sh: r3(axesUsed.sharp), t: r3(axesUsed.tex),
            b: r3(axesUsed.bright), r: r3(axesUsed.round), o: r3(axesUsed.open) },
    // v4: モーラ列の実体 (romaji 文字列より曖昧性なく音素相関がとれる)
    moras: event.moras.filter(m => !m.isSilentRest)
      .map(m => (m.isN ? "N" : m.isQ ? "Q" : (m.onset ?? "") + m.nucleus)),
    // v4: 判定に使われた導出量 (K・角・鋭さ・ループ) — kiki/manner のデータ駆動調整用
    ...(extra.k !== undefined ? { k: r3(extra.k), cor: extra.corners ?? 0,
                                  cs: r3(extra.cs), lp: extra.loops ?? 0 } : {}),
    // v4: 描いた線の頂点列 (粗い筆の珠・正規化・≤48点) — 将来のエンジンで再抽出できる生データ
    ...(extra.stroke ? { stroke: extra.stroke } : {}),
  };
  setVoteButtons(true, null);
  const reasonEl = document.getElementById("fb-reason");
  if (reasonEl) reasonEl.value = "";   // 新しい発話 → 理由欄をリセット
  activeFbTags = new Set();            // タグもリセット (次の投票まで隠す)
  const tagBox = document.getElementById("fb-tags");
  if (tagBox) tagBox.style.display = "none";
  showResult(event);
  updateWhy(axesUsed, event.moras);   // なぜ? (native の explain と同じ「測って見せる」説明)
  playEvent(event);
  if (log) appendLog(event);
}

// 口アイコン (2026-07-10, ChatGPT提案): round/open を連続的に口の形へ。
// 「描いた形を口として読んでいる」ことが数値なしで一瞬で伝わる。
const VOWEL_MOUTH = { "あ": [0.85, 0.0], "い": [-0.6, -0.8], "う": [-0.3, 0.8],
                      "え": [0.5, -0.4], "お": [0.4, 0.7] };   // [open, round]
const VOWEL_MOUTH_L = { a: VOWEL_MOUTH["あ"], i: VOWEL_MOUTH["い"], u: VOWEL_MOUTH["う"],
                        e: VOWEL_MOUTH["え"], o: VOWEL_MOUTH["お"] };
// 口の楕円を 1 個描く (mouth-icon と P3 推移列で共用)。
// lineWidth/fillAlpha で active 強調を表現 (native MouthTimelineView と同じ流儀)。
function strokeMouth(c, w, h, open, round, lineWidth, fillAlpha) {
  c.clearRect(0, 0, w, h);
  const spreadN = (1 - round) / 2;
  const openN = (open + 1) / 2;
  const mw = (0.30 + 0.55 * spreadN) * w;
  const mh = Math.max(2.2, (0.06 + 0.62 * openN) * h);
  c.beginPath();
  c.ellipse(w / 2, h / 2, mw / 2, mh / 2, 0, 0, 2 * Math.PI);
  if (fillAlpha > 0 && mh > h * 0.18) {
    c.fillStyle = `rgba(232,93,161,${fillAlpha})`; c.fill();
  }
  c.strokeStyle = "#e85da1";
  c.lineWidth = lineWidth;
  c.stroke();
}
function drawMouthIcon(open, round) {
  const cv = document.getElementById("mouth-icon");
  if (!cv) return;
  strokeMouth(cv.getContext("2d"), cv.width, cv.height, open, round, 2.2, 0.16);
  // 最も近い母音の仮名を添える (口の空間での最近傍)
  let best = "", bestD = Infinity;
  for (const [kana, [o, r]] of Object.entries(VOWEL_MOUTH)) {
    const d = (open - o) ** 2 + (round - r) ** 2;
    if (d < bestD) { bestD = d; best = kana; }
  }
  const el = document.getElementById("mouth-vowel");
  if (el) el.textContent = best;
}

// ─── P3: 口の推移列 (native ② MouthTimelineView の移植, 2026-07-11) ───
// 発話スケジュールと同期して、モーラごとの口の形が並ぶ。いま鳴っているモーラの
// 口が立ち (fill+太線+拡大)、発話済みは 0.85 で残り、未発話は 0.35 で待つ。
// 発話が終わっても列は残る (native と同じ「終了後も推移が読める」挙動)。
const MOUTH_N = [-0.9, -0.2];   // ん (と促音の閉じ): ほぼ閉じた口
function mouthForMora(m) {
  return m.isN ? MOUTH_N : (VOWEL_MOUTH_L[m.nucleus] ?? [0, 0]);
}
function moraLabel(m) {
  return m.isN ? "n" : (m.onset ?? "") + m.nucleus;
}
// 駆動は requestAnimationFrame でなく setInterval (50ms): 状態変化はモーラ単位
// (250ms) の離散なので十分滑らかで、RAF と違い非フォーカスタブでも止まらない
// (発話は AudioContext 時刻で進むので、表示だけ freeze すると列が置き去りになる)。
let mouthTimelineTimer = 0;
// cells: [{ m, start, end }] — start/end は AudioContext 時刻 (scheduleEvent が渡す)。
function renderMouthTimeline(ctx, cells) {
  const box = document.getElementById("mouth-timeline");
  const arrow = document.getElementById("mouth-arrow");
  if (!box) return;
  clearInterval(mouthTimelineTimer);
  box.innerHTML = "";
  if (!cells.length) { if (arrow) arrow.style.display = "none"; return; }
  if (arrow) arrow.style.display = "";
  const small = cells.length > 10;
  const cw = small ? 16 : 22, chh = small ? 14 : 18;
  const items = cells.map(cell => {
    const wrap = document.createElement("div");
    wrap.style.cssText = "display:flex; flex-direction:column; align-items:center; gap:1px;";
    const cv = document.createElement("canvas");
    cv.width = cw; cv.height = chh;
    cv.style.cssText = "transition:transform 0.08s;";
    const lb = document.createElement("div");
    lb.textContent = moraLabel(cell.m);
    lb.style.cssText = "font-size:8px; color:#999; line-height:1;";
    wrap.appendChild(cv); wrap.appendChild(lb);
    box.appendChild(wrap);
    return { ...cell, wrap, cv, lb, mouth: mouthForMora(cell.m), lastState: null };
  });
  const totalEnd = items[items.length - 1].end;
  function paint() {
    const now = ctx.currentTime;
    let anyPending = false;
    for (const it of items) {
      const state = now >= it.start && now < it.end ? "active"
                  : now >= it.end ? "spoken" : "pending";
      if (state === "pending") anyPending = true;
      if (state === it.lastState) continue;   // 状態が変わった時だけ再描画
      it.lastState = state;
      const active = state === "active";
      strokeMouth(it.cv.getContext("2d"), cw, chh, it.mouth[0], it.mouth[1],
                  active ? 2.4 : 1.7, active ? 0.30 : 0);
      it.cv.style.transform = active ? "scale(1.28)" : "scale(1)";
      it.wrap.style.opacity = active ? "1.0" : (state === "spoken" ? "0.85" : "0.35");
      it.lb.style.color = active ? "#e85da1" : "#999";
    }
    if (now >= totalEnd + 0.3 && !anyPending) {
      clearInterval(mouthTimelineTimer);   // 停止 = 最終状態 (全部 spoken 0.85) が残る
    }
  }
  paint();
  mouthTimelineTimer = setInterval(paint, 50);
}

function setSliders(ax) {
  lastAxes = { ...ax };
  const pairs = [["size","size"],["sharp","sharp"],["tex","tex"],["bright","bright"],
                 ["round","round"],["open","open"]];
  for (const [id, key] of pairs) {
    const v = ax[key] ?? 0;
    document.getElementById("ax-" + id).value = v;
    document.getElementById("val-" + id).textContent = (v >= 0 ? "+" : "") + v.toFixed(2);
  }
  drawMouthIcon(ax.open ?? 0, ax.round ?? 0);
}
function readSliders() {
  return {
    size: Number(document.getElementById("ax-size").value),
    sharp: Number(document.getElementById("ax-sharp").value),
    tex: Number(document.getElementById("ax-tex").value),
    bright: Number(document.getElementById("ax-bright").value),
    round: Number(document.getElementById("ax-round").value),
    open: Number(document.getElementById("ax-open").value),
  };
}
function showResult(event) {
  document.getElementById("result-word").textContent = romajiOf(event);
  const n = event.moras.length;
  document.getElementById("result-meta").innerHTML =
    `${n} mora${event.isRedup ? " · redup" : ""}`;   // F0 は Web 版では音に反映されないため非表示
}
function appendLog(event) {
  logEntries.push({ axes: { ...event.axes }, romaji: romajiOf(event),
                    f0: event.baseF0, moras: event.moras.map(m => ({ ...m })),
                    isRedup: event.isRedup });
  if (logEntries.length > 100) logEntries.shift();
  renderLog();
}
function renderLog() {
  const el = document.getElementById("log");
  document.getElementById("log-count").textContent = logEntries.length;
  el.innerHTML = "";
  for (let i = logEntries.length - 1; i >= 0; i--) {
    const e = logEntries[i];
    const row = document.createElement("div");
    row.className = "log-row";
    const fmt = v => (v >= 0 ? "+" : "") + v.toFixed(1);
    row.innerHTML =
      `<span class="axes">${fmt(e.axes.size)} ${fmt(e.axes.sharp)} ${fmt(e.axes.tex)} ${fmt(e.axes.bright)} →</span>` +
      `<span class="word">${e.romaji}</span>` +
      `<span class="meta">m:${e.moras.length}${e.isRedup ? "R" : ""}</span>`;
    // タップで「そのシニフィアンそのもの」を再生 (保存 mora 列、iPad 版 v0.4 と同じ)
    row.addEventListener("click", () => {
      setSliders(e.axes);
      const ev = { axes: e.axes, moras: e.moras, baseF0: e.f0, isRedup: e.isRedup };
      playAndRemember(ev, e.axes, false, "log");   // PLAY で同じ語をリピート可能に
    });
    el.appendChild(row);
  }
}

// 生成 + 再生 + ログ (決定的 seed)
function generateAndPlay(axes, salt = 0, log = true, src = "tune", opts = {}, extra = {}) {
  let event;
  if (opts.kiki != null) {
    // 語レベル K 整合ゲート: 語の K が描画の K とズレたら salt を変えて再試行 (最大3案・決定的)
    let best = null, bestD = Infinity;
    for (let a = 0; a < 3; a++) {
      const rand = mulberry32(axesSeed(axes, salt + a));
      const ev = generate(axes, rand, 0.4, opts);
      const d = Math.abs(wordK(ev.moras) - opts.kiki);
      if (d < bestD) { best = ev; bestD = d; }
      if (d <= 0.35) break;
    }
    event = best;
  } else {
    const rand = mulberry32(axesSeed(axes, salt));
    event = generate(axes, rand, 0.4, opts);
  }
  playAndRemember(event, axes, log, src, extra);
  return event;
}

// ─── Canvas (sketch) ───
const canvas = document.getElementById("canvas");
const cctx = canvas.getContext("2d");
let drawing = false, stroke = [], presetShapePts = null;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  redraw();
}
function redraw() {
  const rect = canvas.getBoundingClientRect();
  cctx.clearRect(0, 0, rect.width, rect.height);
  // プリセット見本の形 (薄ピンク)
  if (presetShapePts && presetShapePts.length > 1) {
    cctx.beginPath();
    cctx.strokeStyle = "rgba(232,72,138,0.30)";
    cctx.lineWidth = 2;
    presetShapePts.forEach((p, i) => {
      const x = p.x * rect.width, y = p.y * rect.height;
      i === 0 ? cctx.moveTo(x, y) : cctx.lineTo(x, y);
    });
    cctx.stroke();
  }
  if (stroke.length > 0 && coarseInkOn()) {
    // 粗い筆: 珠を繋ぐ太いインク + 置けた角のスパーク (判定と同じ 0.83rad) + 未確定の糸
    if (stroke.length > 1) {
      cctx.beginPath();
      cctx.strokeStyle = "rgba(40,40,40,0.9)";
      cctx.lineWidth = 5.5;
      cctx.lineCap = "round";
      cctx.lineJoin = "round";
      stroke.forEach((p, i) => i === 0 ? cctx.moveTo(p.x, p.y) : cctx.lineTo(p.x, p.y));
      cctx.stroke();
    }
    cctx.fillStyle = "rgba(20,20,20,0.95)";
    for (const p of stroke) {
      cctx.beginPath(); cctx.arc(p.x, p.y, 2.6, 0, 2 * Math.PI); cctx.fill();
    }
    for (let i = 1; i < stroke.length - 1; i++) {
      const a = stroke[i-1], b = stroke[i], c = stroke[i+1];
      const v1x = b.x - a.x, v1y = b.y - a.y, v2x = c.x - b.x, v2y = c.y - b.y;
      const l1 = Math.hypot(v1x, v1y), l2 = Math.hypot(v2x, v2y);
      if (l1 < 1e-6 || l2 < 1e-6) continue;
      const turn = Math.acos(Math.max(-1, Math.min(1, (v1x*v2x + v1y*v2y) / (l1*l2))));
      if (turn > 0.83) {
        cctx.beginPath();
        cctx.strokeStyle = "rgba(232,93,161,0.9)";
        cctx.lineWidth = 2.2;
        cctx.arc(b.x, b.y, 7.5, 0, 2 * Math.PI);
        cctx.stroke();
      }
    }
    if (pendingPt && stroke.length > 0) {
      const last = stroke[stroke.length - 1];
      cctx.beginPath();
      cctx.strokeStyle = "rgba(0,0,0,0.22)";
      cctx.lineWidth = 2;
      cctx.setLineDash([4, 4]);
      cctx.moveTo(last.x, last.y);
      cctx.lineTo(pendingPt.x, pendingPt.y);
      cctx.stroke();
      cctx.setLineDash([]);
    }
  } else if (stroke.length > 1) {
    cctx.beginPath();
    cctx.strokeStyle = "#555";
    cctx.lineWidth = 2.5;
    cctx.lineCap = "round";
    cctx.lineJoin = "round";
    stroke.forEach((p, i) => i === 0 ? cctx.moveTo(p.x, p.y) : cctx.lineTo(p.x, p.y));
    cctx.stroke();
  }
}
function coarseInkOn() { return true; }   // 2026-07-11: 粗い筆のみ (トグル廃止・データの均質化)
let pendingPt = null;
function pointerPos(ev) {
  const rect = canvas.getBoundingClientRect();
  return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
}
canvas.addEventListener("pointerdown", ev => {
  ensureCtx();
  drawing = true;
  presetShapePts = null;
  stroke = [pointerPos(ev)];
  canvas.setPointerCapture(ev.pointerId);
  ev.preventDefault();
});
canvas.addEventListener("pointermove", ev => {
  if (!drawing) return;
  const p = pointerPos(ev);
  if (coarseInkOn() && stroke.length > 0) {
    // 粗い筆: 最後の頂点から step 以上動いたときだけ頂点を確定 (ステップ未満は未確定の糸)。
    const rect = canvas.getBoundingClientRect();
    const step = Math.hypot(rect.width, rect.height) * 0.022;
    const last = stroke[stroke.length - 1];
    if (Math.hypot(p.x - last.x, p.y - last.y) >= step) {
      stroke.push(p);
      pendingPt = null;
    } else {
      pendingPt = p;
    }
  } else {
    stroke.push(p);
  }
  redraw();
  ev.preventDefault();
});
canvas.addEventListener("pointerup", ev => {
  if (!drawing) return;
  drawing = false;
  const coarse = coarseInkOn();
  if (coarse) {
    // 終端補完 (点タップ=1頂点が語にならないのを防ぐ + 端の形)
    if (pendingPt && stroke.length > 0) {
      const last = stroke[stroke.length - 1];
      if (Math.hypot(pendingPt.x - last.x, pendingPt.y - last.y) > 2) stroke.push(pendingPt);
    }
    pendingPt = null;
  }
  // 抽出・下流は密化版 (同じ折れ線の調律済み密度)。表示 (stroke) は珠のまま保つ。
  const inkPts = (coarse && stroke.length >= 2) ? densified(stroke, 6) : stroke;
  if (inkPts.length >= 2) {
    const rect = canvas.getBoundingClientRect();
    const raw = extractAxes(inkPts, rect.width, rect.height);
    const hc = Number(document.getElementById("kn-hc").value);
    let ax = applyHandCorrection(raw, hc, !coarse);
    // 粗い筆: 軸の知覚バケット (0.25) — 似た描写→同一の軸→同一の語 (再現性の要)。
    if (coarse) ax = bucketedAxes(ax, 0.25);
    setSliders(ax);
    // 最新 Core 適応 (2026-07-09): 複雑さ → 語長 / bouba・kiki 大域判定 / 一筆連続=長音 /
    // 構造単位 (ループ≥2 → ループ=音節・つなぎ線=ー,ん,っ,直結)。同じ描写 = 同じ語 (決定的)。
    const cx = strokeComplexity(inkPts, rect.width, rect.height, 16);
    let kDraw = drawK(ax.sharp, cx.corners, cx.cornerSharpness);
    if (coarse) kDraw = Math.round(kDraw / 0.125) * 0.125;   // K も同じ格子に
    // manner 次元 (2026-07-10): 描線の動態 → 子音の調音方法の親和。
    const mDraw = mannerProfile(ax.sharp, cx.corners, cx.cornerSharpness, ax.tex, cx.loops);
    // cornerSharpness<0.35: 角が丸まって2個以下に数えられた三角の「保持=長音」誤爆を防ぐ保険。
    const sustained = cx.loops <= 1 && cx.corners <= 2 && cx.cornerSharpness < 0.35
      && ax.tex < 0.3 && cx.moraCount >= 2;
    const seg = segmentStroke(inkPts);
    // v4 フィードバック用の発話コンテキスト: 判定に使った導出量 + 描いた珠の頂点列 (正規化・≤48点)。
    const r3 = v => Math.round(v * 1000) / 1000;
    const beads = (coarse ? stroke : inkPts).slice(0, 48)
      .map(p => [r3(p.x / rect.width), r3(p.y / rect.height)]);
    const extra = { k: kDraw, corners: cx.corners, cs: cx.cornerSharpness,
                    loops: cx.loops, stroke: beads };
    if (unitEligible(seg)) {
      const event = generateFromUnits(seg.units, rect.width, rect.height, ax, kDraw, 0.4, mDraw);
      playAndRemember(event, ax, true, "draw", extra);
    } else {
      generateAndPlay(ax, 0, true, "draw",
                      { moraCountOverride: cx.moraCount, kiki: kDraw, manner: mDraw,
                        sustained, lengthHint: cx.moraCount }, extra);
    }
  }
  ev.preventDefault();
});

// ROMAJI 直接入力 (parseMora の移植)
function parseMora(token, withQ) {
  if (!token) return null;
  const gapFor = c => withQ ? geminateGapMs(c) : 0;
  if (VOWELS.includes(token))
    return { onset: null, nucleus: token, durationMs: 180, gapMs: gapFor(null), amplitude: 1, isN: false };
  for (const c2 of ["sh","ts","ch","ky","gy","ny"]) {
    if (token.startsWith(c2) && VOWELS.includes(token.slice(c2.length)))
      return { onset: c2, nucleus: token.slice(c2.length), durationMs: 180, gapMs: gapFor(c2), amplitude: 1, isN: false };
  }
  if (token.length === 2 && CONSONANTS.includes(token[0]) && VOWELS.includes(token[1]))
    return { onset: token[0], nucleus: token[1], durationMs: 180, gapMs: gapFor(token[0]), amplitude: 1, isN: false };
  return null;
}
// 語 (space 不要) を greedy CV で自動分割 (Romaji.segmentWord の移植)。
// 例: "bouba"→bo-u-ba, "kirakira"→ki-ra-ki-ra, "doN"/"don"→do-ん。
// 3文字(拗音等)→2文字(CV)→1文字(母音) の順に試し、"n" は次が母音/y+母音でなければ撥音。
function segmentWord(word) {
  const s = Array.from(word.toLowerCase());
  const vowels = new Set(["a","i","u","e","o"]);
  const sub = (a, len) => (a >= 0 && a + len <= s.length) ? s.slice(a, a + len).join("") : null;
  const moras = [];
  let i = 0, pendingQ = false;
  const geminable = new Set(["k","g","s","z","t","d","h","f","p","b","m","y","r","w","c","j"]);
  while (i < s.length) {
    const c = s[i];
    if (c === "q") { pendingQ = true; i += 1; continue; }
    // 通常ローマ字の促音 (2026-07-09): 子音字の重ね = っ (kutta/kappa/maccha)。nn は撥音なので除外。
    if (i + 1 < s.length && c === s[i + 1] && geminable.has(c)) { pendingQ = true; i += 1; continue; }
    // ヘボン式の っち = tch (matcha): t + ch → 促音 + ち。
    if (c === "t" && i + 2 < s.length && s[i + 1] === "c" && s[i + 2] === "h") { pendingQ = true; i += 1; continue; }
    if (c === "n") {
      const nextV = i + 1 < s.length && vowels.has(s[i + 1]);
      const isNy = i + 2 < s.length && s[i + 1] === "y" && vowels.has(s[i + 2]);
      if (!nextV && !isNy) {
        moras.push({ onset: null, nucleus: "a", durationMs: 160,
                     gapMs: pendingQ ? 70 : 0, amplitude: 1, isN: true, isQ: false });
        pendingQ = false; i += 1; continue;
      }
    }
    let matched = false;
    for (const len of [3, 2, 1]) {
      const t = sub(i, len);
      if (!t) continue;
      const m = parseMora(t, pendingQ);
      if (m) { moras.push(m); pendingQ = false; i += len; matched = true; break; }
    }
    if (!matched) i += 1;   // 解析不能な文字は飛ばす
  }
  if (pendingQ) {
    const last = [...moras].reverse().find(m => !m.isN && !m.isQ);
    if (last) moras.push(finalSokuonMora(last.nucleus));
  }
  return moras;
}

// fetch + decode はどちらも user gesture 不要 (AudioContext は suspended のまま
// decode できる) → ページロード直後から全部済ませる。gesture が要るのは resume のみ。
// バナーは「本当に鳴らせる状態」になるまで loading を表示し、さらに最低表示時間を
// 保証する (早すぎる「準備完了」で戸惑わないように)。
// 読込 (fetch+decode) はページロード直後に。完了したら「▶ タップして開始」ボタンを出す。
// その明示タップで AudioContext を resume (確実な user gesture) → 以降は描いた瞬間に鳴る。
(async () => {
  await fetchAllSamples();
  try { await Promise.all(sampleKeys().map(decodeSample)); } catch (e) {}
  const ok = [...sampleBank.values()].filter(Boolean).length;
  document.getElementById("status").textContent = `samples ready (${ok}/${samplesTotal})`;
  showStartButton();
})();

function showStartButton() {
  const note = document.getElementById("loading-note");
  if (!note) return;
  note.textContent = T.start;
  // インライン style が CSS class より優先されるので、目立つボタン見た目を inline で設定
  Object.assign(note.style, { background: "var(--pink)", color: "#fff", cursor: "pointer",
    textAlign: "center", fontWeight: "800", fontSize: "15px", padding: "13px 10px" });
  note.onclick = startApp;
}
function startApp() {
  const note = document.getElementById("loading-note");
  const ctx = ensureCtx();              // user gesture 内で生成/取得
  try {                                 // WebKit 古典アンロック (無音1サンプル即再生)
    const b = ctx.createBuffer(1, 1, 22050);
    const s = ctx.createBufferSource(); s.buffer = b; s.connect(ctx.destination); s.start(0);
  } catch (e) {}
  const finish = () => {
    if (!note) return;
    note.onclick = null;
    // 開始後は声のクレジット表示 (元の控えめな見た目に戻す)
    Object.assign(note.style, { background: "rgba(77, 191, 242, 0.13)", color: "#1899c2",
      cursor: "default", textAlign: "left", fontWeight: "normal", fontSize: "11px", padding: "6px 10px" });
    note.textContent = T.voice;
  };
  ctx.resume().then(finish).catch(finish);
}
// AudioContext のアンロック: iOS/macOS Safari は一部イベントしか user activation と
// 認めないため、複数イベントで試みる (running になったら全て解除)。
// resume() に加え、ジェスチャーハンドラ内での無音バッファ即時再生 (WebKit の古典的
// アンロック手法) も行う — resume 単独では解除されない環境への保険。
const UNLOCK_EVENTS = ["pointerdown", "pointerup", "touchstart", "touchend", "mousedown", "click", "keydown"];
function unlockAudio() {
  const ctx = ensureCtx();   // gesture 内で resume
  try {
    // 1 サンプルの無音を即時再生 → WebKit がこのコンテキストを「許可済み」にする
    const b = ctx.createBuffer(1, 1, 22050);
    const s = ctx.createBufferSource();
    s.buffer = b;
    s.connect(ctx.destination);
    s.start(0);
  } catch (e) {}
  preloadAll();              // 万一 decode 失敗が残っていれば再試行
  if (ctx.state === "running") {
    for (const ev of UNLOCK_EVENTS) document.removeEventListener(ev, unlockAudio);
  }
}
for (const ev of UNLOCK_EVENTS) document.addEventListener(ev, unlockAudio);
