<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Onomatoi / おのまとい</title>
<style>
  :root {
    --pink: #e8488a;
    --pink-bg: rgba(232, 72, 138, 0.10);
    --pink-bg2: rgba(232, 72, 138, 0.18);
    --gray: #888;
    --border: rgba(0,0,0,0.10);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  body {
    font-family: "SF Mono", ui-monospace, Menlo, Consolas, monospace;
    background: #fff; color: #111;
    padding: 10px; max-width: 900px; margin: 0 auto;
  }
  header { display: flex; align-items: baseline; gap: 8px; padding: 6px 2px 10px; }
  header .brand { font-size: 12px; font-weight: 800; color: var(--gray); }
  header .pts { font-size: 14px; font-weight: 800; color: var(--pink); }
  header .sub { margin-left: auto; font-size: 9px; color: var(--gray); }
  .panel {
    background: #fff; border: 1px solid var(--border); border-radius: 8px;
    padding: 10px; margin-bottom: 8px;
  }
  .panel-title { font-size: 10px; font-weight: 800; color: var(--pink); letter-spacing: 0.5px; }
  #canvas {
    width: 100%; height: 260px; display: block; border: 1px solid var(--pink-bg2);
    border-radius: 8px; touch-action: none; cursor: crosshair; background: #fff;
  }
  .row { display: flex; align-items: center; gap: 8px; }
  .result-word { font-size: 30px; font-weight: 700; min-height: 38px; word-break: break-all; }
  .result-meta { margin-left: auto; text-align: right; font-size: 11px; color: var(--gray); white-space: nowrap; }
  .axis-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
  /* 2026-07-17: 開発用コントロール (軸スライダー/hand corr) は既定非表示 — ?dev=1 で表示。
     !important: .knob-row (後方定義・display:flex) との同特異度競合に勝つため。 */
  .dev-only { display: none !important; }
  .axis-row label { width: 64px; font-size: 10px; color: var(--gray); }
  .axis-row input[type=range] { flex: 1; accent-color: var(--pink); }
  .axis-row .val { width: 48px; text-align: right; font-size: 10px; color: var(--gray); }
  button {
    font-family: inherit; font-size: 10px; font-weight: 700;
    border: none; border-radius: 4px; padding: 5px 10px; cursor: pointer;
    background: var(--pink-bg); color: var(--pink);
  }
  button:active { background: var(--pink-bg2); }
  button.primary { background: var(--pink); color: #fff; padding: 8px 16px; font-size: 12px; }
  button.gray { background: rgba(0,0,0,0.06); color: var(--gray); }
  .chips { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 8px; }
  .chips button { font-size: 9px; font-weight: 500; }
  #romaji-input {
    flex: 1; font-family: inherit; font-size: 14px; padding: 8px 10px;
    border: 1.5px solid var(--pink-bg2); border-radius: 7px; outline: none;
  }
  #romaji-input:focus { border-color: var(--pink); }
  #log { max-height: 160px; overflow-y: auto; margin-top: 6px; }
  .log-row {
    display: flex; gap: 8px; align-items: baseline; font-size: 10px;
    padding: 2px 0; cursor: pointer; border-radius: 3px;
  }
  .log-row:hover { background: var(--pink-bg); }
  .log-row .axes { color: var(--gray); width: 150px; flex-shrink: 0; }
  .log-row .word { font-weight: 700; font-size: 11px; }
  .log-row .meta { color: var(--gray); margin-left: auto; }
  .hint { font-size: 9px; color: var(--gray); }
  .vote { display: flex; gap: 4px; align-items: center; }
  .vote button {
    font-size: 17px; background: none; padding: 4px 7px; opacity: 0.45;
    border-radius: 6px;
  }
  .vote button.sel { opacity: 1; background: var(--pink-bg2); box-shadow: 0 0 0 2px var(--pink); transform: scale(1.12); }
  .vote button:disabled { opacity: 0.15; cursor: default; box-shadow: none; transform: none; }
  #vote-msg { font-size: 11px; font-weight: 700; color: #1899c2; opacity: 0;
              transition: opacity 0.25s; white-space: nowrap; margin-left: 2px; }
  #vote-msg.show { opacity: 1; }
  #loading-note.start-ready {
    cursor: pointer; text-align: center; font-size: 14px; font-weight: 800;
    color: #fff; background: var(--pink); padding: 12px 10px; user-select: none;
  }
  #loading-note.start-ready:active { background: var(--pink-bg2); color: var(--pink); }
  #status { font-size: 9px; color: var(--gray); margin-left: auto; }
  .knob-row { display: flex; gap: 16px; flex-wrap: wrap; }
  .knob-row .knob { display: flex; align-items: center; gap: 6px; font-size: 10px; color: var(--gray); }
  .knob-row input[type=range] { width: 110px; accent-color: var(--pink); }
</style>
</head>
<body>

<header>
  <span class="pts">Onomatoi</span><span class="brand"> / おのまとい</span>
  <button id="btn-clear" class="gray" title="キャンバスを消去 / Clear the canvas">✕ <span id="t-eraser">消しゴム</span></button>
  <a id="about-link" href="./about_onomatoi.html" style="
    font-size: 10px; font-weight: 700; text-decoration: none;
    border-radius: 4px; padding: 5px 9px;
    background: rgba(77, 191, 242, 0.13); color: #1899c2;">？ <span id="t-about">解説</span></a>
  <span class="sub">Onomatoi — Phonosymbolic Topology Synthesizer (web)</span>
</header>

<!-- Loading banner (サンプル読込中の案内、完了後に Voice 表示へ) -->
<div id="loading-note" style="
  font-size: 11px; color: var(--pink); background: var(--pink-bg);
  border-radius: 6px; padding: 6px 10px; margin-bottom: 8px;
  transition: opacity 0.6s;">
  ♪ 音声サンプル読込中… — 音が出るまでしばらく時間がかかります
</div>

<!-- Sketch canvas -->
<div class="panel" style="padding:0; border:none;">
  <canvas id="canvas"></canvas>
</div>

<!-- Result -->
<div class="panel">
  <div class="row">
    <div class="result-word" id="result-word">—</div>
    <span class="vote">
      <button id="btn-good" disabled title="イメージ通り / Sounds right">👍</button>
      <button id="btn-bad" disabled title="イメージと違う / Sounds wrong">👎</button>
      <input id="fb-reason" maxlength="500" style="font-size:11px; padding:3px 7px;
        border:1px solid #ddd; border-radius:6px; width:200px;" placeholder="">
      <span id="vote-msg"></span>
    </span>
    <div class="result-meta" id="result-meta"></div>
  </div>
  <!-- #5 多画=句 (2026-07-17): 短い間で描き継いだ複数の一筆が句として連なる。▶PLAY で通し再生 -->
  <div id="phrase-line" style="display:none; margin-top:4px; font-size:11px; color:var(--gray);
    font-family: 'SF Mono', Menlo, monospace;"></div>
  <div class="chips" id="fb-tags" style="display:none; margin-top:4px;"></div>
  <div id="why-panel" style="display:none; margin-top:6px;">
    <div id="why-title" style="font-size:10px; font-weight:800; color:var(--pink); letter-spacing:0.5px;">なぜ?</div>
    <div id="why-lines" style="font-size:10px; color:#888; line-height:1.55;"></div>
  </div>
</div>

<!-- Tuning -->
<div class="panel">
  <div class="row">
    <span class="panel-title">TUNE</span>
    <span id="status"></span>
    <button id="btn-play" class="primary" style="margin-left:8px;">▶ PLAY</button>
  </div>
  <!-- 2026-07-17: 軸スライダーは非表示 (dev-only)。コウさんの feedback ラウンドで
       「描く前に軸をいじれる」余地を無くし、描画→語の対応だけを検証対象にする。
       要素と JS 配線は温存 (setSliders の読み出し表示・readSliders の既定 0)。
       開発時は URL に ?dev=1 で再表示。 -->
  <div class="axis-row dev-only"><label>size</label><input type="range" id="ax-size" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-size">+0.00</span></div>
  <div class="axis-row dev-only"><label>sharp</label><input type="range" id="ax-sharp" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-sharp">+0.00</span></div>
  <div class="axis-row dev-only"><label>texture</label><input type="range" id="ax-tex" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-tex">+0.00</span></div>
  <div class="axis-row dev-only"><label>bright</label><input type="range" id="ax-bright" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-bright">+0.00</span></div>
  <div class="axis-row dev-only"><label>round</label><input type="range" id="ax-round" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-round">+0.00</span></div>
  <div class="axis-row dev-only"><label>open</label><input type="range" id="ax-open" min="-1" max="1" step="0.01" value="0"><span class="val" id="val-open">+0.00</span></div>
  <div class="axis-row" title="round/open をそのまま口の形に — 描いた形を「発音するときの口」として読んでいる。→ の右は発話中のモーラごとの口の推移 (P3)">
    <label>口</label>
    <canvas id="mouth-icon" width="46" height="32" style="flex:none;"></canvas>
    <span class="val" id="mouth-vowel" style="font-size:15px;"></span>
    <span id="mouth-arrow" style="display:none; color:#aaa; font-size:11px; font-weight:600; flex:none;">→</span>
    <div id="mouth-timeline" style="display:flex; align-items:flex-end; gap:3px; flex-wrap:wrap;"></div>
  </div>
  <div class="chips" id="preset-chips"></div>
  <!-- hand corr も非表示 (既定 0.00 のまま)。生ペン時代の遺物で、コウさん実聴 (07-15) で 0 が確定。 -->
  <div class="knob-row dev-only" style="margin-top:10px;">
    <span class="knob">hand corr <input type="range" id="kn-hc" min="0" max="1.5" step="0.05" value="0"><span id="val-hc">0.00</span></span>
  </div>
  <!-- 命名モード (配置層 Phase1-4, 2026-07-20) dev UI: ?dev=1 でのみ表示・既定 OFF。
       ON のとき draw の生成経路を丸ごと namingDecompose→namingGenerateClean に置き換える
       (P11/P12 記号語彙より優先 — モードスイッチなので命名が全てを上書きする)。 -->
  <div class="knob-row dev-only" style="margin-top:10px;">
    <span class="knob"><input type="checkbox" id="naming-toggle"> 命名モード (naming)</span>
    <span class="knob">対照 <input type="range" id="naming-contrast" min="0" max="1" step="0.05" value="0"><span id="val-naming-contrast">0.00</span></span>
  </div>
</div>

<!-- Romaji direct input (v11 で外し 2026-07-17 復活 — v13 native レンダラの実聴にも使う) -->
<div class="panel">
  <div class="row" style="margin-bottom:6px;">
    <span class="panel-title" id="t-romaji-title">ROMAJI 直接入力</span>
    <span class="hint" style="margin-left:auto;" id="t-romaji-hint">空白区切り、または語をそのまま。促音=Q, 撥音=n (例 don), 拗音=kya 等</span>
  </div>
  <div class="row">
    <input id="romaji-input" type="text" value="bouba" autocapitalize="off" autocomplete="off" spellcheck="false">
    <button id="btn-romaji" class="primary">▶ PLAY</button>
  </div>
  <div class="chips" id="romaji-chips"></div>
</div>

<!-- Feedback (👍👎 の収集と書き出し) -->
<div class="panel">
  <div class="row">
    <span class="panel-title">FEEDBACK (<span id="fb-count">0</span>)</span>
    <span class="hint" id="t-fb-hint" style="margin-left:auto; text-align:right;"></span>
    <button id="btn-fb-copy">COPY</button>
    <button id="btn-fb-clear" class="gray">CLEAR</button>
  </div>
</div>

<!-- Log -->
<div class="panel">
  <div class="row">
    <span class="panel-title">LOG (<span id="log-count">0</span>)</span>
    <button id="btn-log-clear" class="gray" style="margin-left:auto;">CLEAR</button>
  </div>
  <div id="log"></div>
</div>

<script>
"use strict";
/* ============================================================
 * ICEFACE Onomatoi — Web version (2026-07-08, core v7 移植)
 * iPad/Mac 版 OnomatoiCore からの忠実な移植 (簡易化した点):
 *  - 音程変化なし: Resources/Consonants の base wav のみ (pitch variants 不使用)
 *  - warabe (旋律) モードなし / COMPOSE モードなし
 *  - 促音は無音 gap のみ (V-Q / 摩擦延長サンプル不使用)
 * 生成ロジック (bias 表 v0.4 / nil-onset / ch 制限 / 決定的 seed) は本体と同一。
 * v10 追加移植 (2026-07-10, 粗い筆 + 理由付きフィードバック):
 *  - 粗い筆 (既定ON・TUNEで切替): ペンを固定ステップ (canvas対角×0.022) の頂点列に量子化。
 *    珠+角スパーク表示・未確定の糸・手ブレはインクにならない。抽出は同じ折れ線の密化版 (6px)。
 *    軸は知覚バケット0.25 / K は0.125格子 — 同じ形→同じ語 (実測: 円24回 19種→3種・最頻58%)
 *  - フィードバックに理由の自由記述 (任意)。FB_VERSION 3 (reason フィールド追加)
 * v9 追加移植 (2026-07-10, 最新 OnomatoiCore 同期):
 *  - 角の鋭さ cornerSharpness (ピークホールド+継ぎ目救済+閉じ目ヘアピン除外): 三角>四角>円
 *    の連続化。drawK は鋭さ主導 (密度は±30%変調)
 *  - 閉合度 v2: 端点ギャップ周長比 ≤10% は閉扱い (閉じたつもりの四角が口を失わない) +
 *    openness オフセット −0.57 再キャリブレーション
 *  - 単位ごとの K/manner: ループ=音節 の各ループが自分の形から K と調音方法を持つ
 *  - 単発くるん (線→一回転→また線) を単位語として読む (unitEligible)
 *  - manner 次元: 描線の動態 (単発衝撃/角の連打/波/閉じた丸) → 子音の調音方法
 *    (破裂/破擦/摩擦/共鳴) の親和 (+0.8×affinity)。K が潰していた時間構造の対応
 *  - 丸ん (ぽよん型): 小さく閉じた丸・柔・単発 → 語末ん
 *  - sustained (口の保持) ゲートに cornerSharpness<0.35 の保険 (三角の長音誤爆防止)
 * v8 追加移植 (2026-07-09, 最新 OnomatoiCore 同期):
 *  - 口の形 (openness×roundness): 描いた形を口として読む (PCA 回転不変)。丸=あ/横棒=い/
 *    小円=う/横長楕円=え/縦長=お。母音は口が支配 (brightness は母音判定から撤去)
 *  - bouba/kiki 第二柱: K表 (無声破裂=kiki/鼻音=bouba)・K_draw (尖り+角密度)・
 *    語レベル K 整合ゲート (|ΔK|≤0.35, salt 3案)
 *  - 一筆の連続=口の保持=長音 (あーーー, 伸ばす拍数は描画サイズ由来)
 *  - 構造単位分割: ループ=音節 (口は単位ごと)・つなぎ線=ー(保持)/ん(語末平線)/っ(ギザ)/直結
 *  - 長さの応答: 長い描線には反復タイルで最大16モーラの奔流
 *  - 持続母音テイク v_aaaa〜v_oooo (伸ばし録音) を v_* より優先ロード
 * v7 追加移植 (PhonosymbolicEvent.Onomatopoeia.legalize / FormantSynth Audio v1-v7.9):
 *  - legalize(): 任意のモーラ列を実在オノマトペ型 (畳語/り/ん/ー/っ/どーん/がたごと/かい/こう…)
 *    へ整形する層。これが「Onomatoi らしさ」の核 (音声パイプラインは別途 v7 と対で実装)。
 *  - 長母音サステイン (loopStart/loopEnd ネイティブループ、ゼロクロス近傍) — ー終わりの語が
 *    途中で無音化しないように (旧 Consonants/*.mp3 は 2.0s ファイル中 0.3s しか実音が無かった
 *    デノイズのゲート事故があり、Resources 側は修正済み。Web 側 mp3 も再生成時に末尾トリム済み)。
 *  - 継続撥音 (v_<v>_nn.mp3, prepareContN 相当の頭-19dB→尾-17.5dB 整形を事前ベイク) — 語中の
 *    ん (どーん/ふんわり) を n_N.mp3 でなく前母音から続けて鳴らす。
 *  - CV→V diph (diph_<v1><v2>.mp3 をそのまま使う簡易版) — かい/こう等の語末連続母音。
 * v13 (2026-07-16): **native 音声レンダラの移植** — FormantSynth.render のサンプル精度
 *    オフライン合成 (長母音延長=1テイク継続 / 継続撥音・cvDiph の先行オーバーラップ /
 *    V+V 生 diph / 拡張 run の長尺録音 [core v8] / 語末ん・語末 diph のリリース) を
 *    JS へ移植し、語全体を 1 バッファに描いてから 1 ノードで再生する。
 *    モーラ個別再アタック (v12) は ?voice=legacy でいつでも戻せる (フォールバックも自動)。
 *    diph_* は非圧縮 .wav を優先ロード (mp3 は継ぎ足し読みに弱い — フレーム量子化で
 *    定常部が揺れる/先頭パディングで位置がずれる)。warabe 音程バリアントは移植しない。
 * 2026-07-20 命名モード (配置層) v19: 完成形を解体し特徴の強度序列を語内配置 (頭=最強特徴/
 *    中=第二特徴/末=終止モード) へ変換する第2の生成経路 (namingDecompose/namingSlots/
 *    namingGenerate/namingGenerateClean, P4 対照モード込み)。実況 (generate/legalize,
 *    ENGINE_VERSION) には無変更 — dev 専用 (?dev=1) トグル OFF (既定) では 1 bit も変わらない。
 * ============================================================ */

const SAMPLE_BASE = "./ConsonantsOnomatoi/";   // wav の場所 (開発用: プロジェクト内参照)

// ─── 日英 UI テキスト (ブラウザ言語で自動判定、about.html とトグル選択を共有) ───
let uiLang = null;
try { uiLang = localStorage.getItem("onomatoi.lang"); } catch (e) {}
if (uiLang !== "ja" && uiLang !== "en") {
  uiLang = (navigator.language || "en").toLowerCase().startsWith("ja") ? "ja" : "en";
}
const T = uiLang === "ja" ? {
  eraser: "消しゴム",
  about: "解説",
  loading: (n, total) => `♪ 音声サンプル読込中 ${n}/${total} — 音が出るまでしばらく時間がかかります`,
  loadingInitial: "♪ 音声サンプル読込中… — 音が出るまでしばらく時間がかかります",
  voice: "Voice(声): PuppeTwin",
  romajiTitle: "ROMAJI 直接入力",
  romajiHint: "空白区切り、または語をそのまま (bouba も bo u ba も同じ)。促音=Q, 撥音=n (例 don), 拗音=kya 等",
  fbHint: "👍👎 = イメージ通りか記録。COPY で書き出して開発に渡せます",
  fbCopied: "COPIED!",
  fbSaved: (n) => `✓ 記録しました（計${n}件）`,
  fbReasonPH: "理由 (任意): どこがイメージ通り/違う?",
  start: "▶ タップして開始 (音を有効化)",
} : {
  eraser: "Eraser",
  about: "About",
  loading: (n, total) => `♪ Loading voice samples ${n}/${total} — sound will be ready in a moment`,
  loadingInitial: "♪ Loading voice samples… — sound will be ready in a moment",
  voice: "Voice: PuppeTwin",
  romajiTitle: "ROMAJI input",
  romajiHint: "space-separated or as one word (bouba = bo u ba). geminate=Q, moraic nasal=n (e.g. don), kya/gyu etc.",
  fbHint: "👍👎 = did it sound like your shape? COPY exports for tuning",
  fbCopied: "COPIED!",
  fbSaved: (n) => `✓ saved (${n} total)`,
  fbReasonPH: "why? (optional): what matched / didn't",
  start: "▶ Tap to Start (enable sound)",
};
function applyLangTexts() {
  document.getElementById("t-eraser").textContent = T.eraser;
  document.getElementById("t-about").textContent = T.about;
  document.getElementById("t-fb-hint").textContent = T.fbHint;
  document.getElementById("loading-note").textContent = T.loadingInitial;
  const reasonEl = document.getElementById("fb-reason");
  if (reasonEl) reasonEl.placeholder = T.fbReasonPH;
  const rt = document.getElementById("t-romaji-title");
  if (rt) rt.textContent = T.romajiTitle;
  const rh = document.getElementById("t-romaji-hint");
  if (rh) rh.textContent = T.romajiHint;
}

// ─── 音素 inventory (PhonosymbolicEvent.swift と対応) ───
const CONSONANTS = ["k","g","t","d","p","b","m","n","s","sh","ts","r","w",
                    "ky","gy","ny","h","f","y","z","j","ch"];

// ブーバ/キキは完成形の印象 (Icefaceさん方針)。「2周した円」は「1つの円」と同一視して aaan/
// ブーバに読む (Step1/Step2 の輪郭測定へ渡す前に 1 周に折り畳む)。
// 判定: 重心まわりの巻きが**単調に N·2π** で、かつ**各周が絶対座標で重なる** (= 同じ場所を
// なぞった) ときのみ畳む。除外 (畳まない=軌跡層の担当のまま):
//   ・渦 = 半径が縮む → 周が重ならない (dev 大)
//   ・連ループびーびー = 各ループが別位置・重心が周の外 → 巻きが N·2π にならない (N<2 or 逆行大)

  const wind = [0];
  for (let i = 1; i < n; i++) {
    let a = Math.atan2(points[i].y - cy, points[i].x - cx);
    let d = a - prev;
    while (d > Math.PI) d -= 2 * Math.PI;
    while (d < -Math.PI) d += 2 * Math.PI;
    theta += d; wind.push(theta); prev = a;
  }
  const total = Math.abs(theta);
  const N = Math.round(total / (2 * Math.PI));

  if (total < (N - 0.25) * 2 * Math.PI) return points;       // 端数周は畳まない (最終周が不完全)
  const sign = theta >= 0 ? 1 : -1;

  for (let i = 1; i < n; i++) {
    const d = wind[i] - wind[i - 1];
    if (d * sign < 0) back += -d * sign;
  }
  if (back > 0.25 * total) return points;                    // 逆行が多い → なぞりでない (連ループ/波)
  let minX = points[0].x, maxX = minX, minY = points[0].y, maxY = minY;
  for (const p of points) {
    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
    minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
  }
  const bboxDiag = Math.hypot(maxX - minX, maxY - minY);
  if (bboxDiag < 1e-6) return points;

  const levels = [];
  for (let k = 0; k <= N; k++) levels.push(sign * k * 2 * Math.PI);
  levels[N] = wind[n - 1];
  const posAtWind = (tw) => {
    for (let i = 1; i < n; i++) {
      const lo = wind[i - 1], hi = wind[i];
      if (lo !== hi && (tw - lo) * (tw - hi) <= 0) {
        const t = (tw - lo) / (hi - lo);
        return { x: points[i - 1].x + (points[i].x - points[i - 1].x) * t,
                 y: points[i - 1].y + (points[i].y - points[i - 1].y) * t };
      }
    }
    return null;
  };
  const M = 48;
  const laps = [];
  for (let k = 0; k < N; k++) {
    const lap = [];
    for (let j = 0; j < M; j++) {
      const p = posAtWind(levels[k] + (levels[k + 1] - levels[k]) * j / M);
      if (!p) return points;                                 // 分割できない → 安全側で畳まない
      lap.push(p);
    }
    laps.push(lap);
  }
  // 各周の平均半径が一致するか (渦 = 半径が縮む を確実に弾く。なぞり = 各周ほぼ同半径)
  const lapMeanR = laps.map(lap => {
    let s = 0;
    for (const q of lap) s += Math.hypot(q.x - cx, q.y - cy);
    return s / lap.length;
  });
  for (let k = 1; k < N; k++)
    if (Math.abs(lapMeanR[k] - lapMeanR[0]) > 0.12 * lapMeanR[0]) return points;
  let dev = 0;
  for (let j = 0; j < M; j++)
    for (let k = 1; k < N; k++)
      dev = Math.max(dev, Math.hypot(laps[k][j].x - laps[0][j].x, laps[k][j].y - laps[0][j].y));
  if (dev > 0.18 * bboxDiag) return points;                  // 周が重ならない → 別位置 → 畳まない
  const collapsed = [];
  for (let j = 0; j < M; j++) {
    const xs = laps.map(l => l[j].x).sort((a, b) => a - b);
    const ys = laps.map(l => l[j].y).sort((a, b) => a - b);
    const mid = N >> 1;
    const med = (arr) => (N % 2 ? arr[mid] : (arr[mid - 1] + arr[mid]) / 2);
    collapsed.push({ x: med(xs), y: med(ys) });
  }
  collapsed.push({ x: collapsed[0].x, y: collapsed[0].y });  // 閉じる
  return collapsed;
}

      const spread = den > 1e-6 ? turnAtScale(peakIdx, 2 * kS) / den : 9;
      if (spread > 1.25) continue;                       // 弧に分散 = 滑らかな反転
      let cIdx = peakIdx;                                // 単位曲率で角の実位置へ局在化
      for (let j = Math.max(1, peakIdx - kS); j <= Math.min(n - 2, peakIdx + kS); j++)
        if (unitTurn[j] > unitTurn[cIdx]) cIdx = j;
      let si = 0, so = 0;
      for (let j = Math.max(1, cIdx - 2 * kS); j <= Math.min(n - 2, cIdx + 2 * kS); j++) {
        so += unitTurn[j];
        if (Math.abs(j - cIdx) <= 2) si += unitTurn[j];
      }
      if (so > 1e-6 && si / so < 0.6) continue;          // 曲率が局所に集中していない
      fired.push([peakIdx, peak]);
    }
  }
  // (旧・継ぎ目救済はここにあった — Step1 の閉形正準化で頂点が通常スキャンに乗るため廃止)
  // 閉形: 巻きパッド由来の重複角を正準添字 (mod 実周) で統合 (同じ頂点は 1 つに)
  let firedC = fired;
  if (mClosed > 0) {
    const seen = [];
    for (const [fi, peak] of fired) {
      const c = fi % mClosed;
      const dup = seen.find(e => {
        const d = Math.abs(e.c - c);
        return Math.min(d, mClosed - d) < k;
      });
      if (dup) { if (peak > dup.peak) { dup.c = c; dup.peak = peak; } }
      else seen.push({ c, peak });
    }
    firedC = seen.map(e => [e.c, e.peak]);
  }
  const corners = firedC.length;
  let csSum = 0, csCount = 0;
  for (const [fi, peak] of firedC) {
    const nearEnds = fi < 3 * k || fi >= n - 3 * k;
    // 閉形はヘアピン (>150° = pigtail) を位置に依らず鋭さから除外 (旧: 継ぎ目近傍のみ)
    if (isClosed && (mClosed > 0 ? peak > VERTEX_CAP : (nearEnds && peak > VERTEX_CAP))) continue;
    csSum += peak; csCount++;
  }
  const cornerSharpness = csCount > 0
    ? Math.max(0, Math.min(1, (csSum / csCount - CORNER_THRESH) / (Math.PI - CORNER_THRESH)))
    : 0;
  let totalTurning = 0;
  if (mClosed > 0) {
    // 閉形: 輪として巡回で合計 — 継ぎ目位置に依らず一周 = 正確に ±2π (四角の欠け 0.76 周
    // のような「継ぎ目の角の取りこぼし」が起きない)
    for (let i = 0; i < mClosed; i++) {
      const a = points[(i - 1 + mClosed) % mClosed], b = points[i], c = points[(i + 1) % mClosed];
      const v1x = b.x - a.x, v1y = b.y - a.y, v2x = c.x - b.x, v2y = c.y - b.y;
      const cross = v1x * v2y - v1y * v2x, dot = v1x * v2x + v1y * v2y;
      if (Math.abs(cross) > 1e-9 || Math.abs(dot) > 1e-9) totalTurning += Math.atan2(cross, dot);
    }
  } else {
    for (let i = 1; i < points.length - 1; i++) {
      const v1x = points[i].x - points[i-1].x, v1y = points[i].y - points[i-1].y;
      const v2x = points[i+1].x - points[i].x, v2y = points[i+1].y - points[i].y;
      const cross = v1x * v2y - v1y * v2x, dot = v1x * v2x + v1y * v2y;
      if (Math.abs(cross) > 1e-9 || Math.abs(dot) > 1e-9) totalTurning += Math.atan2(cross, dot);
    }
  }
  // rotationFraction (2026-07-15, P11 記号語彙): loops (整数丸め) は「半円=0.5」を「直線=0」と
  // 区別できない。開いた弧 (⊃⊂∩∪ 系) の判別には丸める前の生の回転量が要る。
  const rotationFraction = Math.abs(totalTurning) / (2 * Math.PI);
  // curveConsistency: 符号付き合計 (相殺後) / 絶対値合計 (相殺前)。1.0 = 常に同じ向きに
  // 曲がる (弧)・低い値 = 行ったり来たり (波・ジグザグ)。
  // v2 (2026-07-16, Icefaceさん報告「⊂ が出にくい」の実測): 点単位の測定は手ブレに脆く、
  // ±1.5px のジッタで実弧の cc が 0.33 (正弦波と同値!) まで崩壊・ペンの入り/抜きの 10px
  // フックでも 0.56 に落ちて閾値 0.8 を通らない。**弧長リサンプル** (経路を ~24 等分の粗い
  // 折れ線へ) + **端 5% トリム** (ペン尾の除外) で測る — ジッタは区間内で幾何的に消え、
  // 正弦波/ジグザグの大きな反転は残る (実測: jitter5 の弧 cc 0.13→0.99・正弦波 0.33→0.33)。
  const curveConsistency = (() => {
    // 端 5% トリム (弧長基準)
    let cum = [0];
    for (let i = 1; i < points.length; i++)
      cum.push(cum[i-1] + Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y));
    const L = cum[cum.length - 1];
    if (L < 1e-6) return 0;
    const lo = L * 0.08, hi = L * 0.92;   // 端 8% トリム (ペン尾 ~50px 級まで除外)
    // 弧長 s の位置の点 (線形補間)
    function at(s) {
      let a = 0;
      while (a < cum.length - 2 && cum[a + 1] < s) a++;
      const span = Math.max(cum[a + 1] - cum[a], 1e-9);
      const t = (s - cum[a]) / span;
      return { x: points[a].x + (points[a+1].x - points[a].x) * t,
               y: points[a].y + (points[a+1].y - points[a].y) * t };
    }
    const N = 16;   // 粗い折れ線 (ジッタが消えるスケール)
    let rs = [];
    for (let i = 0; i <= N; i++) rs.push(at(lo + (hi - lo) * i / N));
    // 3点移動平均 1 パス (端は保持): 残留ジッタを均す。正弦波の大反転 (区間 >> 波長) は残る。
    rs = rs.map((p, i) => (i === 0 || i === rs.length - 1) ? p
      : { x: (rs[i-1].x + p.x + rs[i+1].x) / 3, y: (rs[i-1].y + p.y + rs[i+1].y) / 3 });
    let net = 0, abs = 0;
    for (let i = 1; i < rs.length - 1; i++) {
      const v1x = rs[i].x - rs[i-1].x, v1y = rs[i].y - rs[i-1].y;
      const v2x = rs[i+1].x - rs[i].x, v2y = rs[i+1].y - rs[i].y;
      const cross = v1x * v2y - v1y * v2x, dot = v1x * v2x + v1y * v2y;
      if (Math.abs(cross) > 1e-9 || Math.abs(dot) > 1e-9) {
        const t = Math.atan2(cross, dot);
        net += t; abs += Math.abs(t);
      }
    }
    return abs > 1e-9 ? Math.abs(net) / abs : 0;
  })();
  // ─── 粗スケールの反転数 (2026-07-17 #3): 「描いた労力=語の長さ」の救済チャネル ───
  // ヘアピン/往復 (ハッチング・塗りつぶし・U字の折返し幅 16〜32px) は、P1 の集中度ゲートが
  // 「滑らかな反転」として角から**設計どおり**除外する (S字を角にしない立法・kou #9)。
  // その結果 92珠の労力が 1 モーラに潰れていた (実測: ハッチング mc1・塗りつぶし mc2)。
  // 角の意味論 (K/cs/確定▲ = P1/P3 の立法域) には触れず、**要素数 (語の長さ) だけ**を
  // 粗い折れ線 (弧長 40 等分・ジッタ不感) の有意な曲がり (|turn|≥0.35rad) の**符号反転**で
  // 底上げする。同方向の曲がり (円・渦・連ループ・多角形) は反転 0 = 従来どおり。
  // ジグザグは角数≈反転数で max() が同値 = 不変。
  const coarseMotion = (() => {
    let cum = [0];
    for (let i = 1; i < points.length; i++)
      cum.push(cum[i-1] + Math.hypot(points[i].x - points[i-1].x, points[i].y - points[i-1].y));
    const L = cum[cum.length - 1];
    if (L < 1e-6) return { flips: 0, disorder: 0 };
    function at(s) {
      let a = 0;
      while (a < cum.length - 2 && cum[a + 1] < s) a++;
      const span = Math.max(cum[a + 1] - cum[a], 1e-9);
      const t = (s - cum[a]) / span;
      return { x: points[a].x + (points[a+1].x - points[a].x) * t,
               y: points[a].y + (points[a+1].y - points[a].y) * t };
    }
    const N = 40;
    let rs = [];
    // 端 8% トリム + 3点移動平均 (cc v2 と同じ地雷対策): 手ブレ±5px 級のジッタや
    // ペン尾フックが粗スケールでも偽の反転を作るのを防ぐ (kou 手ブレ⊂ fixture で実測)。
    const lo2 = L * 0.08, hi2 = L * 0.92;
    for (let i = 0; i <= N; i++) rs.push(at(lo2 + (hi2 - lo2) * i / N));
    rs = rs.map((p, i) => (i === 0 || i === rs.length - 1) ? p
      : { x: (rs[i-1].x + p.x + rs[i+1].x) / 3, y: (rs[i-1].y + p.y + rs[i+1].y) / 3 });
    let flips = 0, sign = 0;
    const events = [];   // 有意な曲がりの位置と大きさ (#4 乱雑度の材料)
    for (let i = 1; i < rs.length - 1; i++) {
      const v1x = rs[i].x - rs[i-1].x, v1y = rs[i].y - rs[i-1].y;
      const v2x = rs[i+1].x - rs[i].x, v2y = rs[i+1].y - rs[i].y;
      const cross = v1x * v2y - v1y * v2x, dot = v1x * v2x + v1y * v2y;
      if (Math.abs(cross) <= 1e-9 && Math.abs(dot) <= 1e-9) continue;
      const t = Math.atan2(cross, dot);
      if (Math.abs(t) < 0.35) continue;
      const s2 = t > 0 ? 1 : -1;
      if (sign !== 0 && s2 !== sign) flips++;
      sign = s2;
      events.push({ i, mag: Math.abs(t) });
    }
    // ─── #4 乱雑度 (2026-07-17 アーキタイプ監査・立法提案): 規則的反復と乱雑の分離 ───
    // 同じ「要素が多い」でも、ジグザグ/ハッチング (規則的=きれいな畳語 ぎざぎざ・じりじり) と
    // なぐり書き (乱雑=ぐちゃぐちゃ・めちゃくちゃ) は別の知覚。8 類型の実測から決めた判別式:
    //   自己交差 (なぐり 31/17 vs 規則形 0・星 3) と 曲がりの大きさの CV (0.67/0.32 vs ≤0.07)
    //   の 2 つで完全分離。間隔 CV は角クラスタの割れ方の影響を受けて弱い → 不採用。
    // 連続セグメントの曲がりは 1 クラスタに統合してから CV を取る (角の内部の偽不揃い対策)。
    let disorder = 0;
    if (events.length >= 4) {
      const merged = [];
      for (const e of events) {
        const last = merged[merged.length - 1];
        if (last && e.i - last.end <= 1) { last.end = e.i; last.mag += e.mag; }
        else merged.push({ i: e.i, end: e.i, mag: e.mag });
      }
      const cv = (arr) => {
        if (arr.length < 2) return 0;
        const m = arr.reduce((a, b) => a + b, 0) / arr.length;
        if (m <= 1e-9) return 0;
        const v = arr.reduce((a, b) => a + (b - m) * (b - m), 0) / arr.length;
        return Math.sqrt(v) / m;
      };
      const magCV = cv(merged.map(e => e.mag));
      const segInt = (a, b, c, d) => {
        const d1x = b.x - a.x, d1y = b.y - a.y, d2x = d.x - c.x, d2y = d.y - c.y;
        const den = d1x * d2y - d1y * d2x;
        if (Math.abs(den) < 1e-9) return false;
        const t = ((c.x - a.x) * d2y - (c.y - a.y) * d2x) / den;
        const u = ((c.x - a.x) * d1y - (c.y - a.y) * d1x) / den;
        return t > 0.02 && t < 0.98 && u > 0.02 && u < 0.98;
      };
      let crossings = 0;
      for (let a = 0; a < rs.length - 1; a++)
        for (let b2 = a + 2; b2 < rs.length - 1; b2++)
          if (segInt(rs[a], rs[a + 1], rs[b2], rs[b2 + 1])) crossings++;
      disorder = Math.max(0, Math.min(1,
        0.55 * Math.min(1, crossings / 10) + 0.45 * Math.min(1, magCV * 2)));
    }
    return { flips, disorder };
  })();
  const coarseReversals = coarseMotion.flips;
  const coarseDisorder = coarseMotion.disorder;
  // ─── Step2 (2026-07-17): 転回の集中度 → 形の K (P3「真の角→破裂/流れ→清音摩擦」の形式化) ───
  // ブーバ/キキ=完成形の印象 (Icefaceさん方針)。閉じた輪郭の総転回 (凸形は必ず 2π) が
  // 「どこに集中して通過するか」で音色を読む:
  //   tc = Σ(真の角の転回ピーク) / 総転回 — 三角/四角 ≈1 (全転回が頂点に集中)・円 =0 (全周に
  //        分散)・多重ループ/渦は分母が 2π を超えて薄まる (=柔らかい)。
  //   cs = 角の鋭さ (三角 120°転回 > 四角 90°) が キキの強度を分ける。
  // formK = −0.85 + 0.8·tc + 1.9·cs (clamp ±1)。アンカー: 円 −0.85 / 手描き四角 ≈+0.37 /
  // 手描き三角 ≈+0.45 / 星 → +1。スケール・始点・向きに不変 (Step1 の正準化の上に立つ)。
  // 開いた線 (formK=null) は従来どおり軌跡の K (drawK) — 線の描き方はそれ自体が知覚。
  //
  // #1 8の字ガード (07-17): 閉じていても転回が相殺する形 (rot≈0/cc 低) は「一周の輪郭」でない。
  //    旧実装は 8の字に円と同じ formK −0.85 を与えていた (実測 rot 0.00・cc 0.11)。
  //    一周の実在 (rot≥0.7 かつ cc≥0.6) を formK の前提にする。外れたら軌跡層へ
  //    (8の字 → 2ループの単位語 = nuuunuu 系のままで妥当)。
  // #2 星の救済 (07-17): 自己交差する頂点優勢の閉形 (5芒星 = 紙面効率 3.62) は輪郭帯 (<3.2)
  //    を超えるが、紛れもなく「形」でありキキの代表格 (旧実装は formK null → 軌跡 K で
  //    ruuuu 系 = 最ブーバに逆転していた)。角の証拠が強い (角≥3・cs≥0.3・cc≥0.8・eff<4.2)
  //    ときは正準化なしの実測から formK を出す (角 4/5 でも formK はほぼ飽和 = 始点差に頑健)。
  //    渦 (角0) は従来どおり軌跡層・連ループは非閉で除外。eff<4.2 は 2周なぞり (4.44) を弾く保険
  //    (通常は Step3 が先に畳む)。
  let formK = null, turnConcentration = null;
  const contourEff = pathLen / Math.max(1e-6, bboxDiag);
  const lapOK = rotationFraction >= 0.7 && curveConsistency >= 0.6;
  if (lapOK && (mClosed > 0
      || (isClosed && corners >= 3 && cornerSharpness >= 0.3
          && curveConsistency >= 0.8 && contourEff < 4.2))) {
    const T = Math.max(Math.abs(totalTurning), 2 * Math.PI);
    turnConcentration = Math.min(1, csSum / T);
    formK = Math.max(-1, Math.min(1, -0.85 + 0.8 * turnConcentration + 1.9 * cornerSharpness));
  }
  const loops = Math.round(rotationFraction);
  // #3: 要素数は max(角, 粗反転) — 角が「滑らかな反転」として除外された往復系でも労力が語長に残る
  const elements = Math.max(corners, coarseReversals) + loops;
  const comp = elements <= 4 ? elements : 4 + (elements - 4) * 0.5;
  const sizeToLength = 0.38;
  const sizeGateRaw = Math.max(0.3, Math.min(1.15, sizeRatio / 0.5));
  const sizeGate = sizeGateRaw * sizeToLength + (1 - sizeToLength);
  const base = 1 + Math.max(0, sizeRatio - 0.5) * 2 * sizeToLength;
  const rawMora = base + comp * sizeGate;
  const moraCount = Math.max(1, Math.min(maxMora, Math.round(rawMora)));
  // sizeRatio/pathRatio (2026-07-17): circleVocabSignal の紙面効率判定用 (native と同フィールド)
  // cornerPoints (Step1): 判定に使った「形の角」の実座標 — ペンアップ後の確定▲表示用。
  //   dx/dy = 角の外向き二等分線 (単位ベクトル)。u1=入射・u2=出射の単位ベクトルの差 =
  //   角が尖る向き (ヘアピンでは入射の延長になり、それが知覚とも一致)。▲を「角の外側から
  //   角を指す」向きに置くための情報。向きが取れない縮退時は dx/dy なし (位置のみ)。
  // formK (Step2): 完成形から読んだ K (閉形のみ・null=開いた線=従来の軌跡 K)
  // turnConcentration (Step2): 総転回のうち角に集中した割合 — 三角/四角≈1・円=0 (UI 表示用)
  // retraced (Step3): なぞり直しを 1 周へ畳んだか (UI 表示用)
  // reversals (#3): 粗スケールの方向反転数 — 労力チャネル (語の長さ) 専用。K/cs には不使用
  // disorder (#4): 乱雑度 0..1 — 規則的反復 (ぎざぎざ) と 乱雑 (ぐちゃぐちゃ) の分離 (立法提案)
  const cornerDir = (fi) => {
    // 閉形の firedC は正準添字 (mod 実周) なので近傍は輪として巡回で取る。開いた線の角は
    // 端 2kS 以上内側が保証済み (端除外) — clamp は保険。窓は候補ゲートと同じ kS。
    const m = mClosed > 0 ? mClosed : points.length;
    const im = mClosed > 0 ? ((fi - kS) % m + m) % m : Math.max(0, fi - kS);
    const ip = mClosed > 0 ? (fi + kS) % m : Math.min(points.length - 1, fi + kS);
    const v1x = points[fi].x - points[im].x, v1y = points[fi].y - points[im].y;
    const v2x = points[ip].x - points[fi].x, v2y = points[ip].y - points[fi].y;
    const l1 = Math.hypot(v1x, v1y), l2 = Math.hypot(v2x, v2y);
    if (l1 < 1e-6 || l2 < 1e-6) return null;
    const dx = v1x / l1 - v2x / l2, dy = v1y / l1 - v2y / l2;
    const dl = Math.hypot(dx, dy);
    return dl < 1e-6 ? null : { dx: dx / dl, dy: dy / dl };
  };
  return { corners, loops, moraCount, cornerSharpness, isClosed, rotationFraction, curveConsistency,
           sizeRatio, pathRatio: pathLen / Math.max(canvasDiag, 1),
           cornerPoints: firedC.map(([fi]) =>
             ({ x: points[fi].x, y: points[fi].y, ...(cornerDir(fi) || {}) })),
           formK, turnConcentration, retraced, reversals: coarseReversals,
           disorder: coarseDisorder };
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// ─── NamingPlacement (命名モード・配置層 Phase1-4, 2026-07-20 移植) ───
// 正本: OnomatoiCore/Sources/OnomatoiCore/Core/NamingPlacement.swift。
// 実況 (generate/legalize) は「描線の時間構造 = 発話の時間構造」を写す。命名は
// 完成形を解体し、特徴の強度序列を語内配置 (語頭=最強特徴/語中=第二特徴/語末=
// 終止モード) へ変換する第2の生成経路 — 実況側の関数・挙動には一切触れない
// (pickConsonant/pickVowel/geminateGapMs/mulberry32 を再利用するのみ)。
// dev トグル (?dev=1) が ON のときだけ pointerup から呼ばれる。既定 OFF では
// このブロックは一切実行されない = 既存経路は 1 bit も変わらない。
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function namingClamp01(x) { return Math.max(0, Math.min(1, x)); }

// ─── strength 計算の係数 (NamingPlacement.swift の定数そのまま。名前は意図を記す) ───
const NAMING_SALIENCE_FLOOR = 0.25;               // これ未満の特徴は捨てる (何でも盛り込まない)
const NAMING_SPIKE_CORNER_THRESHOLD = 3;          // 角がこれ以下なら「少数の尖り」= 満点
const NAMING_SPIKE_MANY_CORNERS_SCALE = 0.6;      // 角が多いと針でなくギザギザ寄り → 減衰
const NAMING_ROUND_CLOSED_BONUS = 0.3;            // 閉じた輪郭は丸みの証拠 (閉じた四角が中程度の+になるのは意図通り=ごつごつ)
const NAMING_ROUND_ARC_SCALE = 0.6;               // 開いた弧の丸み (rotationFraction×一貫性)
const NAMING_ROUND_LOOP_BONUS = 0.25;             // ループ1個ごとの丸み加点 (ぐるぐる)
const NAMING_ROUND_LOOP_CAP = 2;                  // ループ加点の上限個数
const NAMING_EDGE_CORNER_CENTER = 4.0;            // 角4個 (四角) を edge の中心に
const NAMING_EDGE_CORNER_RANGE = 3.0;
// edge の cornerSharpness 中心 = 正方形の実測帯 (0.32)。凸多角形は外角総和 2π の不変量により
// 平均転回角が頂点数だけで決まる (正方90°→cs≈0.32・正三角120°→cs≈0.55)。中心 0.5 は
// 「cs≈角度/180°」の誤較正で正三角が edge の山に乗り spike に勝ってしまっていた —
// 中心を四角帯 0.32・幅 0.25 に絞ると既定感度のままで三角/四角が分離する (Swift 側の教訓そのまま)。
const NAMING_EDGE_SHARP_CENTER = 0.32;
const NAMING_EDGE_SHARP_RANGE = 0.25;
const NAMING_FLAT_CLOSED_SCALE = 1.0;
const NAMING_FLAT_OPEN_SCALE = 0.5;               // 開いた線の扁平は半分の重みで拾う (暫定 proxy)

// ─── 序列の決定性 ───
const NAMING_TIE_BAND = 0.1;   // strength 差がこの値未満なら「同点近傍」= kind 優先表で決着
const NAMING_KIND_PRIORITY = { mass: 0, round: 1, spike: 2, edge: 3, repeatN: 4, flat: 5 };

// ─── ClosureMode 判定の閾値 ───
const NAMING_CLOSURE_CLOSED_CUT_THRESHOLD = 0.6;   // 閉形: これ以上鋭い折返しなら cut (角)
const NAMING_CLOSURE_OPEN_CUT_THRESHOLD = 0.5;     // 開形: 末尾近傍の折返しがこれ以上なら cut
const NAMING_CLOSURE_LONG_PATH_RATIO = 0.35;       // 角のない開いた線がこの経路長比以上なら ー (余韻)

// ─── 配置 (特徴序列 → スロット列) の閾値 ───
const NAMING_HEAD_TWO_MORA_THRESHOLD = 0.75;   // 頭スロットが2モーラになる強度
const NAMING_BODY_TWO_MORA_THRESHOLD = 0.5;    // 中スロットが2モーラになる強度

// ─── P4 対照モード (ドデカミン構造) の係数 ───
const NAMING_CONTRAST_SIZE_WEIGHT = 1.0;       // 主軸 (コーパス実測: ドデカミン Δsize +1.00)
const NAMING_CONTRAST_SHARP_WEIGHT = 0.7;      // 副軸
const NAMING_CONTRAST_MINOR_WEIGHT = 0.5;      // brightness/roundness/openness (口の反転)
const NAMING_CONTRAST_TAIL_THRESHOLD = 0.0;    // これを超えると対照尾スロットが付く (0 = P2 厳密互換)
const NAMING_CONTRAST_NASAL_UPGRADE_THRESHOLD = 0.3;   // 頭極性がこれを超え open なら nasal 昇格

/// 純関数版の解体: 既存の公開量 (大域軸 + strokeComplexity) から FeatureInventory を作る。
/// 新しい画像解析はしない (NamingPlacement.decompose(axes:complexity:) の移植)。
/// 戻り値: { features: [{kind, strength}...], closure: "nasal"|"cut"|"open"|"long", axes }
function namingDecompose(axes, cx) {
  const spike = namingClamp01(cx.cornerSharpness)
    * (cx.corners <= NAMING_SPIKE_CORNER_THRESHOLD ? 1.0 : NAMING_SPIKE_MANY_CORNERS_SCALE);
  const mass = namingClamp01(axes.size);
  // round は「完成形の丸さ」を測る (描線の滑らかさではない — 直線も正方形も滑らかさは round≈1
  // になってしまう誤読が実出力デモで発覚した経緯が Swift 側にある)。formK (完成形の K: 円-0.85/
  // 手描き三角≈+0.45/四角≈+0.55) がある閉形はそれを使い、無い形 (開いた線・渦・多重ループ) は
  // 弧の回転量×向きの一貫性+ループ数で代替する (半円弧=中程度・ぐるぐる渦=強・直線/ジグザグ/波
  // =rotationFraction 相殺で 0)。
  let round;
  if (cx.formK !== null && cx.formK !== undefined) {
    round = namingClamp01(Math.max(0, -cx.formK) + (cx.isClosed ? NAMING_ROUND_CLOSED_BONUS : 0));
  } else {
    round = namingClamp01(
      NAMING_ROUND_ARC_SCALE * Math.min(1, cx.rotationFraction) * Math.max(0, cx.curveConsistency)
      + NAMING_ROUND_LOOP_BONUS * Math.min(cx.loops, NAMING_ROUND_LOOP_CAP)
    );
  }
  // edge: 角4個前後 (四角) × cornerSharpness 中庸 (直角帯) で最大。三角 (角3・高鋭) は edgeCorner
  // が下がり spike に譲る — 三角/四角の分離が本設計の要。
  const edgeCorner = namingClamp01(1 - Math.abs(cx.corners - NAMING_EDGE_CORNER_CENTER) / NAMING_EDGE_CORNER_RANGE);
  const csMid = namingClamp01(1 - Math.abs(cx.cornerSharpness - NAMING_EDGE_SHARP_CENTER) / NAMING_EDGE_SHARP_RANGE);
  const edge = edgeCorner * csMid;
  const repeatN = namingClamp01(axes.tex);
  const flat = namingClamp01(Math.max(0, -axes.round) * (cx.isClosed ? NAMING_FLAT_CLOSED_SCALE : NAMING_FLAT_OPEN_SCALE));

  const all = [
    { kind: "spike", strength: spike },
    { kind: "mass", strength: mass },
    { kind: "round", strength: round },
    { kind: "edge", strength: edge },
    { kind: "repeatN", strength: repeatN },
    { kind: "flat", strength: flat },
  ];
  const ranked = namingRankFeatures(all);
  const survivors = ranked.filter(f => f.strength >= NAMING_SALIENCE_FLOOR);
  // 全滅時も features は必ず非空 (最強1件を残す) — ranked は必ず6要素あるので ranked[0] は安全。
  const features = survivors.length > 0 ? survivors : [ranked[0]];

  return { features, closure: namingClosureMode(cx), axes: { ...axes } };
}

/// strength 降順に安定ソート。差 < tieBand の近傍は kindPriority で決着させる (決定性の担保)。
function namingRankFeatures(features) {
  return features.slice().sort((a, b) => {
    if (Math.abs(a.strength - b.strength) < NAMING_TIE_BAND) {
      return (NAMING_KIND_PRIORITY[a.kind] ?? 0) - (NAMING_KIND_PRIORITY[b.kind] ?? 0);
    }
    return b.strength - a.strength;
  });
}

/// ClosureMode 判定 (文字列で表現: "nasal"|"cut"|"open"|"long")。
function namingClosureMode(cx) {
  if (cx.isClosed) {
    return cx.cornerSharpness < NAMING_CLOSURE_CLOSED_CUT_THRESHOLD ? "nasal" : "cut";
  }
  if (cx.cornerSharpness >= NAMING_CLOSURE_OPEN_CUT_THRESHOLD && cx.corners >= 1) {
    return "cut";
  }
  // 角のない長い一筆 = 流線の余韻 → ー。短い線・曲がる線は開音節のまま。
  if (cx.corners === 0 && cx.pathRatio >= NAMING_CLOSURE_LONG_PATH_RATIO) {
    return "long";
  }
  return "open";
}

// ─── 配置 (特徴序列 → スロット列) ───

/// kind → スロットのターゲット軸 (写像表そのまま。st = strength)。
function namingSlotAxes(kind, st) {
  switch (kind) {
    case "spike":   return { size: -0.5 * st, sharp:  0.9 * st, tex: 0,        bright:  0.4 * st, round: -0.3 * st, open: -0.3 * st };
    case "mass":    return { size:  0.9 * st, sharp: -0.1 * st, tex: 0,        bright: -0.4 * st, round:  0.2 * st, open:  0.4 * st };
    case "round":   return { size:  0,        sharp: -0.9 * st, tex: 0,        bright: -0.2 * st, round:  0.6 * st, open:  0 };
    case "edge":    return { size:  0.5 * st, sharp:  0.6 * st, tex: 0.2 * st, bright:  0,        round:  0,        open:  0.3 * st };
    case "repeatN": return { size:  0,        sharp:  0,        tex: 0.9 * st, bright:  0,        round:  0,        open:  0 };
    case "flat":    return { size:  0.2 * st, sharp:  0.4 * st, tex: 0,        bright:  0.2 * st, round:  0.3 * st, open:  0.2 * st };
    default:        return { size: 0, sharp: 0, tex: 0, bright: 0, round: 0, open: 0 };
  }
}
/// kind → 調音方法プロファイル ({p,a,f,s} = 破裂/破擦/摩擦/共鳴。写像表そのまま・全成分×strength)。
function namingSlotManner(kind, st) {
  switch (kind) {
    case "spike":   return { p: 1.0 * st, a: 0.5 * st, f: 0.1 * st, s: 0 };
    case "mass":    return { p: 0.8 * st, a: 0,        f: 0.1 * st, s: 0.4 * st };
    case "round":   return { p: 0,        a: 0,        f: 0.2 * st, s: 1.0 * st };
    case "edge":    return { p: 1.0 * st, a: 0.3 * st, f: 0,        s: 0 };
    case "repeatN": return { p: 0,        a: 0.8 * st, f: 0.6 * st, s: 0.2 * st };
    case "flat":    return { p: 1.0 * st, a: 0,        f: 0.2 * st, s: 0.2 * st };
    default:        return { p: 0, a: 0, f: 0, s: 0 };
  }
}

/// 対照尾スロット: 頭の軸を軸別重みで反転した1モーラ (ドデカミンの「ミ」/まる子の「こ」)。
function namingContrastTailSlot(headAxes, c) {
  const axes = {
    size:  -headAxes.size   * NAMING_CONTRAST_SIZE_WEIGHT  * c,
    sharp: -headAxes.sharp  * NAMING_CONTRAST_SHARP_WEIGHT * c,
    tex: 0,
    bright: -headAxes.bright * NAMING_CONTRAST_MINOR_WEIGHT * c,
    round:  -headAxes.round  * NAMING_CONTRAST_MINOR_WEIGHT * c,
    open:   -headAxes.open   * NAMING_CONTRAST_MINOR_WEIGHT * c,
  };
  // 尾の調音方法は反転後の鋭さ極性から: 丸尾 → 共鳴 (ミ/りん)、鋭尾 → 破裂 (こ/く)。
  const ts = Math.max(-1, Math.min(1, axes.sharp));
  const manner = { p: Math.max(0, ts), a: 0.3 * Math.max(0, ts), f: 0, s: Math.max(0, -ts) };
  return { axes, manner, moraCount: 1 };
}

/// P4: 頭極性 (対照と closure 昇格の判定に使う)。size 主軸 + sharpness 副軸の符号付き強度。
function namingHeadPolarity(slots) {
  if (slots.length === 0) return 0;
  const h = slots[0];
  return 0.6 * h.axes.size + 0.4 * h.axes.sharp;
}

/// 特徴序列 → スロット列 (頭・中・対照尾)。features[0]=頭(最強)、features[1]=中(第二特徴)。
/// features[2] 以降は使わない (salience 上位2特徴まで — 1作1概念の命名版)。
/// contrast > 0 なら頭極性を反転した1モーラの対照尾スロットを足す (P4)。
function namingSlots(inventory, contrast = 0) {
  const out = [];
  const features = inventory.features;
  if (!features || features.length === 0) return out;
  const head = features[0];
  const headAxes = namingSlotAxes(head.kind, head.strength);
  out.push({
    axes: headAxes,
    manner: namingSlotManner(head.kind, head.strength),
    moraCount: head.strength >= NAMING_HEAD_TWO_MORA_THRESHOLD ? 2 : 1,
  });
  if (features.length >= 2) {
    const body = features[1];
    out.push({
      axes: namingSlotAxes(body.kind, body.strength),
      manner: namingSlotManner(body.kind, body.strength),
      moraCount: body.strength >= NAMING_BODY_TWO_MORA_THRESHOLD ? 2 : 1,
    });
  }
  if (contrast > NAMING_CONTRAST_TAIL_THRESHOLD) {
    out.push(namingContrastTailSlot(headAxes, Math.min(1, contrast)));
  }
  return out;
}

// ─── 命名モードの生成入口 (CVGenerator.generateNamed の移植) ───

/// 命名モード (配置層)。実況の generate 系と独立・既存経路不変。スロットごとに
/// pickConsonant/pickVowel を呼ぶ (kiki は使わない — スロット軸が既にそのスロットの
/// ターゲットなので、大域 K 整合ゲートを別途通す必要がない)。
function namingGenerate(inventory, rand, contrast = 0, temperature = 0.4) {
  const slots = namingSlots(inventory, contrast);

  const moras = [];
  let prevOnset = null;
  for (const slot of slots) {
    for (let i = 0; i < slot.moraCount; i++) {
      // excludeNil=true (Swift の allowNilOnset:false 相当): 命名モードは常に子音始まり。
      const onset = pickConsonant(slot.axes, prevOnset, temperature, rand, null, slot.manner, true, null);
      // 拗音/半母音 onset は a/u/o の3母音とのみ結合 (generate と同じ制約, Stage 2d)。
      const needsAUO = onset !== null && (PALATALIZED.has(onset) || SEMIVOWEL.has(onset));
      const restrict = needsAUO ? new Set(["a", "u", "o"]) : null;
      const nucleus = pickVowel(slot.axes, null, temperature, restrict, rand, null);
      moras.push({ onset, nucleus, durationMs: 170 + slot.axes.size * 20,
                   gapMs: 0, amplitude: 1.0, isN: false, isQ: false });
      prevOnset = onset;
    }
  }

  // 終止の適用 (コーパス検証 §10-1 の確定規則)。
  // P4: 強い頭 (極性 > 0.3) を contrast >= 0.5 で丸く締める — open は nasal へ昇格
  // (対照尾 CV + ん = 「ミン」構造)。閉形/流線が自身の終止 (nasal/cut/ー) を持つ場合は
  // 形の読みを優先し上書きしない。
  let closure = inventory.closure;
  if (contrast >= 0.5 && closure === "open"
      && namingHeadPolarity(slots) > NAMING_CONTRAST_NASAL_UPGRADE_THRESHOLD) {
    closure = "nasal";
  }
  switch (closure) {
    case "nasal":
      moras.push(moraicNMora());
      break;
    case "cut":
      // 語末には置かない (実在名51本で促音終止ゼロの実測)。最終モーラの直前に促音 gap を
      // 挿入し、語は開音節のまま終える — 促音は「語中の弾み」の資源として使う。
      // 1モーラ語では gap が「語頭促音」になってしまうため適用しない (開音節扱い)。
      if (moras.length >= 2) {
        const last = moras.pop();
        moras.push(gapMora(last));
      }
      break;
    case "open":
      break;   // 開音節 — 何も足さない
    case "long": {
      // 流線の余韻 = 直前母音の保持 (onset なし + 同一 nucleus = 長音延長)。撥音直後は付けない。
      const prev = moras[moras.length - 1];
      if (prev && !prev.isN) moras.push(heldVowelMora(prev.nucleus));
      break;
    }
    default:
      break;   // suffix (P2 では SuffixLexicon 立法待ち・空なので生成されない。安全側で open 同扱い)
  }

  const f0Raw = 200 * (1 + 0.2 * inventory.axes.bright - 0.2 * inventory.axes.size);
  const baseF0 = Math.max(80, Math.min(400, f0Raw));

  return { axes: { ...inventory.axes }, moras, baseF0, isRedup: false };
}

// ─── NG 語フィルタ (常設合意 2026-07-09): 命名経路にも既定配線。実況の生出力方針は不変 ───
// LexicalFilter.swift の ngWords をそのまま (カタカナ・部分一致)。
const NAMING_NG_WORDS = [
  // 性的
  "チンチン", "チンコ", "チンポ", "マンコ", "マンマン",
  "パイパイ", "オッパイ", "チクビ", "キンタマ", "ボッキ",
  "ペニス", "クンニ", "フェラ", "オナニ", "セックス", "エロ",
  // スカトロ
  "ウンコ", "ウンチ", "シッコ", "クソ", "ゲロ", "ゲリ",
  // 暴言
  "シネ", "コロス",
];
// 長音を除いたひらがな→カタカナ正規形 (ぁ〜ん を +0x60)。照合前に語とパターン双方から
// 長音「ー」を除去する (チーンチン等の変形を拾う。促音ッは除去しない)。
function namingNormalizeForNG(s) {
  let out = "";
  for (const ch of s) {
    const code = ch.codePointAt(0);
    out += (code >= 0x3041 && code <= 0x3093) ? String.fromCodePoint(code + 0x60) : ch;
  }
  return out.replace(/ー/g, "");
}
const NAMING_NG_NORMALIZED = NAMING_NG_WORDS.map(namingNormalizeForNG);
/// かな文字列 (namingKanaOf の出力等) が NG 語を含まないか。
function namingIsClean(kana) {
  const n = namingNormalizeForNG(kana);
  for (const ng of NAMING_NG_NORMALIZED) if (n.includes(ng)) return false;
  return true;
}

// mora列 → ひらがな (KanaTable.swift/kanaMarks の移植)。web の通常表示は romajiOf を使う
// ため (この web 版に既存のかな変換が無い)、NG フィルタの内部判定専用として追加する —
// UI 表示・再生経路には一切影響しない。
const NAMING_KANA_ROWS = {
  "":   ["あ", "い", "う", "え", "お"],
  k:  ["か", "き", "く", "け", "こ"],
  g:  ["が", "ぎ", "ぐ", "げ", "ご"],
  s:  ["さ", "し", "す", "せ", "そ"],
  z:  ["ざ", "じ", "ず", "ぜ", "ぞ"],
  t:  ["た", "ち", "つ", "て", "と"],
  d:  ["だ", "でぃ", "どぅ", "で", "ど"],
  n:  ["な", "に", "ぬ", "ね", "の"],
  h:  ["は", "ひ", "ふ", "へ", "ほ"],
  b:  ["ば", "び", "ぶ", "べ", "ぼ"],
  p:  ["ぱ", "ぴ", "ぷ", "ぺ", "ぽ"],
  m:  ["ま", "み", "む", "め", "も"],
  r:  ["ら", "り", "る", "れ", "ろ"],
  w:  ["わ", "うぃ", "う", "うぇ", "を"],
  y:  ["や", "い", "ゆ", "え", "よ"],
  f:  ["ふぁ", "ふぃ", "ふ", "ふぇ", "ふぉ"],
  sh: ["しゃ", "し", "しゅ", "しぇ", "しょ"],
  ts: ["つぁ", "つぃ", "つ", "つぇ", "つぉ"],
  ch: ["ちゃ", "ち", "ちゅ", "ちぇ", "ちょ"],
  j:  ["じゃ", "じ", "じゅ", "じぇ", "じょ"],
  ky: ["きゃ", "き", "きゅ", "きぇ", "きょ"],
  gy: ["ぎゃ", "ぎ", "ぎゅ", "ぎぇ", "ぎょ"],
  ny: ["にゃ", "に", "にゅ", "にぇ", "にょ"],
};
const NAMING_VOWEL_INDEX = { a: 0, i: 1, u: 2, e: 3, o: 4 };
function namingKanaOf(moras) {
  let out = "", prevVowel = null;
  for (const m of moras) {
    if (m.isN) { out += "ん"; prevVowel = null; continue; }
    if (m.isQ) { out += "っ"; prevVowel = null; continue; }
    if (m.onset === null && prevVowel !== null && prevVowel === m.nucleus) {
      out += "ー";   // 長音符 (直前母音を伸ばす)。prevVowel は据え置き。
    } else {
      const row = NAMING_KANA_ROWS[m.onset ?? ""] ?? NAMING_KANA_ROWS[""];
      let base = row[NAMING_VOWEL_INDEX[m.nucleus] ?? 0];
      if (m.gapMs > 0) base = "っ" + base;
      out += base;
      prevVowel = m.nucleus;
    }
  }
  return out;
}

/// NG を避ける決定的な生成。NG 語に当たったら seed を固定ステップでずらして再生成
/// (最大 maxAttempts 回)。同じ入力 → 常に同じクリーンな語 (LexicalFilter.generateClean /
/// CVGenerator.generateNamedClean と同じ定型: 決定的リロール・全滅時は最後の候補)。
function namingGenerateClean(inventory, seed, contrast = 0, maxAttempts = 8, temperature = 0.4) {
  let last = null;
  const attempts = Math.max(maxAttempts, 1);
  for (let attempt = 0; attempt < attempts; attempt++) {
    const rand = mulberry32((seed + attempt * 0x9e3779b9) >>> 0);
    const event = namingGenerate(inventory, rand, contrast, temperature);
    if (namingIsClean(namingKanaOf(event.moras))) return event;
    last = event;
  }
  return last;
}

// ─── P11 記号語彙 (2026-07-15): ⊃⊂∩∪ (開いた弧) → 母音+ん / ＜＞∧∨ (開いた一角) → 子音+ん ───
// Icefaceさん発案: 「向きに依らず形だけで決まる」規則。round/open (口の形) や brightness
// (キャンバス内の位置) は描線の向き・位置に依存するため使わない — corners/cornerSharpness/
// isClosed/rotationFraction (向き不変な形の特徴) だけで判定する。真っ直ぐな線 (rotationFraction
// ≈0) や閉じた丸 (≈1 以上) は対象外 — あくまで「弧を描いたが閉じていない」形だけを拾う。
function openArcSignal(cx) {

// あああん になった)。円が「完成する」のは一周して閉じた瞬間だけ — 2周目以降は別の描写

const ARC_VOCAB = {

  left:  ["myo", "myoo", "myooo"],   // ⊂ 膨らみ左: 音が引いていく・奥に集まる
  up:    ["nyu", "nyuu", "nyuuu"],   // ∩ 膨らみ上: 下から持ち上がる・芽生え
  down:  ["moo", "mooo", "moooo"],   // ∪ 膨らみ下: 下に音が籠る・重力・包み込む

/// 弧の膨らみの向き: 弦 (始点→終点) から最も遠い点 (弧の頂) が、弦の中点から見て
/// どちらに膨らんでいるか。up = 画面上方向 (∩)。
function arcBulgeDirection(points) {
  const a = points[0], b = points[points.length - 1];
  const mx = (a.x + b.x) / 2, my = (a.y + b.y) / 2;
  let best = points[0], bestD = -1;
  const abx = b.x - a.x, aby = b.y - a.y;
  const abLen = Math.max(1e-6, Math.hypot(abx, aby));
  for (const p of points) {
    // 弦からの垂直距離 (外積の絶対値 / 弦長)
    const d = Math.abs((p.x - a.x) * aby - (p.y - a.y) * abx) / abLen;
    if (d > bestD) { bestD = d; best = p; }
  }
  const dx = best.x - mx, dy = best.y - my;
  if (Math.abs(dx) >= Math.abs(dy)) return dx > 0 ? "right" : "left";
  return dy < 0 ? "up" : "down";
}

/// 弧の大きさ 3 段 (0=小, 1=中, 2=大): bbox 対角 / キャンバス対角。
function arcSizeClass(points, w, h) {
  let minX = points[0].x, maxX = points[0].x, minY = points[0].y, maxY = points[0].y;
  for (const p of points) {
    minX = Math.min(minX, p.x); maxX = Math.max(maxX, p.x);
    minY = Math.min(minY, p.y); maxY = Math.max(maxY, p.y);
  }
  const ratio = Math.hypot(maxX - minX, maxY - minY) / Math.max(1, Math.hypot(w, h));
  return ratio < 0.30 ? 0 : ratio < 0.55 ? 1 : 2;
}

/// 固定語彙語 → イベント。"myiii" = [myi, ー, ー] / "aaan" = [a, ー, ー, ん]。
/// 生成エンジン (pickConsonant/pickVowel/legalize) は通さない決定的な語。
function vocabEvent(word, axes) {
  const m = word.match(/^([a-z]*?)([aiueo])([aiueo]*)(n?)$/);
  const onset = m[1] || null;
  const moras = [{ onset, nucleus: m[2], durationMs: 170 + axes.size * 20,
                   gapMs: 0, amplitude: 1.0, isN: false, isQ: false }];
  for (const hv of m[3]) moras.push(heldVowelMora(hv));
  if (m[4] === "n") moras.push(moraicNMora());
  const f0 = Math.max(80, Math.min(400, 200 * (1 + 0.2 * axes.bright - 0.2 * axes.size)));
  return { axes: { ...axes }, moras, baseF0: f0, isRedup: false };

// ─── StrokeSegmenter (構造単位分割: ループ=音節, つなぎ線=ー/ん/っ/直結) ───
const LOOP_WINDING = 2 * Math.PI * 0.75;
function segmentStroke(points) {
  if (points.length < 8) return { units: [], loopCount: 0 };
  const n = points.length;
  const T = new Array(n).fill(0);
  for (let i = 1; i < n - 1; i++) {
    const v1x = points[i].x - points[i-1].x, v1y = points[i].y - points[i-1].y;
    const v2x = points[i+1].x - points[i].x, v2y = points[i+1].y - points[i].y;
    const cross = v1x * v2y - v1y * v2x, dot = v1x * v2x + v1y * v2y;
    T[i] = T[i-1] + ((Math.abs(cross) > 1e-12 || Math.abs(dot) > 1e-12) ? Math.atan2(cross, dot) : 0);
  }
  T[n-1] = T[n-2];
  const arcLen = pts => { let a = 0; for (let i = 1; i < pts.length; i++) a += Math.hypot(pts[i].x-pts[i-1].x, pts[i].y-pts[i-1].y); return a; };
  const bounds = [];
  let regionStart = 0, b = 1;
  while (b < n) {
    let found = -1;
    for (let a = b - 1; a >= regionStart; a--) {
      if (Math.abs(T[b] - T[a]) >= LOOP_WINDING) { found = a; break; }
    }
    if (found >= 0) {
      // 両側拡張: 巻きが積み続ける間、入り口/尻尾の弧を回収 (つなぎへの漏れ=偽の角を防ぐ)
      const dir = (T[b] - T[found]) >= 0 ? 1 : -1;
      let end = b;
      while (end + 1 < n && dir * (T[end+1] - T[end]) > 0.02
             && Math.abs(T[end+1] - T[found]) < 2 * Math.PI * 1.2) end++;
      let start = found;
      while (start - 1 >= regionStart && dir * (T[start] - T[start-1]) > 0.02
             && Math.abs(T[end] - T[start-1]) < 2 * Math.PI * 1.2) start--;
      if (start > regionStart + 2) bounds.push(["connector", regionStart, start]);
      bounds.push(["loop", start, end]);
      regionStart = end;
      b = end;
    }
    b++;

  if (regionStart < n - 2) bounds.push(["connector", regionStart, n - 1]);
  const units = bounds.map(([kind, a, z]) => {
    const pts = points.slice(a, Math.min(z, n - 1) + 1);
    return { kind, points: pts, arcLength: arcLen(pts) };
  });

}
// 単位語の入口判定 (2026-07-10): ループ2個以上は常に単位語。単発ループは「線の中のくるん」
// (線→一回転→また線) のときだけ — ループが内側で両側のつなぎ線が実在 (各≥全長12%)。
// 裸の丸・端フック円は従来の口/保持経路のまま。

  if (seg.loopCount !== 1 || seg.units.length < 3) return false;

  if (total <= 0) return false;
  const li = seg.units.findIndex(u => u.kind === "loop");
  const lead = seg.units.slice(0, li).reduce((a, u) => a + u.arcLength, 0);
  const trail = seg.units.slice(li + 1).reduce((a, u) => a + u.arcLength, 0);

function classifyConnector(u, isTrailing, w, h) {

  // ギザギザ (角 ≥2) → っ
  const pts = u.points, n = pts.length;
  if (n >= 7) {
    const k = Math.max(1, Math.min(Math.floor(n / 8), 6));
    let corners = 0, last = -1000;
    for (let i = k; i < n - k; i++) {
      const v1x = pts[i].x - pts[i-k].x, v1y = pts[i].y - pts[i-k].y;
      const v2x = pts[i+k].x - pts[i].x, v2y = pts[i+k].y - pts[i].y;
      const l1 = Math.hypot(v1x, v1y), l2 = Math.hypot(v2x, v2y);
      if (l1 < 1e-6 || l2 < 1e-6) continue;

// (任意オフセット・クロスフェード・sustainWrap) は mp3 のフレーム量子化/先頭パディングに

  if (wavFirst) names.push(key + ".wav");
  names.push(key + SAMPLE_EXT);
  if (key.startsWith("v_") && key.endsWith("_nn")) {
    const vowel = key.slice(2, -3);   // "v_a_nn" → "a"
    const fb = CONTN_FALLBACK[vowel];

  // v_iiiiwav.wav 事故と同型の反復パターン — web 用 mp3 は正しい名で変換済みだが、
  // dev コピー (native Resources を直参照) はタイポ済み実ファイルに当たる。

  // コウさんが cv_myi/cv_myo を録音して置けば、自動的に本来の音へ置き替わる。

// Phase 1: fetch (gesture 不要なのでページロード直後に並列で始める)
async function fetchSample(key) {
  if (rawCache.has(key)) return;
  for (const name of sampleUrlCandidates(key)) {
    try {
      const res = await fetch(SAMPLE_BASE + name);
      if (res.ok) { rawCache.set(key, await res.arrayBuffer()); break; }
    } catch (e) { /* try next candidate */ }
  }
  if (!rawCache.has(key)) rawCache.set(key, null);
  samplesLoaded++;
  const el = document.getElementById("status");
  if (el) el.textContent = `loading ${samplesLoaded}/${samplesTotal}`;

  if (note) note.textContent = T.loading(samplesLoaded, samplesTotal);
}

  }

}

//  analyzeMoras のコメント参照。同一母音の連続はモーラ個別の再アタック再生に戻した。)

// ページロード中に先行 decode する (gesture が要るのは resume = 発音のみ)。
async function decodeSample(key) {
  if (sampleBank.has(key)) return sampleBank.get(key);
  const raw = rawCache.get(key);
  if (raw === null) { sampleBank.set(key, null); return null; }   // fetch 失敗のみ確定
  if (!raw) return null;
  try {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    const buf = await audioCtx.decodeAudioData(raw.slice(0));
    const trimmed = trimLeadingSilence(buf);
    sampleBank.set(key, trimmed);
    return trimmed;
  } catch (e) {
    // decode 失敗は確定させない (suspended 起因なら gesture 後の preloadAll で再試行)
    return null;
  }

async function preloadAll() {
  await fetchAllSamples();
  await Promise.all(sampleKeys().map(decodeSample));

}

  const exact = sampleBank.get("cv_" + mora.onset + mora.nucleus);
  if (exact) return exact;

}

// 次モーラが CV→V diph (整形済み) を使うか — nextUsesCVtoVDiph (v8 拡張 run 込み)
function nvNextUsesCVtoVDiph(idx, moras, bank) {
  const cur = moras[idx];
  if (cur.isN || cur.isSilentRest || idx + 1 >= moras.length) return false;
  if (!nvVowelRunRootHasOnset(idx, moras) &&
      !nvExtendedVRunTakesCvDiph(idx, moras, bank)) return false;
  const next = moras[idx + 1];
  if (next.onset !== null || next.isN || next.isSilentRest) return false;
  return bank.diph.has(cur.nucleus + next.nucleus);
}

// CV→V boundary の 2 モーラ目か (fade-in 抑制用・現行パターンでは常に false 側) — isCVtoVDiphSecondMora
function nvIsCVtoVDiphSecondMora(idx, moras, bank) {
  const m = moras[idx];
  if (m.onset !== null || m.isN || idx <= 0) return false;
  const prev = moras[idx - 1];
  if (prev.onset === null || prev.isN) return false;
  return bank.diph.has(prev.nucleus + m.nucleus);
}

// 連続母音 (生 diph) 検出 — diphContext (パターン3=CV→V 逆算は native 2026-07-06 で廃止済み)
// 戻り値の baseMs: 再生時刻 = baseMs + モーラ内時刻 (パターン2 は前モーラ長ぶん進んだ位置から)
function nvDiphContext(idx, moras, bank) {
  const m = moras[idx];
  if (nvVvDiphPart1Takes(idx, moras, bank)) {
    const next = moras[idx + 1];
    return { v1: m.nucleus, v2: next.nucleus, baseMs: 0,
             envTotalMs: m.durationMs + next.durationMs };
  }
  if (idx > 0 && nvVvDiphPart1Takes(idx - 1, moras, bank)) {
    const prev = moras[idx - 1];
    return { v1: prev.nucleus, v2: m.nucleus, baseMs: prev.durationMs,
             envTotalMs: prev.durationMs + m.durationMs };
  }
  return null;
}

// 長母音延長 — longVowelExtension (根まで遡り 1 テイク継続・v7.15 の同母音 run 根切替込み)
function nvLongVowelExtension(idx, moras) {
  const m = moras[idx];
  if (m.onset !== null || m.isN || m.isSilentRest || idx <= 0) return null;
  if (!nvIsLongVowelStep(moras[idx - 1], m)) return null;
  let root = idx - 1;
  while (root > 0 && moras[root].onset === null && !moras[root].isN &&
         nvIsLongVowelStep(moras[root - 1], moras[root])) {
    root--;
  }
  // v7.15: 直前が同じ母音なのに根が別母音 (oouu の 4 モーラ目) は同一母音 run の先頭を根に
  let sourceSwitched = false;
  if (moras[root].nucleus !== m.nucleus && moras[idx - 1].nucleus === m.nucleus) {
    let sameRoot = idx - 1;
    while (sameRoot > 0 && moras[sameRoot - 1].onset === null && !moras[sameRoot - 1].isN &&
           !moras[sameRoot - 1].isSilentRest && moras[sameRoot - 1].nucleus === m.nucleus) {
      sameRoot--;
    }
    root = sameRoot;
    sourceSwitched = true;
  }
  let baseMs = 0;
  for (let i = root; i < idx; i++) baseMs += moras[i].durationMs;
  let last = idx;
  while (last + 1 < moras.length && moras[last + 1].onset === null && !moras[last + 1].isN &&
         nvIsLongVowelStep(moras[last], moras[last + 1])) {
    last++;
  }
  let totalMs = 0;
  for (let i = root; i <= last; i++) totalMs += moras[i].durationMs;
  return { sourceOnset: moras[root].onset, sourceNucleus: moras[root].nucleus,
           baseMs, totalMs, sourceSwitched };
}

// CV サンプルのルックアップ (bufferFor と同じフォールバック: my→m行・/a/ 代用)
function nvCvArr(bank, onset, nucleus) {
  let arr = bank.cv.get(onset + "|" + nucleus);
  if (!arr && onset === "my") arr = bank.cv.get("m|" + nucleus);
  if (!arr) arr = bank.cv.get(onset + "|a");
  return arr || null;
}

// 長母音延長のサンプル読み出し — readLongVowelExtensionSample (音程バリアント無し版)。
// 長い持続テイク (v_aaaa 等 ≥0.6s) が根の母音にあれば、子音根でも延長の本体はそれで伸ばす。
function nvReadLongVowelExtensionSample(bank, ext, timeMs) {
  const vArr = bank.v.get(ext.sourceNucleus);
  const sustainDur = nvDur(vArr, bank.sr);
  if (sustainDur >= 0.6) {
    return nvInterp(vArr, bank.sr, nvSustainWrap(timeMs / 1000.0, sustainDur));
  }
  const srcArr = ext.sourceOnset !== null
    ? nvCvArr(bank, ext.sourceOnset, ext.sourceNucleus) : vArr;
  const d = nvDur(srcArr, bank.sr);
  return nvInterp(srcArr, bank.sr, nvSustainWrap(timeMs / 1000.0, d));
}

// 末尾無音トリム — trimTrailingSilence (subarray ビュー・コピーなし)
function nvTrimTrailingSilence(arr, thresholdAbs, keepSamples) {
  let end = arr.length;
  while (end > 0 && Math.abs(arr[end - 1]) < thresholdAbs) end--;
  if (end === 0) return arr;
  return arr.subarray(0, Math.min(arr.length, end + keepSamples));
}

// 移行開始検出 v2 (母音→母音・頭定常基準) — detectTransitionStart
function nvDetectTransitionStart(arr, sr, dropDb, leadSec) {
  const win = Math.max(1, Math.round(sr * 0.010));
  if (arr.length < win * 24) return 0;
  const rms = [];
  for (let i = 0; i + win <= arr.length; i += win) {
    let s = 0;
    for (let j = i; j < i + win; j++) { const v = arr[j]; s += v * v; }
    rms.push(Math.sqrt(s / win));
  }
  const headEnd = Math.min(22, rms.length - 1);
  const head = rms.slice(2, headEnd);
  if (!head.length) return 0;
  const headMean = head.reduce((a, b) => a + b, 0) / head.length;
  if (headMean <= 1e-6) return 0;
  const threshold = headMean * Math.pow(10, -dropDb / 20);
  let k = headEnd;
  while (k + 1 < rms.length) {
    if (rms[k] < threshold && rms[k + 1] < threshold) break;
    k++;
  }
  return Math.max(0, k * 0.010 - leadSec);
}

// CV→V diph の整形 — prepareContN の diph パラメータ版 (headDb -12 / tailDb -15 /
// 頭定常検出 / リード -40ms / liftCap 無制限 [+30dB のみ])。contN 用の RMS/スペクトル
// 検出パスは web ではベイク済み mp3 (bake_contn.py) が担うため移植しない。
function nvPrepareCvDiph(raw, sr) {
  const headDb = -12.0, tailDb = -15.0;
  let trimmed = nvTrimTrailingSilence(raw, 0.004, Math.round(sr * 0.01));
  if (trimmed.length <= Math.floor(sr * 0.05)) return new Float32Array(trimmed);
  const startSec = nvDetectTransitionStart(trimmed, sr, 3.0, -0.04);
  const startIdx = Math.min(trimmed.length - 1, Math.floor(startSec * sr));
  const arr = new Float32Array(trimmed.subarray(startIdx));
  const win = Math.max(1, Math.round(sr * 0.010));
  if (arr.length < win * 3) return arr;
  const env = [];
  for (let i = 0; i < arr.length; i += win) {
    const hi = Math.min(arr.length, i + win);
    let s = 0;
    for (let j = i; j < hi; j++) { const v = arr[j]; s += v * v; }
    env.push(Math.max(1e-6, Math.sqrt(s / (hi - i))));
  }
  const smooth = env.slice();
  for (let k = 1; k < env.length - 1; k++) smooth[k] = (env[k - 1] + env[k] + env[k + 1]) / 3;
  const liftCap = Math.pow(10, 30 / 20);   // liftCapDb=nil → 絶対上限 +30dB のみ
  const n = arr.length;
  for (let idx = 0; idx < n; idx++) {
    const t = idx / (n - 1);
    const targetDb = headDb + (tailDb - headDb) * t;
    const target = Math.pow(10, targetDb / 20);
    const fpos = idx / win;
    const k0 = Math.min(smooth.length - 1, Math.floor(fpos));
    const k1 = Math.min(smooth.length - 1, k0 + 1);
    const frac = fpos - k0;
    const e = smooth[k0] * (1 - frac) + smooth[k1] * frac;
    const gain = Math.min(liftCap, target / e);
    arr[idx] *= gain;
  }
  return arr;
}

// ─── オフライン合成本体 — FormantSynth.render の per-frame 分岐の移植 ───
// 分岐の選択 (モーラ単位で不変) は事前計画し、フレーム内は時刻・包絡・読み出しだけを行う。
// 数式・定数・分岐順は native と同一 (音程バリアント/フォルマント合成のみ非対応)。
function nvRenderEvent(morasRaw, bank, sr, targetMoraMs) {
  const moras = nvQuantizeMoras(morasRaw, targetMoraMs);
  if (!moras.length) return null;
  const spans = [];
  let acc = 0;
  for (const m of moras) {
    const span = m.gapMs + m.durationMs;
    spans.push({ start: acc, gapMs: m.gapMs, durMs: m.durationMs });
    acc += span;
  }
  const totalMs = acc;
  const frames = Math.ceil((totalMs + 60) / 1000 * sr);   // +60ms 無音パッド
  const out = new Float32Array(frames);

  // モーラ単位の計画 (native render の guard 順そのまま)
  const plans = moras.map((m, i) => {
    const plan = { kind: "silent" };
    if (m.isSilentRest) return plan;
    if (m.isN) {
      const contV = nvContinuationNVowel(i, moras);
      if (contV !== null && bank.contN.has(contV)) {
        let isWordFinalN = true;
        for (let j = i + 1; j < moras.length; j++) {
          if (!moras[j].isSilentRest) { isWordFinalN = false; break; }
        }
        return { kind: "contN", arr: bank.contN.get(contV),
                 prevDurMs: moras[i - 1].durationMs, isWordFinalN };
      }
      if (bank.nN) return { kind: "nN", arr: bank.nN };
      return plan;
    }
    if (m.onset !== null) {
      const arr = nvCvArr(bank, m.onset, m.nucleus);
      if (arr) {
        const suppressTail =
          (nvNextUsesLongVowelExtension(i, moras) && !nvNextTakenByVVDiph(i, moras, bank))
          || nvNextUsesCVtoVDiph(i, moras, bank);
        return { kind: "cv", arr, suppressTail };
      }
      return plan;
    }
    // 以下 onset === null (母音モーラ)
    const cvd = nvCvDiphPrev(i, moras, bank);
    if (cvd) {
      const arr = bank.cvDiph.get(cvd.v1 + cvd.v2);
      if (arr) {
        const next = i + 1 < moras.length ? moras[i + 1] : null;
        const continuesRun = !!(next && next.onset === null && !next.isN &&
                                !next.isSilentRest && next.nucleus === m.nucleus);
        return { kind: "cvDiph", cvd, arr, dur: nvDur(arr, sr),
                 runShape: nvCvDiphRunShape(i, moras), continuesRun };
      }
    }
    const diph = nvDiphContext(i, moras, bank);
    if (diph && bank.diph.has(diph.v1 + diph.v2)) {
      return { kind: "diph", diph, arr: bank.diph.get(diph.v1 + diph.v2),
               isCVtoV: nvIsCVtoVDiphSecondMora(i, moras, bank) };
    }
    const ext = nvLongVowelExtension(i, moras);
    if (ext) {
      let cvXfade = null;
      if (ext.sourceOnset !== null && moras[i - 1].onset !== null &&
          nvDur(bank.v.get(ext.sourceNucleus), sr) >= 0.6) {
        const cvArr = nvCvArr(bank, ext.sourceOnset, ext.sourceNucleus);
        if (cvArr) cvXfade = { arr: cvArr, dur: nvDur(cvArr, sr) };
      }
      return { kind: "ext", ext, cvXfade,
               extSuppressTail: nvNextUsesCVtoVDiph(i, moras, bank) };
    }
    const vArr = bank.v.get(m.nucleus);
    if (vArr) {
      const suppressTail =
        (nvNextUsesLongVowelExtension(i, moras) && !nvNextTakenByVVDiph(i, moras, bank))
        || nvNextUsesCVtoVDiph(i, moras, bank);
      return { kind: "v", arr: vArr, suppressTail };
    }
    return plan;
  });

  // 先行オーバーラップ / preQ の計画 (現モーラ側に持たせる)
  const posts = moras.map((m, i) => {
    const next = i + 1 < moras.length ? moras[i + 1] : null;
    const post = { contNArr: null, cvDiphArr: null, nextHasQ: false };
    if (!next) return post;
    if (next.isN && !m.isN && !m.isSilentRest && bank.contN.has(m.nucleus) &&
        nvContinuationNVowel(i + 1, moras) !== null) {
      post.contNArr = bank.contN.get(m.nucleus);
    }
    if (nvNextUsesCVtoVDiph(i, moras, bank)) {
      post.cvDiphArr = bank.cvDiph.get(m.nucleus + next.nucleus) || null;
    }
    post.nextHasQ = next.gapMs > 0;
    return post;
  });

  let mi = 0;
  for (let f = 0; f < frames; f++) {
    const tMs = f / sr * 1000;
    if (tMs >= totalMs) break;   // 残りはパッド (無音)
    while (mi + 1 < moras.length && tMs >= spans[mi].start + spans[mi].gapMs + spans[mi].durMs) mi++;
    const m = moras[mi], plan = plans[mi], post = posts[mi];
    const tin = tMs - spans[mi].start;
    const eventFade = Math.sin(Math.min(1, tMs / NV_EVENT_FADE_IN_MS) * Math.PI / 2);
    if (tin < m.gapMs) { out[f] = 0; continue; }   // 促音 gap = 閉鎖 (V-Q テイク無し → 無音)
    const phoneT = tin - m.gapMs;
    const amp = m.amplitude;
    let val = 0;

    if (plan.kind === "contN") {
      const preRoll = nvContNPreRollMs(plan.prevDurMs);
      const dur = nvDur(plan.arr, sr);
      let value = nvInterp(plan.arr, sr, nvSustainWrap((preRoll + phoneT) / 1000, dur));
      if (value === null) value = 0;
      let env = nvSampleEnvelope(phoneT + NV_SAMPLE_FADE_IN_MS,
                                 m.durationMs + NV_SAMPLE_FADE_IN_MS);
      const fadeStart = m.durationMs * (plan.isWordFinalN ? 0.35 : 0.30);
      const fadeSpan = Math.max(1, m.durationMs * (plan.isWordFinalN ? 0.65 : 0.25));
      if (phoneT > fadeStart) {
        const u = Math.min(1, (phoneT - fadeStart) / fadeSpan);
        const c = Math.cos(u * Math.PI / 2);
        env *= c * c;
      }
      val = value * amp * env * eventFade;
    } else if (plan.kind === "nN") {
      const value = nvInterp(plan.arr, sr, phoneT / 1000);
      const env = nvSampleEnvelope(phoneT, m.durationMs);
      val = (value === null ? 0 : value) * amp * env * eventFade;
    } else if (plan.kind === "cv") {
      const value = nvInterp(plan.arr, sr, phoneT / 1000);
      const envTotal = plan.suppressTail
        ? m.durationMs + NV_SAMPLE_FADE_OUT_MS + 5 : m.durationMs;
      const env = nvSampleEnvelope(phoneT, envTotal);
      val = (value === null ? 0 : value) * amp * env * eventFade;
    } else if (plan.kind === "cvDiph") {
      const cvd = plan.cvd;
      const preRoll = nvContNPreRollMs(cvd.prevDurationMs);
      let value = nvInterp(plan.arr, sr,
        nvSustainWrap((preRoll + cvd.timeOffsetMs + phoneT) / 1000, plan.dur));
      if (value === null) value = 0;
      const envTotal = plan.continuesRun
        ? m.durationMs + NV_SAMPLE_FADE_OUT_MS + 5 : m.durationMs;
      let env = nvSampleEnvelope(phoneT + NV_SAMPLE_FADE_IN_MS,
                                 envTotal + NV_SAMPLE_FADE_IN_MS);
      if (plan.runShape.isWordFinal) {
        if (plan.runShape.hasExtension) {
          // v7.14: run リリース開始 106% (saii 370ms から減衰)
          const u = (cvd.timeOffsetMs + phoneT) / cvd.diphMoraDurationMs;
          if (u > 1.06) {
            const r = Math.min(1, (u - 1.06) / 0.45);
            const c = Math.cos(r * Math.PI / 2);
            env *= c * c;
          }
        } else {
          // v7.11: 単独 diph モーラは 22% からリリース
          const u = phoneT / m.durationMs;
          if (u > 0.22) {
            const r = Math.min(1, (u - 0.22) / 0.73);
            const c = Math.cos(r * Math.PI / 2);
            env *= c * c;
          }
        }
      }
      val = value * amp * env * eventFade;
    } else if (plan.kind === "diph") {
      const t = plan.diph.baseMs + tin;
      const value = nvInterp(plan.arr, sr, t / 1000);
      const envT = plan.isCVtoV ? t + NV_SAMPLE_FADE_IN_MS + 1 : t;
      const env = nvSampleEnvelope(envT, plan.diph.envTotalMs);
      val = (value === null ? 0 : value) * amp * env * eventFade;
    } else if (plan.kind === "ext") {
      const ext = plan.ext;
      const timeMs = ext.baseMs + phoneT;
      let value = nvReadLongVowelExtensionSample(bank, ext, timeMs);
      if (value === null) value = 0;
      // CV根 → 長い持続母音テイクの handoff: 最初の延長モーラ頭を CV 継続と等パワー crossfade
      if (plan.cvXfade) {
        const xfadeMs = Math.min(45.0, m.durationMs * 0.6);
        if (phoneT < xfadeMs) {
          const cvT = nvSustainWrap(timeMs / 1000, plan.cvXfade.dur);
          const cvVal = nvInterp(plan.cvXfade.arr, sr, cvT);
          if (cvVal !== null) {
            const u = phoneT / xfadeMs;
            value = cvVal * Math.cos(u * Math.PI / 2) + value * Math.sin(u * Math.PI / 2);
          }
        }
      }
      const extEnvTotal = plan.extSuppressTail
        ? ext.totalMs + NV_SAMPLE_FADE_OUT_MS + 5 : ext.totalMs;
      let env = nvSampleEnvelope(timeMs, extEnvTotal);
      // v7.15b: ソースが diph → v_<v> へ切り替わるモーラは頭 12ms をフェードイン
      if (ext.sourceSwitched && phoneT < 12.0) env *= phoneT / 12.0;
      val = value * amp * env * eventFade;
    } else if (plan.kind === "v") {
      const value = nvInterp(plan.arr, sr, phoneT / 1000);
      const envTotal = plan.suppressTail
        ? m.durationMs + NV_SAMPLE_FADE_OUT_MS + 5 : m.durationMs;
      const env = nvSampleEnvelope(phoneT, envTotal);
      val = (value === null ? 0 : value) * amp * env * eventFade;
    }

    // ─── 継続撥音の先行オーバーラップ (前モーラ末尾で ん を先行立ち上げ) ───
    if (post.contNArr) {
      const boundary = m.gapMs + m.durationMs;
      const preRoll = nvContNPreRollMs(m.durationMs);
      const tailT = tin - (boundary - preRoll);
      if (tailT >= 0 && tailT < preRoll) {
        const cv = nvInterp(post.contNArr, sr, tailT / 1000);
        if (cv !== null) {
          const u = tailT / preRoll;
          const riseU = Math.min(1, u / 0.22);   // v7.5: ん の立ち上がりを加速
          val = val * Math.cos(u * Math.PI / 2)
              + cv * Math.sin(riseU * Math.PI / 2) * amp * eventFade;
        }
      }
    }
    // ─── CV→V diph の先行オーバーラップ ───
    if (post.cvDiphArr) {
      const boundary = m.gapMs + m.durationMs;
      const preRoll = nvContNPreRollMs(m.durationMs);
      const tailT = tin - (boundary - preRoll);
      if (tailT >= 0 && tailT < preRoll) {
        const dv = nvInterp(post.cvDiphArr, sr, tailT / 1000);
        if (dv !== null) {
          const u = tailT / preRoll;
          val = val * Math.cos(u * Math.PI / 2)
              + dv * Math.sin(u * Math.PI / 2) * amp * eventFade;
        }
      }
    }
    // ─── Pre-Q fade (次モーラが促音 gap を持つとき 50%→85% で閉鎖へ) ───
    if (post.nextHasQ && !m.isN) {
      const fadeStart = m.durationMs * 0.5;
      const fadeEnd = m.durationMs * 0.85;
      if (phoneT > fadeStart) {
        const progress = Math.min(1, (phoneT - fadeStart) / Math.max(1, fadeEnd - fadeStart));
        val *= Math.max(0, 1 - progress);
      }
    }
    out[f] = val;
  }

  const moraSpans = moras.map((m, i) => ({
    m, startSec: (spans[i].start + spans[i].gapMs) / 1000,
    endSec: (spans[i].start + spans[i].gapMs + spans[i].durMs) / 1000,
  }));
  return { data: out, frames, totalSec: totalMs / 1000, moraSpans };
}

// ─── native レンダラの bank 構築と再生 (impure: sampleBank / AudioContext 依存) ───
let nvBank = null, nvBankStamp = -1;
function nvChan(key) { const b = sampleBank.get(key); return b ? b.getChannelData(0) : null; }
function buildNativeVoiceBank(sr) {
  const bank = { sr, cv: new Map(), v: new Map(), nN: null, contN: new Map(),
                 diph: new Map(), cvDiph: new Map(), longDiph: new Set() };
  for (const [key, buf] of sampleBank) {
    if (!buf || !key.startsWith("cv_")) continue;
    const onset = key.slice(3, -1), nucleus = key.slice(-1);
    bank.cv.set(onset + "|" + nucleus,
                nvTrimTrailingSilence(buf.getChannelData(0), 0.004, Math.round(sr * 0.01)));
  }
  for (const v of VOWELS) {
    // native 同様: 長い持続テイク (v_aaaa 等) があれば母音サンプルとして優先
    const arr = nvChan("v_" + v + v + v + v) || nvChan("v_" + v);
    if (arr) bank.v.set(v, nvTrimTrailingSilence(arr, 0.004, Math.round(sr * 0.01)));
    const nn = nvChan("v_" + v + "_nn");
    if (nn) bank.contN.set(v, nn);   // ベイク済み → そのまま (native の prepared 相当)
  }
  bank.nN = nvChan("n_N");
  for (const p of DIPH_PAIRS) {
    const raw = nvChan("diph_" + p);
    if (raw) bank.diph.set(p, raw);
    const extRaw = nvChan("diph_" + p[0] + p[0] + p[1] + p[1]);
    if (extRaw) {
      const prepared = nvPrepareCvDiph(extRaw, sr);
      if (prepared.length) { bank.cvDiph.set(p, prepared); bank.longDiph.add(p); }
    } else if (raw) {
      const prepared = nvPrepareCvDiph(raw, sr);   // 長尺が無いペアは生 diph から (native と同じ)
      if (prepared.length) bank.cvDiph.set(p, prepared);
    }
  }
  return bank;
}
// ?voice=legacy でモーラ個別再アタック (v12) へ戻せる。native レンダが失敗しても自動で legacy。
function nativeVoiceMode() {
  try {
    const q = new URLSearchParams(location.search).get("voice");

// ─── #5 多画=句: 句の通し再生 (2026-07-17) ───
// 各語を**逐次スケジュール** (語ごとの1バッファをオフセット起動)。語を1イベントに結合しない —
// 結合すると baseF0 が1つになり「大きい丸=低い声」等の語ごとの声の高さが失われる。
// 語間の休符 = restBeats 拍 (ペンの間の写像・1拍 = 30/120 秒)。

  if (nvBankStamp !== sampleBank.size || !nvBank) {

  const bank = nvBank;
  if (!bank || bank.cv.size === 0 || bank.v.size === 0) return false;
  const moraSec = 30.0 / 120;
  const t0 = ctx.currentTime + 0.04;
  let acc = 0;
  for (const it of items) {
    const res = nvRenderEvent(it.event.moras, bank, bank.sr, moraSec * 1000);
    if (!res || !res.frames) continue;

    buf.getChannelData(0).set(res.data);

// ─── 再生: BPM グリッド (1 mora = 30000/BPM ms, 発話テンポ統一) ───
let activeNodes = [];
function stopAll() {
  for (const n of activeNodes) { try { n.stop(); } catch (e) {} }
  activeNodes = [];
}
// suspended 中に再生要求された event。resume が完了した時点で最新の 1 件だけ鳴らす。
let pendingEvent = null;
function playEvent(event) {
  const ctx = ensureCtx();
  // suspended のままスケジュールすると、resume 完了時にはエンベロープが
  // 「過去」になっていて無音になることがある (初回描画で音が出ないバグの原因)。
  // resume を試みつつ、statechange で running になった瞬間に pending を鳴らす。
  // (Safari では resume() の promise が user activation を得るまで pending のままに
  //  なるため、promise 連鎖ではなく statechange を確実な再生トリガにする。)
  if (ctx.state !== "running") {
    pendingEvent = event;
    ctx.resume().catch(() => {});
    ctx.addEventListener("statechange", function onState() {
      if (ctx.state !== "running") return;
      ctx.removeEventListener("statechange", onState);
      if (pendingEvent) {
        const ev = pendingEvent;
        pendingEvent = null;
        scheduleEvent(ctx, ev);
      }

  }

// buf を [start, start+dur] (ctx 時刻) に 3ms/12ms フェード付きでスケジュール。
// bufferOffsetSec: buf 内の再生開始位置 (diph の遷移部だけ使う場合など)。
// (2026-07-11: ループ機構なし — 全モーラが1バッファ1発の素朴なスケジュール)
function scheduleOne(ctx, buf, start, dur, amplitude, bufferOffsetSec = 0,
                     releaseSec = 0.012) {
  const src = ctx.createBufferSource();
  src.buffer = buf;
  const g = ctx.createGain();
  g.gain.setValueAtTime(0, start);
  g.gain.linearRampToValueAtTime(amplitude, start + 0.003);
  g.gain.setValueAtTime(amplitude, start + Math.max(0.003, dur - releaseSec));
  g.gain.linearRampToValueAtTime(0, start + dur);

  src.start(start, bufferOffsetSec);
  src.stop(start + dur + 0.02);

// bank 未構築/レンダ失敗時も自動で legacy へ (「うまくいかない場合は戻す」の構造的保証)。
function scheduleEvent(ctx, event) {

function scheduleEventLegacy(ctx, event) {
  stopAll();
  const bpm = 120;   // 2026-07-11: BPM ノブ廃止・120 固定 (発話テンポの個体差をデータから排除)
  const moraSec = 30.0 / bpm;             // 30000/BPM ms
  const moras = event.moras;
  const plan = analyzeMoras(moras);
  const preRollSec = Math.min(0.1, moraSec * 0.5);   // FormantSynth.contNPreRollMs の移植
  let t = ctx.currentTime + 0.04;
  const mouthCells = [];   // P3 口の推移列: モーラごとの実スケジュール時刻
  for (let i = 0; i < moras.length; i++) {
    const m = moras[i], p = plan[i];
    t += m.gapMs / 1000;                  // 促音 = 無音 gap
    mouthCells.push({ m, start: t, end: t + moraSec });

    if (p.kind === "contN") {
      // 継続撥音: 直前母音から続けて v_<v>_nn を preRoll ぶん早めに立ち上げる
      // (前モーラの自然な減衰と時間的に重なる = 先行オーバーラップ)。無ければ通常の ん。
      // 2026-07-14: 窓をバッファ実長でクランプ — 短いテイク (v_i_nn=0.26s < 窓0.35s) は
      // 正規化ランプの終端がぶつ切りになり「持ち上がって低くサッと切れる」音が出ていた。
      const buf = contNBufferFor(moras[p.prevIndex].nucleus);
      if (buf) scheduleOne(ctx, buf, t - preRollSec,
                           Math.min(moraSec + preRollSec, buf.duration), m.amplitude);
      else { const nb = bufferFor(m); if (nb) scheduleOne(ctx, nb, t, moraSec, m.amplitude); }
    } else if (p.kind === "cvDiphExt") {
      // CV→V 連続母音 (かい/こう等): v1 を保持したまま v2 へ移る拡張録音
      // (diph_aaii 等) を、直前 CV モーラと同じ preRoll 先行オーバーラップで読む
      // (native cvDiphSample + 先行オーバーラップの移植)。バッファの頭は既に v1
      // そのものの立ち上がり (leading silence trim 済) — 直前 CV の減衰と重ねて
      // 鳴らすことで再アタック無しに繋がる (contN と同じ様式)。
      const buf = cvDiphExtBufferFor(p.v1, p.v2);
      if (buf) scheduleOne(ctx, buf, t - preRollSec,
                           Math.min(moraSec + preRollSec, buf.duration), m.amplitude);
    } else {
      const buf = bufferFor(m);
      // 次モーラが contN / cvDiphExt (先行オーバーラップで重なる) なら、この母音は
      // オーバーラップ区間 (preRoll) をかけてフェードアウト = native の cos/sin
      // クロスフェード相当。全音量のまま重ねると二重発声のダブりに聴こえる
      // (2026-07-14: i+in / gya+diphExt で確認)。
      const next = i + 1 < moras.length ? plan[i + 1] : null;
      const nextOverlaps = next && (next.kind === "contN" || next.kind === "cvDiphExt");
      if (buf) scheduleOne(ctx, buf, t, moraSec, m.amplitude, 0,
                           nextOverlaps ? preRollSec : 0.012);
    }

}

function shapeMeasureLines(cx, ja) {
  const out = [];
  const n2 = v => (v >= 0 ? "+" : "") + v.toFixed(2);
  if (cx.retraced) {   // Step3
    out.push(ja ? "なぞり直し → 1周の形として読んだ (何周でも同じ形)"
                : "retraced → read as a single lap (same shape however many laps)");
  }
  if (cx.formK !== null) {   // Step1 (形の認識) + Step2 (形→音色)
    const knot = cx.corners > 0 ? (ja ? " (結び目も含む)" : " (incl. the knot)") : "";
    out.push(ja ? `形: 閉じた輪郭・角 ${cx.corners}個${knot}`
                : `form: closed contour, ${cx.corners} corner(s)${knot}`);
    const tc = cx.turnConcentration ?? 0;
    const zone = cx.formK > 0.3 ? (ja ? "破裂圏 (か・た・ぱ系)" : "plosive zone (k/t/p)")
               : cx.formK < -0.3 ? (ja ? "ブーバ圏 (ま・わ・な系)" : "bouba zone (m/w/n)")
               : (ja ? "中間" : "middle");
    out.push(ja ? `転回の集中度 ${tc.toFixed(2)} (角に集中=1 / 全周に分散=0)・角の鋭さ ${cx.cornerSharpness.toFixed(2)} → 形のK ${n2(cx.formK)} = ${zone}`
                : `turn concentration ${tc.toFixed(2)} (at corners=1 / spread=0), corner sharpness ${cx.cornerSharpness.toFixed(2)} → form K ${n2(cx.formK)} = ${zone}`);
  } else {
    const why = cx.isClosed ? (ja ? "閉じているが単純な輪郭でない (渦/連ループ)" : "closed but not a simple contour (spiral/chain)")
                            : (ja ? "開いた線" : "open line");
    out.push(ja ? `形: ${why} → 音色は軌跡から読む`
                : `form: ${why} → tone is read from the trajectory`);
  }
  // #4 乱雑度 (立法提案): 閾値 0.4 以上のときだけ効く・表示する
  if ((cx.disorder ?? 0) >= 0.4) {
    out.push(ja ? `乱雑度 ${cx.disorder.toFixed(2)} (曲がりの不揃い・自己交差) → 濁音・拗音寄り (ぐちゃぐちゃ系)`
                : `disorder ${cx.disorder.toFixed(2)} (uneven turns, self-crossings) → voiced/palatalized (gucha-gucha zone)`);
