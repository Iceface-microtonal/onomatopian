  // ピッチ ← brightness / size
  if (ax.bright > 0.3 || ax.size < -0.3)
    lines.push(ja ? "明るい/小さい → 高めのピッチ" : "bright/small → higher pitch");
  else if (ax.bright < -0.3 || ax.size > 0.3)
    lines.push(ja ? "暗い/大きい → 低めのピッチ" : "dark/big → lower pitch");
  return lines;
}
function whyFormReason(ax, moras, ja) {
  const f = v => (v >= 0 ? "+" : "") + v.toFixed(2);
  const loops = moras.filter(m => !m.isN);
  if (loops.length >= 2 && loops.slice(1).every(m => m.onset === null && m.nucleus === loops[0].nucleus))
    return ja ? "一筆の連続（口を保持）→ 長音を伸ばす（あーーー型）"
              : "one held stroke → sustained vowel (aaaa-type)";
  if (loops.length >= 2 && loops.length % 2 === 0) {
    const h = loops.length / 2;
    const key = m => (m.onset ?? "_") + m.nucleus;
    if (loops.slice(0, h).map(key).join() === loops.slice(h).map(key).join())
      return ja ? `反復（texture ${f(ax.tex)}）→ 畳語ABAB（きらきら型）`
                : `repetition (texture ${f(ax.tex)}) → reduplication ABAB (kira-kira type)`;
  }
  const last = moras[moras.length - 1];
  if (last) {
    if (last.isQ) return ja ? "鋭く単発（鋭さ高・反復低）→ 促音っ（ぱっ型）"
                            : "sharp one-shot → geminate Q (paQ-type)";
    if (last.isN) return ja ? "重・鋭・単発の衝撃 → 撥音ん（どん型）"
                            : "heavy sharp impact → moraic N (doN-type)";
    if (last.onset === null && moras.length >= 2 && last.nucleus === moras[moras.length - 2].nucleus)
      return ja ? `大きい（size ${f(ax.size)}）→ 長音ー（がーん型）`
                : `big (size ${f(ax.size)}) → long vowel (gaan-type)`;
    if (last.onset === "r" && last.nucleus === "i")
      return ja ? "小・柔・単発 → り（きらり型）" : "small soft one-shot → -ri (kirari-type)";
  }
  return ja ? "素の語根" : "plain root";
}
function updateWhy(ax, moras, vocabReason = null, shape = null) {
  const panel = document.getElementById("why-panel");
  if (!panel) return;
  const lines = explainEvent(ax, moras, vocabReason, shape);
  if (!lines.length) { panel.style.display = "none"; return; }
  document.getElementById("why-title").textContent = uiLang === "ja" ? "なぜ?" : "why?";
  const esc = s => s.replace(/&/g, "&amp;").replace(/</g, "&lt;");
  document.getElementById("why-lines").innerHTML = lines.map(l => "· " + esc(l)).join("<br>");
  panel.style.display = "";
}

// event を「最後の発声」として記憶しつつ表示・再生する。
// src は発声の出どころ (draw/tune/preset/romaji/log) — フィードバック集計の文脈情報。
function playAndRemember(event, axesUsed, log, src = "tune", extra = {}) {
  lastEvent = event;
  lastEventAxes = { ...axesUsed };
  // #5 多画=句: draw の一筆だけが句に積まれる (TUNE/preset/romaji は積まない)。
  // ペンの間 → 語間の休符 1〜3拍 (時間構造の写像・>PHRASE_IDLE_MS は pointerdown で新しい紙)。
  if (src === "draw") {
    const now = performance.now();
    const pauseSec = lastDrawPenUpAt > 0 ? (now - lastDrawPenUpAt) / 1000 : 0;
    const restBeats = phraseWordsDrawn.length === 0 ? 0
      : Math.min(3, Math.max(1, Math.round(pauseSec)));
    phraseWordsDrawn.push({ event, word: romajiOf(event), restBeats });
    strokeHistoryInk.push(stroke.map(p => ({ x: p.x, y: p.y })));
    while (phraseWordsDrawn.length > 8) { phraseWordsDrawn.shift(); strokeHistoryInk.shift(); }
    lastDrawPenUpAt = now;
    updatePhraseLine();
  }
  // 投票対象を更新 (再生のたびに新しい発話 ID。PLAY リピートでは更新しない)
  utteranceSeq += 1;
  const r3 = v => Math.round((v ?? 0) * 1000) / 1000;
  currentUtterance = {
    id: Date.now().toString(36) + "-" + utteranceSeq,
    src,
    eng: ENGINE_VERSION,
    word: romajiOf(event),
    mora: event.moras.filter(m => !m.isSilentRest).length,
    redup: !!event.isRedup,
    // v4: 口の2軸 (round/open) を含む全6軸 — 口モデルの投票相関がとれる
    axes: { s: r3(axesUsed.size), sh: r3(axesUsed.sharp), t: r3(axesUsed.tex),
            b: r3(axesUsed.bright), r: r3(axesUsed.round), o: r3(axesUsed.open) },
    // v4: モーラ列の実体 (romaji 文字列より曖昧性なく音素相関がとれる)
    moras: event.moras.filter(m => !m.isSilentRest)
      .map(m => (m.isN ? "N" : m.isQ ? "Q" : (m.onset ?? "") + m.nucleus)),
    // v4: 判定に使われた導出量 (K・角・鋭さ・ループ) — kiki/manner のデータ駆動調整用
    ...(extra.k !== undefined ? { k: r3(extra.k), cor: extra.corners ?? 0,
                                  cs: r3(extra.cs), lp: extra.loops ?? 0 } : {}),
    // v4: 描いた線の頂点列 (粗い筆の珠・正規化・≤48点) — 将来のエンジンで再抽出できる生データ
    ...(extra.stroke ? { stroke: extra.stroke } : {}),
  };
  setVoteButtons(true, null);
  const reasonEl = document.getElementById("fb-reason");
  if (reasonEl) reasonEl.value = "";   // 新しい発話 → 理由欄をリセット
  activeFbTags = new Set();            // タグもリセット (次の投票まで隠す)
  const tagBox = document.getElementById("fb-tags");
  if (tagBox) tagBox.style.display = "none";
  showResult(event);
  // なぜ? (native の explain と同じ「測って見せる」説明)。P12 語彙語は立法の理由を示す。
  updateWhy(axesUsed, event.moras, event.vocabReason ?? null, extra.shape ?? null);
  playEvent(event);
  if (log) appendLog(event);
}

// 口アイコン (2026-07-10, ChatGPT提案): round/open を連続的に口の形へ。
// 「描いた形を口として読んでいる」ことが数値なしで一瞬で伝わる。
const VOWEL_MOUTH = { "あ": [0.85, 0.0], "い": [-0.6, -0.8], "う": [-0.3, 0.8],
                      "え": [0.5, -0.4], "お": [0.4, 0.7] };   // [open, round]
const VOWEL_MOUTH_L = { a: VOWEL_MOUTH["あ"], i: VOWEL_MOUTH["い"], u: VOWEL_MOUTH["う"],
                        e: VOWEL_MOUTH["え"], o: VOWEL_MOUTH["お"] };
// 口の楕円を 1 個描く (mouth-icon と P3 推移列で共用)。
// lineWidth/fillAlpha で active 強調を表現 (native MouthTimelineView と同じ流儀)。
function strokeMouth(c, w, h, open, round, lineWidth, fillAlpha) {
  c.clearRect(0, 0, w, h);
  const spreadN = (1 - round) / 2;
  const openN = (open + 1) / 2;
  const mw = (0.30 + 0.55 * spreadN) * w;
  const mh = Math.max(2.2, (0.06 + 0.62 * openN) * h);
  c.beginPath();
  c.ellipse(w / 2, h / 2, mw / 2, mh / 2, 0, 0, 2 * Math.PI);
  if (fillAlpha > 0 && mh > h * 0.18) {
    c.fillStyle = `rgba(232,93,161,${fillAlpha})`; c.fill();
  }
  c.strokeStyle = "#e85da1";
  c.lineWidth = lineWidth;
  c.stroke();
}
function drawMouthIcon(open, round) {
  const cv = document.getElementById("mouth-icon");
  if (!cv) return;
  strokeMouth(cv.getContext("2d"), cv.width, cv.height, open, round, 2.2, 0.16);
  // 最も近い母音の仮名を添える (口の空間での最近傍)
  let best = "", bestD = Infinity;
  for (const [kana, [o, r]] of Object.entries(VOWEL_MOUTH)) {
    const d = (open - o) ** 2 + (round - r) ** 2;
    if (d < bestD) { bestD = d; best = kana; }
  }
  const el = document.getElementById("mouth-vowel");
  if (el) el.textContent = best;
}

// ─── P3: 口の推移列 (native ② MouthTimelineView の移植, 2026-07-11) ───
// 発話スケジュールと同期して、モーラごとの口の形が並ぶ。いま鳴っているモーラの
// 口が立ち (fill+太線+拡大)、発話済みは 0.85 で残り、未発話は 0.35 で待つ。
// 発話が終わっても列は残る (native と同じ「終了後も推移が読める」挙動)。
const MOUTH_N = [-0.9, -0.2];   // ん (と促音の閉じ): ほぼ閉じた口
function mouthForMora(m) {
  return m.isN ? MOUTH_N : (VOWEL_MOUTH_L[m.nucleus] ?? [0, 0]);
}
function moraLabel(m) {
  return m.isN ? "n" : (m.onset ?? "") + m.nucleus;
}
// 駆動は requestAnimationFrame でなく setInterval (50ms): 状態変化はモーラ単位
// (250ms) の離散なので十分滑らかで、RAF と違い非フォーカスタブでも止まらない
// (発話は AudioContext 時刻で進むので、表示だけ freeze すると列が置き去りになる)。
let mouthTimelineTimer = 0;
// cells: [{ m, start, end }] — start/end は AudioContext 時刻 (scheduleEvent が渡す)。
function renderMouthTimeline(ctx, cells) {
  const box = document.getElementById("mouth-timeline");
  const arrow = document.getElementById("mouth-arrow");
  if (!box) return;
  clearInterval(mouthTimelineTimer);
  box.innerHTML = "";
  if (!cells.length) { if (arrow) arrow.style.display = "none"; return; }
  if (arrow) arrow.style.display = "";
  const small = cells.length > 10;
  const cw = small ? 16 : 22, chh = small ? 14 : 18;
  const items = cells.map(cell => {
    const wrap = document.createElement("div");
    wrap.style.cssText = "display:flex; flex-direction:column; align-items:center; gap:1px;";
    const cv = document.createElement("canvas");
    cv.width = cw; cv.height = chh;
    cv.style.cssText = "transition:transform 0.08s;";
    const lb = document.createElement("div");
    lb.textContent = moraLabel(cell.m);
    lb.style.cssText = "font-size:8px; color:#999; line-height:1;";
    wrap.appendChild(cv); wrap.appendChild(lb);
    box.appendChild(wrap);
    return { ...cell, wrap, cv, lb, mouth: mouthForMora(cell.m), lastState: null };
  });
  const totalEnd = items[items.length - 1].end;
  function paint() {
    const now = ctx.currentTime;
    let anyPending = false;
    for (const it of items) {
      const state = now >= it.start && now < it.end ? "active"
                  : now >= it.end ? "spoken" : "pending";
      if (state === "pending") anyPending = true;
      if (state === it.lastState) continue;   // 状態が変わった時だけ再描画
      it.lastState = state;
      const active = state === "active";
      strokeMouth(it.cv.getContext("2d"), cw, chh, it.mouth[0], it.mouth[1],
                  active ? 2.4 : 1.7, active ? 0.30 : 0);
      it.cv.style.transform = active ? "scale(1.28)" : "scale(1)";
      it.wrap.style.opacity = active ? "1.0" : (state === "spoken" ? "0.85" : "0.35");
      it.lb.style.color = active ? "#e85da1" : "#999";
    }
    if (now >= totalEnd + 0.3 && !anyPending) {
      clearInterval(mouthTimelineTimer);   // 停止 = 最終状態 (全部 spoken 0.85) が残る
    }
  }
  paint();
  mouthTimelineTimer = setInterval(paint, 50);
}

function setSliders(ax) {
  lastAxes = { ...ax };
  const pairs = [["size","size"],["sharp","sharp"],["tex","tex"],["bright","bright"],
                 ["round","round"],["open","open"]];
  for (const [id, key] of pairs) {
    const v = ax[key] ?? 0;
    document.getElementById("ax-" + id).value = v;
    document.getElementById("val-" + id).textContent = (v >= 0 ? "+" : "") + v.toFixed(2);
  }
  drawMouthIcon(ax.open ?? 0, ax.round ?? 0);
}
function readSliders() {
  return {
    size: Number(document.getElementById("ax-size").value),
    sharp: Number(document.getElementById("ax-sharp").value),
    tex: Number(document.getElementById("ax-tex").value),
    bright: Number(document.getElementById("ax-bright").value),
    round: Number(document.getElementById("ax-round").value),
    open: Number(document.getElementById("ax-open").value),
  };
}
function showResult(event) {
  document.getElementById("result-word").textContent = romajiOf(event);
  const n = event.moras.length;
  document.getElementById("result-meta").innerHTML =
    `${n} mora${event.isRedup ? " · redup" : ""}`;   // F0 は Web 版では音に反映されないため非表示
}
function appendLog(event) {
  logEntries.push({ axes: { ...event.axes }, romaji: romajiOf(event),
                    f0: event.baseF0, moras: event.moras.map(m => ({ ...m })),
                    isRedup: event.isRedup });
  if (logEntries.length > 100) logEntries.shift();
  renderLog();
}
function renderLog() {
  const el = document.getElementById("log");
  document.getElementById("log-count").textContent = logEntries.length;
  el.innerHTML = "";
  for (let i = logEntries.length - 1; i >= 0; i--) {
    const e = logEntries[i];
    const row = document.createElement("div");
    row.className = "log-row";
    const fmt = v => (v >= 0 ? "+" : "") + v.toFixed(1);
    row.innerHTML =
      `<span class="axes">${fmt(e.axes.size)} ${fmt(e.axes.sharp)} ${fmt(e.axes.tex)} ${fmt(e.axes.bright)} →</span>` +
      `<span class="word">${e.romaji}</span>` +
      `<span class="meta">m:${e.moras.length}${e.isRedup ? "R" : ""}</span>`;
    // タップで「そのシニフィアンそのもの」を再生 (保存 mora 列、iPad 版 v0.4 と同じ)
    row.addEventListener("click", () => {
      setSliders(e.axes);
      const ev = { axes: e.axes, moras: e.moras, baseF0: e.f0, isRedup: e.isRedup };
      playAndRemember(ev, e.axes, false, "log");   // PLAY で同じ語をリピート可能に
    });
    el.appendChild(row);
  }
}

// 生成 + 再生 + ログ (決定的 seed)
function generateAndPlay(axes, salt = 0, log = true, src = "tune", opts = {}, extra = {}) {
  let event;
  if (opts.kiki != null) {
    // 語レベル K 整合ゲート: 語の K が描画の K とズレたら salt を変えて再試行 (最大3案・決定的)
    let best = null, bestD = Infinity;
    for (let a = 0; a < 3; a++) {
      const rand = mulberry32(axesSeed(axes, salt + a));
      const ev = generate(axes, rand, 0.4, opts);
      const d = Math.abs(wordK(ev.moras) - opts.kiki);
      if (d < bestD) { best = ev; bestD = d; }
      if (d <= 0.35) break;
    }
    event = best;
  } else {
    const rand = mulberry32(axesSeed(axes, salt));
    event = generate(axes, rand, 0.4, opts);
  }
  playAndRemember(event, axes, log, src, extra);
  return event;
}

// ─── Canvas (sketch) ───
const canvas = document.getElementById("canvas");
const cctx = canvas.getContext("2d");
let drawing = false, stroke = [], presetShapePts = null;

function resizeCanvas() {
  const dpr = window.devicePixelRatio || 1;
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width * dpr;
  canvas.height = rect.height * dpr;
  cctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  redraw();
}
function redraw() {
  const rect = canvas.getBoundingClientRect();
  cctx.clearRect(0, 0, rect.width, rect.height);
  // #5 多画=句: 句に属する過去の一筆を薄く残す (iPad の履歴表示と同じ様式・古いほど薄い)
  for (let h = 0; h < strokeHistoryInk.length; h++) {
    const pts = strokeHistoryInk[h];
    if (pts.length < 2) continue;
    const age = strokeHistoryInk.length - h;
    cctx.beginPath();
    cctx.strokeStyle = `rgba(40,40,40,${Math.max(0.10, 0.42 - age * 0.06)})`;
    cctx.lineWidth = 4;
    cctx.lineCap = "round";
    cctx.lineJoin = "round";
    pts.forEach((p, i) => i === 0 ? cctx.moveTo(p.x, p.y) : cctx.lineTo(p.x, p.y));
    cctx.stroke();
  }
  // プリセット見本の形 (薄ピンク)
  if (presetShapePts && presetShapePts.length > 1) {
    cctx.beginPath();
    cctx.strokeStyle = "rgba(232,72,138,0.30)";
    cctx.lineWidth = 2;
    presetShapePts.forEach((p, i) => {
      const x = p.x * rect.width, y = p.y * rect.height;
      i === 0 ? cctx.moveTo(x, y) : cctx.lineTo(x, y);
    });
    cctx.stroke();
  }
  if (stroke.length > 0 && coarseInkOn()) {
    // 粗い筆: 珠を繋ぐ太いインク + 置けた角のスパーク (判定と同じ 0.83rad) + 未確定の糸
    if (stroke.length > 1) {
      cctx.beginPath();
      cctx.strokeStyle = "rgba(40,40,40,0.9)";
      cctx.lineWidth = 5.5;
      cctx.lineCap = "round";
      cctx.lineJoin = "round";
      stroke.forEach((p, i) => i === 0 ? cctx.moveTo(p.x, p.y) : cctx.lineTo(p.x, p.y));
      cctx.stroke();
    }
    cctx.fillStyle = "rgba(20,20,20,0.95)";
    for (const p of stroke) {
      cctx.beginPath(); cctx.arc(p.x, p.y, 2.6, 0, 2 * Math.PI); cctx.fill();
    }
    for (let i = 1; i < stroke.length - 1; i++) {
      const a = stroke[i-1], b = stroke[i], c = stroke[i+1];
      const v1x = b.x - a.x, v1y = b.y - a.y, v2x = c.x - b.x, v2y = c.y - b.y;
      const l1 = Math.hypot(v1x, v1y), l2 = Math.hypot(v2x, v2y);
      if (l1 < 1e-6 || l2 < 1e-6) continue;
      const turn = Math.acos(Math.max(-1, Math.min(1, (v1x*v2x + v1y*v2y) / (l1*l2))));
      if (turn > 0.83) {
        // 実況スパークも ○→▲ (2026-07-17): 確定▲と同じ誤読 (丸マーカー=丸み) を持つため。
        // 向き = 珠3点からの外向き二等分線。輪郭▲ = 仮 (確定は塗り▲)。
        const dx = v1x / l1 - v2x / l2, dy = v1y / l1 - v2y / l2;
        const dl = Math.hypot(dx, dy);
        drawCornerTri(cctx, b, dl > 1e-6 ? dx / dl : NaN, dl > 1e-6 ? dy / dl : NaN,
                      { gap: 4, h: 9, hw: 4.2, stroke: "rgba(232,93,161,0.9)", lineWidth: 2.2 });
      }
    }
    if (pendingPt && stroke.length > 0) {
      const last = stroke[stroke.length - 1];
      cctx.beginPath();
      cctx.strokeStyle = "rgba(0,0,0,0.22)";
      cctx.lineWidth = 2;
      cctx.setLineDash([4, 4]);
      cctx.moveTo(last.x, last.y);
      cctx.lineTo(pendingPt.x, pendingPt.y);
      cctx.stroke();
      cctx.setLineDash([]);
    }
  } else if (stroke.length > 1) {
    cctx.beginPath();
    cctx.strokeStyle = "#555";
    cctx.lineWidth = 2.5;
    cctx.lineCap = "round";
    cctx.lineJoin = "round";
    stroke.forEach((p, i) => i === 0 ? cctx.moveTo(p.x, p.y) : cctx.lineTo(p.x, p.y));
    cctx.stroke();
  }
  // Step1 確定▲ (2026-07-17 ○→▲): ペンアップ判定が使った「形の角」。閉形は正準化後なので
  // 描き始めの頂点 (実況▲が出ない継ぎ目) にも付く — 表示と判定の一致。
  // ○ をやめた理由 (Icefaceさん 07-17): 丸み+角の分析で、角に丸いマーカーを置くと
  // 「丸み」と誤読される。▲は角の外向き二等分線の外側から角を指す (apex=角のすぐ外)。
  for (const p of confirmedCorners) {
    drawCornerTri(cctx, p, p.dx, p.dy,
                  { gap: 5, h: 12, hw: 5.5, fill: "rgba(232,72,138,0.95)" });
  }
}
// 角マーカー▲: apex が角の gap px 外にあり、外向き二等分線 (dx,dy) に沿って角を指す。
// 確定=塗り (fill) / 実況スパーク=輪郭 (stroke) で仮/確定の区別を保つ。
// 向きが取れない縮退時は上向き▲で位置だけ示す。
function drawCornerTri(ctx, p, dx, dy, { gap, h, hw, fill, stroke, lineWidth }) {
  if (!(Number.isFinite(dx) && Number.isFinite(dy))) { dx = 0; dy = -1; }
  const ax = p.x + dx * gap,       ay = p.y + dy * gap;        // apex (角を指す先端)
  const bx = p.x + dx * (gap + h), by = p.y + dy * (gap + h);  // 底辺の中心
  const nx = -dy, ny = dx;                                     // 底辺方向 (二等分線に垂直)
  ctx.beginPath();
  ctx.moveTo(ax, ay);
  ctx.lineTo(bx + nx * hw, by + ny * hw);
  ctx.lineTo(bx - nx * hw, by - ny * hw);
  ctx.closePath();
  if (fill) { ctx.fillStyle = fill; ctx.fill(); }
  if (stroke) {
    ctx.strokeStyle = stroke;
    ctx.lineWidth = lineWidth || 2.2;
    ctx.lineJoin = "round";
    ctx.stroke();
  }
}
function coarseInkOn() { return true; }   // 2026-07-11: 粗い筆のみ (トグル廃止・データの均質化)
let pendingPt = null;
let confirmedCorners = [];   // Step1: ペンアップ判定の「形の角」座標+外向き二等分線 (確定▲表示・クリアで消える)
// ─── #5 多画=句 (2026-07-17): 「描線の時間構造=発話の時間構造」の多画スケール拡張 ───
// 一筆=一語は不変。短い間 (< PHRASE_IDLE_MS) で描き継ぐと語が句に連なり、インクも薄く残る。
// ペンの間の長さは語間の休符 (1〜3拍) に写る。長い間 = 新しい紙 (インク・句ともリセット)。
// フィードバック/なぜ? は従来どおり最後の一筆の語に付く (v17 holdout を汚さない)。
// iPad には明示的な COMPOSE モードが既にある — web はこのアンビエント版 (非対称は意図)。
const PHRASE_IDLE_MS = 8000;
let phraseWordsDrawn = [];   // [{ event, word, restBeats }] — restBeats = 直前のペンの間 (拍)
let strokeHistoryInk = [];   // 句に属する過去の一筆のインク (薄表示)
let lastDrawPenUpAt = 0;     // 直近の draw ペンアップ時刻 (performance.now)
function pointerPos(ev) {
  const rect = canvas.getBoundingClientRect();
  return { x: ev.clientX - rect.left, y: ev.clientY - rect.top };
}
canvas.addEventListener("pointerdown", ev => {
  ensureCtx();
  drawing = true;
  presetShapePts = null;
  confirmedCorners = [];   // 新しい描線 → 前回の確定▲を消す
  // #5 多画=句: 長い間 (>8秒) は「新しい紙」— インクも句もリセット。
  // 短い間なら前の一筆のインクは薄く残り、この一筆の語が句に連なる。
  if (lastDrawPenUpAt > 0 && performance.now() - lastDrawPenUpAt > PHRASE_IDLE_MS) {
    strokeHistoryInk = [];
    phraseWordsDrawn = [];
    lastDrawPenUpAt = 0;
    updatePhraseLine();
  }
  stroke = [pointerPos(ev)];
  canvas.setPointerCapture(ev.pointerId);
  ev.preventDefault();
});
canvas.addEventListener("pointermove", ev => {
  if (!drawing) return;
  const p = pointerPos(ev);
  if (coarseInkOn() && stroke.length > 0) {
    // 粗い筆: 最後の頂点から step 以上動いたときだけ頂点を確定 (ステップ未満は未確定の糸)。
    const rect = canvas.getBoundingClientRect();
    const step = Math.hypot(rect.width, rect.height) * 0.022;
    const last = stroke[stroke.length - 1];
    if (Math.hypot(p.x - last.x, p.y - last.y) >= step) {
      stroke.push(p);
      pendingPt = null;
    } else {
      pendingPt = p;
    }
  } else {
    stroke.push(p);
  }
  redraw();
  ev.preventDefault();
});
canvas.addEventListener("pointerup", ev => {
  if (!drawing) return;
  drawing = false;
  const coarse = coarseInkOn();
  if (coarse) {
    // 終端補完 (点タップ=1頂点が語にならないのを防ぐ + 端の形)
    if (pendingPt && stroke.length > 0) {
      const last = stroke[stroke.length - 1];
      if (Math.hypot(pendingPt.x - last.x, pendingPt.y - last.y) > 2) stroke.push(pendingPt);
    }
    pendingPt = null;
  }
  // 抽出・下流は密化版 (同じ折れ線の調律済み密度)。表示 (stroke) は珠のまま保つ。
  const inkPts = (coarse && stroke.length >= 2) ? densified(stroke, 6) : stroke;
  if (inkPts.length >= 2) {
    const rect = canvas.getBoundingClientRect();
    const raw = extractAxes(inkPts, rect.width, rect.height);
    const hc = Number(document.getElementById("kn-hc").value);
    let ax = applyHandCorrection(raw, hc, !coarse);
    // 粗い筆: 軸の知覚バケット (0.25) — 似た描写→同一の軸→同一の語 (再現性の要)。
    if (coarse) ax = bucketedAxes(ax, 0.25);
    setSliders(ax);
    // 最新 Core 適応 (2026-07-09): 複雑さ → 語長 / bouba・kiki 大域判定 / 一筆連続=長音 /
    // 構造単位 (ループ≥2 → ループ=音節・つなぎ線=ー,ん,っ,直結)。同じ描写 = 同じ語 (決定的)。
    // P1: 角検出だけスプライン再構成幾何で行う (珠の継ぎ目の偽の角を除去)。
    const geomPts = (coarse && stroke.length >= 3) ? splineDensified(stroke, 6) : inkPts;
    const cx = strokeComplexity(geomPts, rect.width, rect.height, 16);
    // Step2: 閉形は完成形から読んだ K (formK) が軌跡 K (drawK) を置き換える —
    // 「最終的な重みは見た目・出来上がった形」(Icefaceさん方針)。開いた線は従来どおり。
    let kDraw = cx.formK != null ? cx.formK : drawK(ax.sharp, cx.corners, cx.cornerSharpness);
    if (coarse) kDraw = Math.round(kDraw / 0.125) * 0.125;   // K も同じ格子に
    // manner 次元 (2026-07-10): 描線の動態 → 子音の調音方法の親和。
    const mDraw = mannerProfile(ax.sharp, cx.corners, cx.cornerSharpness, ax.tex, cx.loops);
    // cornerSharpness<0.35: 角が丸まって2個以下に数えられた三角の「保持=長音」誤爆を防ぐ保険。
    const sustained = cx.loops <= 1 && cx.corners <= 2 && cx.cornerSharpness < 0.35
      && ax.tex < 0.3 && cx.moraCount >= 2;
    // P12 記号語彙 (2026-07-16 コウさん立法): 開いた弧 (⊃⊂∩∪) = 向き×大きさの固定語彙。
    // 完全に閉じた大きく開いた円 = aaan (収束の ん が初めて立つ)。小さく閉じた丸 (う=すぼめ)
    // と楕円 (え, P9e で round が動く) は既存の口の法のまま。
    // 開いた一角 (＜＞∧∨→子音+ん, P11) はコウさん未立法につき現状維持。
    const openArc = openArcSignal(cx), openChevron = openChevronSignal(cx);
    let vocabWord = null, vocabReason = null;
    if (openArc) {
      const dir = arcBulgeDirection(inkPts);
      const sizeClass = arcSizeClass(inkPts, rect.width, rect.height);
      vocabWord = ARC_VOCAB[dir][sizeClass];
      const dirJa = { right: "⊃ 膨らみ右=接近", left: "⊂ 膨らみ左=後退",
                      up: "∩ 持ち上がり=芽生え", down: "∪ 重力=籠り" }[dir];
      const sizeJa = ["小", "中", "大"][sizeClass];
      vocabReason = uiLang === "ja"
        ? `開いた弧 ${dirJa}・${sizeJa} → ${vocabWord}（鼻音=柔らかさ・ん は円が完成するまで付かない）`
        : `open arc (${dir}, size ${sizeClass}) → ${vocabWord} (nasal = softness; no final N until the circle closes)`;
    } else if (circleVocabSignal(cx, ax)) {
      vocabWord = CIRCLE_VOCAB;
      vocabReason = uiLang === "ja"
        ? `完全な円 → ${CIRCLE_VOCAB}（円が完成して初めて 収束の ん が立つ）`
        : `completed circle → ${CIRCLE_VOCAB} (the closing N appears only when the circle completes)`;
    }
    // Step1 確定▲: 判定に使った「形の角」(閉形は正準化後 = 描き始めの頂点も含む) を表示。
    // 実況▲(輪郭線) = 軌跡がその場で曲がった点 / 確定▲(塗り) = 完成形としての角 — 表示と判定を一致させる。
    confirmedCorners = cx.cornerPoints || [];
    redraw();
    const seg = segmentStroke(inkPts);
    // v4 フィードバック用の発話コンテキスト: 判定に使った導出量 + 描いた珠の頂点列 (正規化・≤48点)。
    const r3 = v => Math.round(v * 1000) / 1000;
    const beads = (coarse ? stroke : inkPts).slice(0, 48)
      .map(p => [r3(p.x / rect.width), r3(p.y / rect.height)]);
    // shape: なぜ?パネルの計測表示用 (Step1/2/3)。playAndRemember は fb レコードへ
    // 明示フィールドしか写さないので、ここに載せても投票データには入らない。
    const extra = { k: kDraw, corners: cx.corners, cs: cx.cornerSharpness,
                    loops: cx.loops, stroke: beads, shape: cx };
    // #4 乱雑度: 閾値 0.4 以上のときだけ生成へ注入 (規則的な描線は null = 従来と厳密互換)。
    // 8類型の実測分離: なぐり書き ≥0.84 / 規則形 (ジグザグ・ハッチング・星・波) ≤0.17。
    const disorder = cx.disorder >= 0.4 ? cx.disorder : null;
    // 命名モード (配置層, dev only): トグル ON のときはモードスイッチとして全ての経路
    // (記号語彙/単位語/実況 generate) を上書きする。OFF (既定) ではこの分岐は素通り —
    // 以降の従来経路 (vocabWord/unitEligible/generateAndPlay) はバイト単位で不変。
    if (namingModeOn()) {
      const contrast = Number(document.getElementById("naming-contrast").value || 0);
      const inv = namingDecompose(ax, cx);
      const event = namingGenerateClean(inv, axesSeed(ax, 0), contrast);
      playAndRemember(event, ax, true, "naming", extra);
    } else if (vocabWord) {
      const ev2 = vocabEvent(vocabWord, ax);
      ev2.vocabReason = vocabReason;
      playAndRemember(ev2, ax, true, "draw", extra);
    } else if (unitEligible(seg) && cx.formK == null) {
      // 形が認識された閉形 (formK 非 null) は形経路 (generate+kiki=formK) を優先 —
      // 5芒星は巻きで loops=2 になり単位語 (ループ=音節) に取られていたが、
      // 頂点優勢の閉形の「ループ」は描いた輪でなく巻きの副産物 (2026-07-17 監査)。
      // 連ループびーびー/8の字は formK=null のまま = 単位語経路を保持。
      const event = generateFromUnits(seg.units, rect.width, rect.height, ax, kDraw, 0.4, mDraw,
                                      disorder);
      playAndRemember(event, ax, true, "draw", extra);
    } else {
      generateAndPlay(ax, 0, true, "draw",
                      { moraCountOverride: openChevron ? 1 : cx.moraCount,
                        kiki: kDraw, manner: mDraw, sustained, lengthHint: cx.moraCount,
                        forceConsonantOnset: openChevron, disorder }, extra);
    }
  }
  ev.preventDefault();
});

// ROMAJI 直接入力 (parseMora の移植)
function parseMora(token, withQ) {
  if (!token) return null;
  const gapFor = c => withQ ? geminateGapMs(c) : 0;
  if (VOWELS.includes(token))
    return { onset: null, nucleus: token, durationMs: 180, gapMs: gapFor(null), amplitude: 1, isN: false };
  // my は P12 (2026-07-16) の新音素 (みゃ行)。myi=むぃ も実録音あり (myon→みょん が打てるように)。
  for (const c2 of ["sh","ts","ch","ky","gy","ny","my"]) {
    if (token.startsWith(c2) && VOWELS.includes(token.slice(c2.length)))
      return { onset: c2, nucleus: token.slice(c2.length), durationMs: 180, gapMs: gapFor(c2), amplitude: 1, isN: false };
  }
  if (token.length === 2 && CONSONANTS.includes(token[0]) && VOWELS.includes(token[1]))
    return { onset: token[0], nucleus: token[1], durationMs: 180, gapMs: gapFor(token[0]), amplitude: 1, isN: false };
  return null;
}
// 語 (space 不要) を greedy CV で自動分割 (Romaji.segmentWord の移植)。
// 例: "bouba"→bo-u-ba, "kirakira"→ki-ra-ki-ra, "doN"/"don"→do-ん。
// 3文字(拗音等)→2文字(CV)→1文字(母音) の順に試し、"n" は次が母音/y+母音でなければ撥音。
function segmentWord(word) {
  const s = Array.from(word.toLowerCase());
  const vowels = new Set(["a","i","u","e","o"]);
  const sub = (a, len) => (a >= 0 && a + len <= s.length) ? s.slice(a, a + len).join("") : null;
  const moras = [];
  let i = 0, pendingQ = false;
  const geminable = new Set(["k","g","s","z","t","d","h","f","p","b","m","y","r","w","c","j"]);
  while (i < s.length) {
    const c = s[i];
    if (c === "q") { pendingQ = true; i += 1; continue; }
    // 通常ローマ字の促音 (2026-07-09): 子音字の重ね = っ (kutta/kappa/maccha)。nn は撥音なので除外。
    if (i + 1 < s.length && c === s[i + 1] && geminable.has(c)) { pendingQ = true; i += 1; continue; }
    // ヘボン式の っち = tch (matcha): t + ch → 促音 + ち。
    if (c === "t" && i + 2 < s.length && s[i + 1] === "c" && s[i + 2] === "h") { pendingQ = true; i += 1; continue; }
    if (c === "n") {
      const nextV = i + 1 < s.length && vowels.has(s[i + 1]);
      const isNy = i + 2 < s.length && s[i + 1] === "y" && vowels.has(s[i + 2]);
      if (!nextV && !isNy) {
        moras.push({ onset: null, nucleus: "a", durationMs: 160,
                     gapMs: pendingQ ? 70 : 0, amplitude: 1, isN: true, isQ: false });
        pendingQ = false; i += 1; continue;
      }
    }
    let matched = false;
    for (const len of [3, 2, 1]) {
      const t = sub(i, len);
      if (!t) continue;
      const m = parseMora(t, pendingQ);
      if (m) { moras.push(m); pendingQ = false; i += len; matched = true; break; }
    }
    if (!matched) i += 1;   // 解析不能な文字は飛ばす
  }
  if (pendingQ) {
    const last = [...moras].reverse().find(m => !m.isN && !m.isQ);
    if (last) moras.push(finalSokuonMora(last.nucleus));
  }
  return moras;
}
// ─── ROMAJI 直接入力の再生 (v11 で外し 2026-07-17 復活) ───
// 空白/ハイフン区切りのトークン列。トークンが単一モーラでなければ segmentWord の
// greedy CV 自動分割へフォールバック (bouba も bo u ba も同じ)。促音=Q・撥音=n。
function playRomaji() {
  ensureCtx();
  const tokens = document.getElementById("romaji-input").value
    .trim().toLowerCase().split(/[\s\-_]+/).filter(Boolean);
  const moras = [];
  let pendingQ = false;
  for (const tk of tokens) {
    if (tk === "q") { pendingQ = true; continue; }
    if (tk === "n" || tk === "nn") {
      moras.push({ onset: null, nucleus: "a", durationMs: 160,
                   gapMs: pendingQ ? 70 : 0, amplitude: 1, isN: true, isQ: false });
      pendingQ = false; continue;
    }
    const m = parseMora(tk, pendingQ);
    if (m) { moras.push(m); pendingQ = false; continue; }
    // 単一モーラとして解釈できない (2文字超の塊、例 "bouba"/"aauu") → greedy 自動分割
    const seg = segmentWord(tk);
    if (seg.length > 0) {
      if (pendingQ) seg[0] = { ...seg[0], gapMs: geminateGapMs(seg[0].onset) };
      moras.push(...seg);
    }
    pendingQ = false;
  }
  if (moras.length === 0) return;
  const ev = { axes: lastAxes, moras, baseF0: 200, isRedup: false };
  playAndRemember(ev, lastAxes, false, "romaji");   // PLAY で同じ入力をリピート可能に
}

// fetch + decode はどちらも user gesture 不要 (AudioContext は suspended のまま
// decode できる) → ページロード直後から全部済ませる。gesture が要るのは resume のみ。
// バナーは「本当に鳴らせる状態」になるまで loading を表示し、さらに最低表示時間を
// 保証する (早すぎる「準備完了」で戸惑わないように)。
// 読込 (fetch+decode) はページロード直後に。完了したら「▶ タップして開始」ボタンを出す。
// その明示タップで AudioContext を resume (確実な user gesture) → 以降は描いた瞬間に鳴る。
(async () => {
  await fetchAllSamples();
  try { await Promise.all(sampleKeys().map(decodeSample)); } catch (e) {}
  const ok = [...sampleBank.values()].filter(Boolean).length;
  document.getElementById("status").textContent = `samples ready (${ok}/${samplesTotal})`;
  showStartButton();
})();

function showStartButton() {
  const note = document.getElementById("loading-note");
  if (!note) return;
  note.textContent = T.start;
  // インライン style が CSS class より優先されるので、目立つボタン見た目を inline で設定
  Object.assign(note.style, { background: "var(--pink)", color: "#fff", cursor: "pointer",
    textAlign: "center", fontWeight: "800", fontSize: "15px", padding: "13px 10px" });
  note.onclick = startApp;
}
function startApp() {
  const note = document.getElementById("loading-note");
  const ctx = ensureCtx();              // user gesture 内で生成/取得
  try {                                 // WebKit 古典アンロック (無音1サンプル即再生)
    const b = ctx.createBuffer(1, 1, 22050);
    const s = ctx.createBufferSource(); s.buffer = b; s.connect(ctx.destination); s.start(0);
  } catch (e) {}
  const finish = () => {
    if (!note) return;
    note.onclick = null;
    // 開始後は声のクレジット表示 (元の控えめな見た目に戻す)
    Object.assign(note.style, { background: "rgba(77, 191, 242, 0.13)", color: "#1899c2",
      cursor: "default", textAlign: "left", fontWeight: "normal", fontSize: "11px", padding: "6px 10px" });
    note.textContent = T.voice;
  };
  ctx.resume().then(finish).catch(finish);
}
// AudioContext のアンロック: iOS/macOS Safari は一部イベントしか user activation と
// 認めないため、複数イベントで試みる (running になったら全て解除)。
// resume() に加え、ジェスチャーハンドラ内での無音バッファ即時再生 (WebKit の古典的
// アンロック手法) も行う — resume 単独では解除されない環境への保険。
const UNLOCK_EVENTS = ["pointerdown", "pointerup", "touchstart", "touchend", "mousedown", "click", "keydown"];
function unlockAudio() {
  const ctx = ensureCtx();   // gesture 内で resume
  try {
    // 1 サンプルの無音を即時再生 → WebKit がこのコンテキストを「許可済み」にする
    const b = ctx.createBuffer(1, 1, 22050);
    const s = ctx.createBufferSource();
    s.buffer = b;
    s.connect(ctx.destination);
    s.start(0);
  } catch (e) {}
  preloadAll();              // 万一 decode 失敗が残っていれば再試行
  if (ctx.state === "running") {
    for (const ev of UNLOCK_EVENTS) document.removeEventListener(ev, unlockAudio);
  }
}
for (const ev of UNLOCK_EVENTS) document.addEventListener(ev, unlockAudio);
</script>
